<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "6db6ee7e-929b-4c83-9c79-07ebcb4f2835", "assessment_id": "792bc261-c7aa-43d2-9631-797d005d0628", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the adapted excerpt from Murat\u2019s speech:</p><p><br></p><p>\u201cBecause, yeah, it was my goal to do this [be immersed]. Actually, when I was going there [Croatia], I told myself, if I go there and find Turkish pals, like close friends, and always get together with them, I would not improve my language [English].\u201d</p><p><br></p><p>From the text, it can be inferred that:</p><p><br></p>", "media": null, "options": [{"option_id": "52fc1562-aea4-41bf-b01a-ca02089c05fb", "content": "Full immersion means no contact with your native language.", "image_url": ""}, {"option_id": "d2c4e031-8771-4b9c-ac3b-c23d160ed463", "content": "Full immersion means getting together with your pals and friends.", "image_url": ""}, {"option_id": "36be9e49-9050-4be3-a944-7a0679ff8fc0", "content": "Someone\u2019s goal should be to avoid the Turkish language to learn English.", "image_url": ""}, {"option_id": "4e391975-ec73-4cfd-837e-4ca881e1cd16", "content": "You cannot improve your language skills if you get together with your friends.", "image_url": ""}], "answer": null}, {"question_id": "a9f6a8a3-d8a3-49ae-a0fb-f19d7052a164", "assessment_id": "792bc261-c7aa-43d2-9631-797d005d0628", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the adapted excerpt from Murat\u2019s speech:</p><p><br></p><p>\u201cAnd after that, I realized that you see, we have a phrase in Turkish that one language is one person. If you know two languages, you are two people.\u201d</p><p><br></p><p>According to that, is correct to affirm that:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "75aa501c-385b-4c04-814a-2610f2ef3140", "content": "In Turkey, they believe that learning a second language is done by two people.", "image_url": ""}, {"option_id": "0282d64b-f2e0-4e8a-9c08-ac83af455d9a", "content": "You can only learn a language by talking to another person.", "image_url": ""}, {"option_id": "fce829b5-e61c-4015-bdb7-6990be0aa1bb", "content": "You acquire a personality for each language you learn.", "image_url": ""}, {"option_id": "8784c935-3ca8-4b82-88c6-44c9d6bd03cf", "content": "Your personality doesn\u2019t change if you learn another language.", "image_url": ""}], "answer": null}, {"question_id": "7b4d6be7-f0cd-4d9a-a2d9-76d3e45bc078", "assessment_id": "792bc261-c7aa-43d2-9631-797d005d0628", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the following sentence:</p><p><br></p><p>\u201cI was going to Turkish one branch group so that meant to me to speak in English</p><p>24/7, right?\u201d</p><p><br></p><p>What does \u201c24/7\u201d mean?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "804bddc6-a00d-45e7-8ff0-9298f79f35a8", "content": "Every day", "image_url": ""}, {"option_id": "3193049f-f998-49d9-a41c-c676d1484adc", "content": "Every week", "image_url": ""}, {"option_id": "3f8f5d48-c69f-451a-be65-47847822ab77", "content": "Every month", "image_url": ""}, {"option_id": "5fac7485-26d5-4670-ab36-e019a2fad38c", "content": "Every year", "image_url": ""}], "answer": null}, {"question_id": "4203c4ae-1521-4aff-94c6-b038e3bcf7d2", "assessment_id": "792bc261-c7aa-43d2-9631-797d005d0628", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the following sentence and select the correct explanation for \u201cprep class\u201d:</p><p><br></p><p>\u201cYou see, here in high school I had the prep class for English and German.\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "d65cc9f8-4aff-45bc-bcb0-1b76e3cb6be9", "content": "preparatory classes", "image_url": ""}, {"option_id": "4d536530-f6b1-4146-aa30-6a7dc21116a2", "content": "private classes", "image_url": ""}, {"option_id": "82c4ea9a-e504-4883-9f26-15d244493e83", "content": "planning classes", "image_url": ""}, {"option_id": "c3e8e899-f66c-41fe-b1db-9c2b4acde441", "content": "a class before another class", "image_url": ""}], "answer": null}, {"question_id": "097784e4-20e9-4d01-9166-63d7a6307dc5", "assessment_id": "792bc261-c7aa-43d2-9631-797d005d0628", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the excerpt from Murat\u2019s speech.</p><p><br></p><p>\u201cBut I think in general the professional landscape is changing and people like you and like myself, you know, we enjoy the freelance lifestyle and the flexibility that comes with it.\u201d</p><p><br></p><p>Select the option that presents an alternative to \u201clandscape\u201d in this same context:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "ca81406b-512a-4682-b10a-bd133a0dd5f1", "content": "voyage", "image_url": ""}, {"option_id": "cd0d7937-3988-458d-a6f9-4e3694dcdad0", "content": "overview", "image_url": ""}, {"option_id": "aac2d1d8-4eba-4bdf-ba7b-25336234e22d", "content": "scenario", "image_url": ""}, {"option_id": "fba19f19-f4d8-4baa-94bd-eb1b977bcbda", "content": "angle", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
