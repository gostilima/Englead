<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "5bd5f291-dc57-4450-8e47-7ef0f1007b2c", "assessment_id": "2c1c2435-3b26-4060-8e81-b0c46db777ca", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer the question.</p><p>&nbsp;</p><p>Sophie shared her experiences of adapting to different cultural norms. She mentioned that small gestures, such as hand movements, can carry different meanings in various countries. For instance, she pointed out that Germans are often perceived as direct and reserved. Sophie reflected on instances where she might have unintentionally come across as too direct due to cultural differences.</p><p>&nbsp;</p><p>How did Sophie feel about instances where her gestures were misunderstood?</p><p>&nbsp;</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "95ac8d64-a8b6-43a8-a9a7-28d1329eb691", "content": "According to Sophie, small gestures, such as hand movements, can carry different meanings in various countries.", "image_url": ""}, {"option_id": "96d4d5a6-1a9b-4c12-bfb9-86335b790db6", "content": "Sophie reflected on instances where she might have unintentionally come across as too direct, expressing concern about potential misunderstandings due to cultural differences.", "image_url": ""}, {"option_id": "eb258f47-302a-4a3e-87d6-75b47a889e77", "content": "Sophie faced challenges in adapting to different communication styles, particularly the directness and reservation of Germans.", "image_url": ""}, {"option_id": "1c7752ac-4f92-4895-ac54-0573d079e007", "content": "Sophie associated Germans with being direct and reserved.", "image_url": ""}], "answer": null}, {"question_id": "6835fccb-e667-423d-bea1-716df754e686", "assessment_id": "2c1c2435-3b26-4060-8e81-b0c46db777ca", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>&nbsp;Read the passage and answer the question.</p><p>&nbsp;</p><p>Sophie shared her observations about cultural awareness in Guatemala, noting that people there may not have extensive knowledge about Germany due to the geographical distance. She drew a parallel by mentioning her own lack of knowledge about Guatemala before her experiences there.</p><p>&nbsp;</p><p>What similarity did Sophie draw between herself and the people in Guatemala?</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "9bdb6d19-26dd-41bb-a0db-cb541c65f1ae", "content": "Sophie mentioned that she also had limited knowledge about Guatemala before her experiences there.", "image_url": ""}, {"option_id": "a1a88324-ddc3-4f1e-9050-2ce4b71c605f", "content": "Sophie mentioned the geographical distance may be a reason why people in Guatemala might not know much about Germany.", "image_url": ""}, {"option_id": "f08f49f0-3913-41e7-807d-c949ce7ffd41", "content": "Sophie noticed that people in Guatemala don't have extensive knowledge about Germany.", "image_url": ""}, {"option_id": "6a057f10-d47f-46ac-bc0d-a1cb7e6ea5ca", "content": "The key factor mentioned by Sophie is the cultural diversity in Germany and Guatemala.", "image_url": ""}], "answer": null}, {"question_id": "da28f1e2-e45b-4c63-a2b4-dc9fd67ecc8f", "assessment_id": "2c1c2435-3b26-4060-8e81-b0c46db777ca", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Choose the expression that fits the blanks.</p><p>&nbsp;</p><p>Emily decided to take a _______ after high school before starting college. During her _______, she traveled to various countries, volunteered for community projects, and gained valuable life experiences. Emily believes that the _______ not only broadened her perspective but also helped her develop essential skills that would benefit her in college and beyond.</p><p><br></p>", "media": null, "options": [{"option_id": "03b7c7b9-1866-42ff-96d0-8bf74370bb2d", "content": "break", "image_url": ""}, {"option_id": "5f92ce6d-625f-4cb5-9a1c-3ec61473965a", "content": "journey", "image_url": ""}, {"option_id": "fd93624e-0538-417c-96e0-12fbc0238c52", "content": "time", "image_url": ""}, {"option_id": "e8cdd98f-b5a7-41be-83f0-d9430984041b", "content": "gap year", "image_url": ""}], "answer": null}, {"question_id": "cb8967eb-a087-4102-bd86-04bbde84bfc4", "assessment_id": "2c1c2435-3b26-4060-8e81-b0c46db777ca", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Look at the picture and complete the sentence with the correct expression.</p><p><br></p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXclJMQssd0fztHvLoP9tsJ2Mj--osFnrmDgcFAJpaKuwF5igxPDXhmN1v9s8zuzXkw_LWVpmExaNJTEtgSiUWvAd5PJ6N4haLWOJzeqt7wzclEH59r7s8sHnWymogXbZST47uSWKKP5_bCFuYzk5-FL3AJ-?key=Zd9qG2SxjoiV1oMxyvY-tQ\"></p><p>&nbsp;</p><p>When you're in a foreign country and you don't speak the local language, you might use ______ to ask for directions, indicate numbers, or express basic needs, helping bridge the language barrier.</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "4eedee54-98d9-45cc-bc41-54556a584df2", "content": "hand gestures", "image_url": ""}, {"option_id": "196fdaf9-edaa-46c5-8199-ce33be89d060", "content": "signals", "image_url": ""}, {"option_id": "158e7581-c7cd-44f0-a076-62ee53f1e6c7", "content": "tools", "image_url": ""}, {"option_id": "417eed52-2668-4a5e-a669-5aa9a581bf07", "content": " a dictionary", "image_url": ""}], "answer": null}, {"question_id": "bdcb571f-1e48-4147-bf6c-b46b2a42b2ec", "assessment_id": "2c1c2435-3b26-4060-8e81-b0c46db777ca", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the expression that fits the blank.</p><p>&nbsp;</p><p>During the cultural exchange event, Maria experienced an ___________ when she accidentally stepped on the hem of her skirt while showcasing her traditional dance.</p><p><br></p>", "media": null, "options": [{"option_id": "eb507fb5-9775-484d-8e9d-a62589bf8118", "content": "accidental issue", "image_url": ""}, {"option_id": "b27d3feb-972c-41fd-b7b0-aad8aa3440ab", "content": "embarrassing moment", "image_url": ""}, {"option_id": "e7efe983-054d-4af3-970b-8773c9c5fe3d", "content": "outrageous situation", "image_url": ""}, {"option_id": "851fb6b4-9ed7-41aa-bd0b-30960571dc27", "content": "amazing experience", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
