<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "2e3ffc02-234c-42df-a718-abd16028b361", "assessment_id": "a1862b15-6f18-4cd5-972b-455fda91bc73", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Read the passage and answer the question.</p><p><br></p><p>Eto said, \u201cYeah, basically, yeah. Because we cooperate with international universities abroad, in Europe, and US, or in Asia. And we also got a few international students from different countries, so they write the letters in English.\u201d</p><p>&nbsp;</p><p>What is the main focus of Eto's cooperation with international universities?</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "4a89b324-9dfd-44a7-9571-f7c6876d081a", "content": "Attracting more local students", "image_url": ""}, {"option_id": "6d46e590-f06e-4932-9e93-4fabde7f0488", "content": "Establishing partnerships with universities in Asia", "image_url": ""}, {"option_id": "42e4323c-7ab3-4a67-9133-4f090b554aac", "content": "Admitting students who speak English", "image_url": ""}, {"option_id": "5a637b2d-0d20-4958-b7b2-77bb0787998c", "content": "Encouraging international collaboration", "image_url": ""}], "answer": null}, {"question_id": "fd3789e6-0db6-4a1a-b2ae-4e64c08d1f26", "assessment_id": "a1862b15-6f18-4cd5-972b-455fda91bc73", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Read the passage and answer the question.</p><p>&nbsp;</p><p>Eto said, \u201cYeah! I think each person has this experience in their life. But, of course, especially</p><p>during my previous working experience, like when there was a gap between generations. I was younger than others and I had great ideas and recommendations, but the older people, because they are part of another generation. They think that they know better.\u201d</p><p><br></p><p>What does Eto suggest about the impact of generational differences in the workplace?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "8a9fd930-5bd2-4dd0-a66e-4a7bd76b7dfc", "content": "It has no significant effect on professional relationships", "image_url": ""}, {"option_id": "119303a2-3a00-4292-b2ae-fbdb1c7801ed", "content": "It leads to a better exchange of ideas", "image_url": ""}, {"option_id": "b63b231f-92f4-4639-aa03-f5ce0686c4a7", "content": "It can create challenges in idea acceptance", "image_url": ""}, {"option_id": "da662a44-4875-4502-b23b-839b71b82a30", "content": " It fosters a harmonious working environment", "image_url": ""}], "answer": null}, {"question_id": "f80b6b30-f155-4a54-84ba-3eecca09f300", "assessment_id": "a1862b15-6f18-4cd5-972b-455fda91bc73", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct word.</p><p>&nbsp;</p><p>In order to achieve our goals, we need to _______________ closely with our international partners.</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "573ffc68-39f3-433e-b7ee-ee4fdb94322c", "content": "promote", "image_url": ""}, {"option_id": "4fee73a7-66c6-4fbf-9230-c6f8bcdbbc98", "content": "enhance", "image_url": ""}, {"option_id": "4afa9c56-77e7-4cb1-a658-4339415631d1", "content": "cooperate", "image_url": ""}, {"option_id": "435a976a-b982-40db-9e41-b24c83c04e47", "content": "add", "image_url": ""}], "answer": null}, {"question_id": "a6fcb9a3-ab9e-419c-87cc-f10f5268191b", "assessment_id": "a1862b15-6f18-4cd5-972b-455fda91bc73", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Look at the picture and select the alternative that best describes it.</p><p>&nbsp;&nbsp;</p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXeycyRaAB3VQ_rLJ4Kpl76JZVwoOKLegqV4JpyF8VsaKzrUtLQ0-cePrKgrF5DiTMUnsD2h7UWidegZK_OrlQ6JDgaEW2y1w1_xH5dzqP0z_k_7-RbUKNkQI4Z97SxpOKhtcLtGyCn4Dd2vfH2K8Muqx-vq?key=Ak-XZNVAaZJIHt_Baid_BQ\"></p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "2e19ccde-2566-4625-a4e2-3d0a08288c70", "content": "Exposure to different writing styles cannot contribute to improved writing proficiency", "image_url": ""}, {"option_id": "c376bf1d-8617-4c82-a80d-5c4412607335", "content": "Reading and writing essays on the computer boost your writing skills", "image_url": ""}, {"option_id": "ad9fefd3-b72b-4022-9a91-da9c08e26be5", "content": "It is a good idea to download sample application models to use in your application letter", "image_url": ""}, {"option_id": "64947632-b617-405a-84cb-c237687b5256", "content": "Enhancing your writing skills enables you to effectively communicate ideas", "image_url": ""}], "answer": null}, {"question_id": "8209a846-cdf4-4cdb-b1be-9674573ef7f8", "assessment_id": "a1862b15-6f18-4cd5-972b-455fda91bc73", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>What is an alternative to the word international?</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "eeb44f80-ffe2-4a86-aee8-a708c177abc4", "content": "domestic", "image_url": ""}, {"option_id": "3f47f033-484a-43bc-afd3-adc7640c197a", "content": "global", "image_url": ""}, {"option_id": "e5603f8e-9cae-4c6c-a5a1-6a75a78eb838", "content": "foreign", "image_url": ""}, {"option_id": "cf7c9ba5-4a2f-424d-a0b9-20185c07d40b", "content": " local", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
