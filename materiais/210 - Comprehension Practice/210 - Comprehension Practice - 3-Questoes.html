<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "f573f30b-a1a8-4b2c-b11f-1031b908c371", "assessment_id": "c7b6b5ec-bc21-4a39-b472-b10e0bc1f937", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio. What does Jonny mean by feeling \"particularly alien\"?</p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17229513639021325_GET_THE_TALK_U01_I-wrote-this-story.mp3"}, "options": [{"option_id": "5e81df7a-f907-49a9-8642-c847cdf82dce", "content": "Experiencing encounters with extraterrestrial beings", "image_url": ""}, {"option_id": "f43b6ab8-152a-49a7-b39a-baa97a6e8bb4", "content": "Feeling like an outsider or disconnected", "image_url": ""}, {"option_id": "f0d7a9f7-05db-4e9e-bba6-9f454194361a", "content": "Being physically isolated from others", "image_url": ""}, {"option_id": "22016771-19e3-480b-b9ab-8fd1ba25a4ee", "content": "Having a strong connection to outer space", "image_url": ""}], "answer": null}, {"question_id": "b1591799-21c2-44d8-bbeb-3eafccd61bb3", "assessment_id": "c7b6b5ec-bc21-4a39-b472-b10e0bc1f937", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Jonny said, \u201c(...) there's this confessional nature to social media. It can feel like you are writing in this personal, intimate diary that's completely private, yet at the same time you want everyone in the world to read it.\u201d</p><p>&nbsp;</p><p>Read the text and select the correct alternative:</p><p><br></p>", "media": null, "options": [{"option_id": "bb09a900-4c7e-4848-9a08-8a81456ea7c6", "content": " People tend to confess on social media", "image_url": ""}, {"option_id": "ededc792-bcd0-43fe-acf3-3700e332c4d6", "content": "People post about feelings on social media", "image_url": ""}, {"option_id": "4e5cd001-131b-4ee0-bace-bb8275f278af", "content": "Social media is becoming more natural for people", "image_url": ""}, {"option_id": "c1b1df3e-bb8d-49c0-9b8f-485cc5a30fc7", "content": "People confess about social issues on social media", "image_url": ""}], "answer": null}, {"question_id": "ae93eba0-ef7c-4c46-bebc-0e76003dfc6a", "assessment_id": "c7b6b5ec-bc21-4a39-b472-b10e0bc1f937", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Jonny said, \u201c(...) there's something important about sharing your imperfections and your insecurities and your vulnerabilities with other people. Now, when someone shares that they feel sad or afraid or alone, for example, it actually makes me feel less alone, not by getting rid of any of my loneliness but by showing me that I am not alone in</p><p>feeling lonely.\u201d</p><p><br></p><p>According to Jonny, being vulnerable and transparent on social media makes people:</p><p><br></p>", "media": null, "options": [{"option_id": "1ef0352a-cdc3-4931-b8dd-2682bf81d053", "content": "lose their fear of therapists", "image_url": ""}, {"option_id": "f31222fb-8570-4912-806d-79305285daef", "content": "get rid of their loneliness", "image_url": ""}, {"option_id": "ce9cb380-1cd4-443a-abdf-90f5cfcd7b3d", "content": "feel less alone", "image_url": ""}, {"option_id": "4d98c7d0-9dbd-4fc9-9a90-b9dc7e99ce5d", "content": "find lovers", "image_url": ""}], "answer": null}, {"question_id": "c52785b0-9fc1-4a41-aa32-38881589832c", "assessment_id": "c7b6b5ec-bc21-4a39-b472-b10e0bc1f937", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Despite being a lifelong learner, Sarah is often considered a know-it-all. People jokingly refer to her as a/an:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "55b98958-7b6e-47cd-8f83-18447378d577", "content": "always-right person", "image_url": ""}, {"option_id": "fb89d377-cd35-468b-b0df-a96c0aad4702", "content": "fully form person", "image_url": ""}, {"option_id": "543bb14d-ad79-42fe-b064-ccedd1c0280c", "content": "fully formed person", "image_url": ""}, {"option_id": "c41d043f-8538-48a2-9b43-446d15282a91", "content": "perpetually correct person", "image_url": ""}], "answer": null}, {"question_id": "0ee8ab9e-4684-4e44-8b64-9cf9422554d1", "assessment_id": "c7b6b5ec-bc21-4a39-b472-b10e0bc1f937", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Look at the picture and finish the sentence:</p><p>&nbsp;</p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXcf96rYkvfoXwUeWFcRsJTZ3VhN7X12Vhb7z6Srmu26huEzVHGmqrOt4Iu2ws6NZ1SGSYWuot5K-s7UEEpkFtEbzWrNh6wqWMxeRm9An9zw_0BntZnwNKKFFG1-HZsfbkI5md3F2l0r__hPD59cg_uD5zHS?key=us3jvXdBQZN4HNZXRCEDSw\"></p><p>After the meeting concluded, attendees gradually\u2026</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "cfdf141f-a697-4286-bac4-6db4f77f4cca", "content": "dispersed", "image_url": ""}, {"option_id": "52e2109e-5244-4874-afb3-b0f10655b0e9", "content": "formed a crowd", "image_url": ""}, {"option_id": "49edb475-c454-4fc2-b9a1-d72f6d897d2e", "content": "gathered together", "image_url": ""}, {"option_id": "97515e2e-a9c5-4ab8-9ee3-922f2c1c9911", "content": "flocked in one place", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
