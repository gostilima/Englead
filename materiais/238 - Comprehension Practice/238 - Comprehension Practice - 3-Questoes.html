<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "4f79a5d2-1f7b-440a-aa45-0cecd9e78ca9", "assessment_id": "6e184742-7ae0-4e0f-bddd-103f7c1179a1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>According to Audio, in business it is essential that leaders...</p><p>&nbsp;</p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236559396109345_GET_THE_TALK_U09_In-business.mp3"}, "options": [{"option_id": "1d160e54-8cb9-4f15-8ebe-f4c66dcf7504", "content": "focus on minor details", "image_url": ""}, {"option_id": "815e57fa-3999-496d-b196-e3374adc71c7", "content": "understand broader goals and challenges", "image_url": ""}, {"option_id": "876c10b8-c8ae-4600-87e7-be42e95f64e0", "content": "ignore long-term strategies", "image_url": ""}, {"option_id": "62e1150e-fef1-45a9-b6e1-8c6059e0418a", "content": "plan short-term goals", "image_url": ""}], "answer": null}, {"question_id": "3f6f1dd6-df56-4eae-b077-6c03353dd280", "assessment_id": "6e184742-7ae0-4e0f-bddd-103f7c1179a1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following passage and answer the question.</p><p>&nbsp;</p><p>Tim Urban describes the Instant Gratification Monkey as a character who lives solely in the present moment, without concern for the past or the future. This monkey is driven by the pursuit of things that are easy and fun. Unlike humans who consider past experiences and future consequences, the Instant Gratification Monkey lacks any memory of the past and knowledge of the future.</p><p>&nbsp;</p><p>What is the significance of the Monkey having \"no memory of the past\" and \"no knowledge of the future.\"?</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "b16df918-09af-41fc-895f-df10d84248cb", "content": "The Monkey's mindset is focused on immediate pleasure.", "image_url": ""}, {"option_id": "be0d06cd-567b-4390-86b5-952199eb6d7b", "content": "The Monkey's avoids any challenges or difficulties.", "image_url": ""}, {"option_id": "49e2d257-298c-4fd6-9a5b-454b5487d855", "content": "The Monkey's lack of memory and foresight results in an inability to learn from the past or consider future outcomes in decision-making.", "image_url": ""}, {"option_id": "48c0684a-8595-4bb3-b0e1-b59c9efddd69", "content": "The pursuit of things that are easy and fun drives the behavior of the Instant Gratification Monkey.", "image_url": ""}], "answer": null}, {"question_id": "f023171a-af06-4026-a2d0-96ac7191d284", "assessment_id": "6e184742-7ae0-4e0f-bddd-103f7c1179a1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following passage and answer the question.</p><p>&nbsp;</p><p>Tim Urban said, \u201cWell, turns out the procrastinator has a guardian angel, someone who's always looking down on him and watching over him in his darkest moments\u2013someone called the Panic Monster. Now, the Panic Monster is dormant most of the time, but he suddenly wakes up anytime a deadline gets too close or there's a danger of public embarrassment, a career disaster, or some other scary consequence.\u201d</p><p>&nbsp;</p><p>How does Tim Urban describe the Panic Monster's role in the life of a procrastinator?</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "eba1aa5c-c09f-4a9e-9f07-af7ec209549f", "content": "A hindrance to productivity", "image_url": ""}, {"option_id": "5ad2411b-885b-4531-924b-88d760bce369", "content": "A constant companion", "image_url": ""}, {"option_id": "d0bd53ef-82eb-43a9-beff-eaff55e9d24b", "content": "A driving force during critical moments", "image_url": ""}, {"option_id": "d8a6b945-e685-428e-be53-17d6875e0832", "content": "A passive observer", "image_url": ""}], "answer": null}, {"question_id": "6dfb1fd5-54ca-4b18-acd3-2fcc5f7eb815", "assessment_id": "6e184742-7ae0-4e0f-bddd-103f7c1179a1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression.</p><p>&nbsp;</p><p>\"In ___________, time seems to slip away unnoticed. It's the realm of mindless scrolling through social media, binge-watching TV shows, and playing video games for hours on end. It's where the procrastinator seeks temporary relief but ends up avoiding important tasks.\"</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "399a2a7a-2584-4106-9888-794a84834839", "content": "the dark playground", "image_url": ""}, {"option_id": "c8a16567-d613-4117-98ba-79974b7abe74", "content": "the subconscious", "image_url": ""}, {"option_id": "fa277680-3bd2-4053-8287-e26c3e2fddfa", "content": "dreams", "image_url": ""}, {"option_id": "b424e748-90a4-46a4-9c34-60074afb298f", "content": "the youth", "image_url": ""}], "answer": null}, {"question_id": "29560561-b93b-449a-80ba-a753dc595544", "assessment_id": "6e184742-7ae0-4e0f-bddd-103f7c1179a1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the option that means the same as the word in bold.</p><p>&nbsp;</p><p>According to Tim, The Panic Monster is an angel that is up there<strong>, taking care of</strong> us.</p><p>&nbsp;</p>", "media": null, "options": [{"option_id": "22e91f75-5153-4d84-888e-459476350105", "content": "talking to", "image_url": ""}, {"option_id": "b7fae0e9-a9a2-43de-a4cb-25aa2d3847c8", "content": " looking after", "image_url": ""}, {"option_id": "ca35893a-f2fb-4ff1-ae05-4b31a95aa726", "content": "looking at", "image_url": ""}, {"option_id": "67c29631-7db2-4a70-9fa0-af3f674e0249", "content": "chasing", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
