<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "61e05e45-bf44-48d2-95f8-42f4e76e65e4", "assessment_id": "3fbc2c74-2112-4a47-980a-422d328badaf", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Which sentence is not an invitation?</p><p><br></p>", "media": null, "options": [{"option_id": "4ec2c0b1-ab98-42de-a030-5e7d61967087", "content": "I've been thinking it's been too long since we hung out, so I wanted to extend an invitation for a casual get-together this weekend.", "image_url": ""}, {"option_id": "a426924e-a336-4777-aed2-fe8ab223ba04", "content": "It's been a while since we caught up, and I thought it would be great to spend some quality time together at my country house.", "image_url": ""}, {"option_id": "824d417d-31e2-4525-ac4b-b68df6cb02e2", "content": "I can make the necessary arrangements. Looking forward to a fun evening!", "image_url": ""}, {"option_id": "970acf4f-4c35-4b4e-ab05-5cc391b647b6", "content": "As the weekend approaches, I'm excited to extend an invitation to a casual get-together at my place.", "image_url": ""}], "answer": null}, {"question_id": "9bfeb7d1-eadb-469e-8356-476dcbfc7105", "assessment_id": "3fbc2c74-2112-4a47-980a-422d328badaf", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Tiago said, \u201cIf you are one of those who are always listening to the chart, and you're related to this world of pop culture, that's for sure something that would help. I believe that you have to use the sources and the materials that are interesting for you to learn English. If you are into sports, watch sports in English. If you are into religion, try to read the book of your religion in English. Use things that make sense for you in order to learn.\u201d</p><p><strong>&nbsp;</strong></p><p>Read the passage and answer: what does Tiago suggest as a helpful approach to learning English?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "5d5431d2-674b-4d43-b73c-9386b0a2df1a", "content": "Exclusively use traditional textbooks", "image_url": ""}, {"option_id": "941ce40b-bf7c-455f-84f7-738c73a25361", "content": "Utilize sources and materials that align with your interests", "image_url": ""}, {"option_id": "9879e97d-250d-40f2-acd2-c87fac90d0ba", "content": "Avoid any content in English that you dislike", "image_url": ""}, {"option_id": "a534dffa-7aa4-4440-a9bc-2b91d8e5a19e", "content": " Learn English only through religious texts", "image_url": ""}], "answer": null}, {"question_id": "829f4548-f057-4fca-9cf0-7055a00227bb", "assessment_id": "3fbc2c74-2112-4a47-980a-422d328badaf", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Tiago said, \u201cI was exposed to many different types of cultures and really building relationships and having a bond with someone. Here, for example, if I'm throwing a party or going to eat out with my friends and then there is a friend of a friend who's coming, they\u2019re like, \u2018Can I bring my friend, my girlfriend, or my cousin?\u2019 We would make sure that this person who is out of the group feels welcome and part of the chat, the party. We\u2019ll include this person, talk to them, and try to break the ice. In the US, it feels like you need more time to get people to engage with you and start a conversation out of the blue and to be in a place where everybody feels part of the chat. Because I've been in places where I was the friend of the friend coming to the party and I felt an outcast, an outsider.\u2019\u201d</p><p><strong>&nbsp;</strong></p><p><strong>&nbsp;</strong></p><p>Read the passage. How does Tiago describe the social approach in the United States compared to his own culture?</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "7d187e02-0160-42a1-8c85-b87bcc9224d4", "content": "In the US, people quickly engage in conversations without hesitation.", "image_url": ""}, {"option_id": "71e50106-cf78-40c9-bcab-39625abc5d32", "content": "In the US, it takes more time to initiate conversations and feel included.", "image_url": ""}, {"option_id": "ff0cb707-2f4c-4061-a8a0-e5de81365a31", "content": "People in the US are less welcoming to newcomers.", "image_url": ""}, {"option_id": "a812a874-5076-42a2-a78c-e9832728d755", "content": "Cultural differences do not affect social interactions in the US.", "image_url": ""}], "answer": null}, {"question_id": "a164e0f1-e1a3-4996-a603-7e8808918096", "assessment_id": "3fbc2c74-2112-4a47-980a-422d328badaf", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression:</p><p>I never thought that my passion for education would lead me to this point; the decision to be a teacher ______________ through years of self-discovery.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "cd884184-84d1-4911-bc25-2c0e98b6e423", "content": "came about", "image_url": ""}, {"option_id": "bff16481-7e0e-424a-8bc2-36fa89a605d7", "content": "vanished", "image_url": ""}, {"option_id": "8e910d07-a3f0-4053-a809-ea1c0ba460f4", "content": "stopped", "image_url": ""}, {"option_id": "6685f8a1-a457-48e2-bea6-3237c91b4345", "content": "remained", "image_url": ""}], "answer": null}, {"question_id": "2836857a-c5b8-4f06-b7c9-210c7e2f8592", "assessment_id": "3fbc2c74-2112-4a47-980a-422d328badaf", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the best alternative to complete the dialogue:</p><p>&nbsp;</p><p>Speaker A: Hey, Sarah! You've become so fluent in English lately. What's your secret?</p><p>&nbsp;</p><p>Speaker B: Oh, thanks! ___________________________________________.</p><p>&nbsp;</p><p>Speaker A: Really? Which one?</p><p>&nbsp;</p><p>Speaker B: It was this amazing drama set in New York City. The characters, the dialogue, everything was so engaging. I felt like I was part of their world, and I wanted to understand every nuance.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "ceaccd84-bd06-49dd-aa1c-01349b04fe94", "content": "Learning English opened up a whole new world of entertainment and knowledge for me.", "image_url": ""}, {"option_id": "39a51dc2-efe3-446e-bfb3-e5ef43f87e86", "content": "Well, the hook for me to learn English was when I stumbled upon a captivating TV series.", "image_url": ""}, {"option_id": "fd927916-8fda-4cf3-9dda-0b73aeb7cb2a", "content": "The turning point for me to start learning English happened when I met a famous actor.", "image_url": ""}, {"option_id": "9bdfcaa9-4fbd-4e6d-a13a-a42f0b37655c", "content": "It's amazing how music can become the catalyst for learning a language.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
