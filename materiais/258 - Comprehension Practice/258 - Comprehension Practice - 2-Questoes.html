<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "b3830972-3970-48fc-b35a-59f8697ec1be", "assessment_id": "11e04031-7b4a-4dcf-9728-c6a852c44d28", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the excerpt from Kathryn\u2019s speech:</p><p><br></p><p>\u201cThe miracle of your mind isn't that you can see the world as it is. It's that you can see the world as it isn't.\u201d</p><p><br></p><p>Select the option that best paraphrases it:</p><p><br></p>", "media": null, "options": [{"option_id": "c79fcc42-92fa-4863-8ba3-cb77855b7524", "content": "Humanity is powerful because they have miracle minds.", "image_url": ""}, {"option_id": "8a72e2c1-b6e6-4030-b6ba-2f319265cd5d", "content": "Seeing unreal things is better than seeing real things.", "image_url": ""}, {"option_id": "e052a7d5-2cb3-497e-919f-5f90c5d4cb90", "content": "The power of the human mind is imagination and creativity.", "image_url": ""}, {"option_id": "5875dded-89a8-428a-b5c4-05a82aec1898", "content": "Our minds can create the real world through imagination and miracles.", "image_url": ""}], "answer": null}, {"question_id": "490b12ca-de93-4f30-977a-510fe681a8d8", "assessment_id": "11e04031-7b4a-4dcf-9728-c6a852c44d28", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the overview Kathryn Schulz gave before her TED Talk. She presented three things she wanted to do in that talk:</p><p><br></p><p>\u201cSo what I want to do today is, first of all, talk about why we get stuck inside this feeling of being right. And second, why it's such a problem. And finally, I want to convince you that it is possible to step outside of that feeling and that if you can do so, it is the single greatest moral, intellectual, and creative leap you can make.\u201d</p><p><br></p><p>Select the option that sums up the third thing:</p><p><br></p><p>1. Talk about the feeling of being right.</p><p>2. Explain why is it a problem.</p><p>3. ___________.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "e7611a68-1232-41f9-b498-891bd001048a", "content": "Make the creative leap.", "image_url": ""}, {"option_id": "7740e2df-f7c6-41d1-932d-daf6fa316154", "content": "Try to convince the public to break free from the feeling.", "image_url": ""}, {"option_id": "2e91ec93-9950-4aa2-98d9-3705e21b709a", "content": "Step outside the feeling of being right.", "image_url": ""}, {"option_id": "a261ea8f-ea93-4d97-a821-a8436342108b", "content": "Ask people if they can make the creative, moral, and intellectual leap.", "image_url": ""}], "answer": null}, {"question_id": "c1dd31ee-8548-4b7d-bc15-c509b0625126", "assessment_id": "11e04031-7b4a-4dcf-9728-c6a852c44d28", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio. According to it, what are we humans obsessed with?</p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236781916343322_U14_GET-THE-TALK_Because-unlike-God.mp3"}, "options": [{"option_id": "2d873572-f6a1-4973-b364-78bfc32b5da3", "content": "Being like God to know what\u2019s happening.", "image_url": ""}, {"option_id": "4fd07bed-e154-4274-9e0a-e7c3c882a1f7", "content": "Trying to be like animals.", "image_url": ""}, {"option_id": "1769365e-e7ab-405d-a657-4e54e466679e", "content": "Being productive and creative.", "image_url": ""}, {"option_id": "4bded98b-f70f-4b69-a575-35e4eb5de676", "content": "Trying to understand things better.", "image_url": ""}], "answer": null}, {"question_id": "6aeb7e24-3978-4350-ac06-a9dca2caa751", "assessment_id": "11e04031-7b4a-4dcf-9728-c6a852c44d28", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Select the best synonym for \u201ccomes down to me\u201d in the following sentence:</p><p><br></p><p>\u201cBut when it comes down to me, right now, to all the beliefs I hold, here in the present tense, suddenly all of this abstract appreciation of fallibility goes out the window. [...]\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "6376cea3-a3c3-4d44-a962-13efc2b3c29e", "content": "come across me", "image_url": ""}, {"option_id": "88945a79-fc21-440d-b345-8719839cee05", "content": "is about me", "image_url": ""}, {"option_id": "df103d7e-2d55-4b00-b2cf-24e962a6a4f0", "content": "it behaves like me", "image_url": ""}, {"option_id": "c0d2d3bf-477d-4606-9bf6-53ad8b096789", "content": "brings me up", "image_url": ""}], "answer": null}, {"question_id": "3035779a-07c0-4b52-9a8d-0d4aca76ba64", "assessment_id": "11e04031-7b4a-4dcf-9728-c6a852c44d28", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the following sentence. Select the correct explanation for the expression \u201cwind up\u201d:</p><p><br></p><p>\u201c[...] we all kind of wind up traveling through life, trapped in this little bubble of feeling very right about everything.\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "62353978-47d4-4f10-9c89-37c5b98259d7", "content": "To find oneself in a particular state or situation.", "image_url": ""}, {"option_id": "bf45b923-3cf1-42d7-bb87-fa11d7dde79e", "content": "To understand someone\u2019s feelings.", "image_url": ""}, {"option_id": "998cf91d-19c4-4cd9-8ff8-dde700262ad5", "content": "Physically rotate or twist as traveling through life.", "image_url": ""}, {"option_id": "d50da105-b74b-475a-a5aa-fce861dc50bd", "content": "Intentionally bringing one\u2019s life journeys to an abrupt end.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
