<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "efd0e5a7-9373-47c1-a777-70cfc099fb60", "assessment_id": "3fbda74c-3d35-4a0c-b2c2-69ebdf10ad9a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and choose the false statement.</p><p>&nbsp;</p><p>Guillermina said, \u201cI tend to miss my <em>mate</em> a lot. But, I\u2019m going to reveal a personal detail, I have never taken <em>mate</em> to another place. Because <em>mate</em> is my culture here, I need to be open-minded to receive their culture.\u201d</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "7d26ceb3-d6f6-4a65-bdd3-b29683821ae3", "content": "Traditional South American herbal tea is called mate.", "image_url": ""}, {"option_id": "872b131f-52c6-41a0-8e39-af2ebb357f72", "content": "Being exposed to a sense of loneliness when traveling.", "image_url": ""}, {"option_id": "05791c19-2bff-49be-902d-bb564ed78c92", "content": "Mate is a cultural element.", "image_url": ""}, {"option_id": "8ac37534-7bcd-4a1b-aa1e-46259326ae46", "content": "Embracing different cultures and trying new foods or drinks. ", "image_url": ""}], "answer": null}, {"question_id": "5c82414e-3849-4f32-8303-ee872775f7d9", "assessment_id": "3fbda74c-3d35-4a0c-b2c2-69ebdf10ad9a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and select the correct alternative.</p><p>&nbsp;</p><p>The name \"Bahamas\" is derived from the Spanish words \"baja mar,\" meaning \"shallow sea\" or \"low tide.\" The Bahamas is an archipelago of islands and cays in the Atlantic Ocean, known for its shallow and clear waters.</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "e304c7c3-18bc-4004-9d42-588d7dd3586b", "content": "The name has English origins", "image_url": ""}, {"option_id": "265a17a7-9048-4522-878c-f90690e9aa3f", "content": "In the area, the tide remains relatively constant", "image_url": ""}, {"option_id": "7deb9faf-c770-4788-a18a-5e8d17b2669c", "content": "The name stands for deep sea", "image_url": ""}, {"option_id": "cf4ba47e-7106-494c-81f0-688aab648e50", "content": "The name reflects the geographical characteristics of the region", "image_url": ""}], "answer": null}, {"question_id": "6eb70271-41a5-4230-82f0-d23f9634f9ce", "assessment_id": "3fbda74c-3d35-4a0c-b2c2-69ebdf10ad9a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the word that does not describe the picture.</p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXcRfARPMTfOGDCT3a5a2cWYNF--Cd14u8QbJzFdxb-r6xwMSDeysU-Q0NxWJrMbC7BrjoMIT2VgoPDeyS1SKN34Nrxx2Y9zwy6BXSo8ADuY_eJ7CvgSmSUyL1nw699aH4Tmfm92aYMeiy0Ig7xTvhwFsZdy?key=zHC3kCHdKpSKF6Rqmrjkyw\"></p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "c56e946f-92b2-4adc-8786-ef2516de2a6c", "content": "polite", "image_url": ""}, {"option_id": "2f1ca7a0-a030-444e-b4d1-89d4baaa084f", "content": "helpful", "image_url": ""}, {"option_id": "03be47a7-f026-4fb1-807e-fa1ce7ca2138", "content": "well-mannered", "image_url": ""}, {"option_id": "f80f2405-c352-45a9-8bbe-2798b23dbe75", "content": "discourteous", "image_url": ""}], "answer": null}, {"question_id": "abb2bf53-7c2e-4c2e-a6a9-38702ffe4d71", "assessment_id": "3fbda74c-3d35-4a0c-b2c2-69ebdf10ad9a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression:</p><p>&nbsp;</p><p>The way she handles difficult people is admirable; she seems __________ her diplomatic mother.</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "a1019e03-285f-45c7-bd2c-27d2c76df53f", "content": "having", "image_url": ""}, {"option_id": "72036e64-a1f8-419d-a94f-1e735070cb68", "content": "to be like", "image_url": ""}, {"option_id": "94ffd1d8-370c-436f-b042-a3443efbd324", "content": "look like", "image_url": ""}, {"option_id": "0a4ee854-e717-458f-b17d-4eba011918c1", "content": "resemble", "image_url": ""}], "answer": null}, {"question_id": "170935de-8347-4b7e-9510-e99977440ede", "assessment_id": "3fbda74c-3d35-4a0c-b2c2-69ebdf10ad9a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the option that means the same as the word in bold:</p><p>&nbsp;</p><p>Traveling to new countries and immersing myself in different customs and traditions has made me more <strong>open-minded</strong> and appreciative of cultural diversity.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "c754758c-3959-4dda-8c10-1ad1d34e6a71", "content": " inflexible", "image_url": ""}, {"option_id": "0edc62be-792e-4fc3-9732-44de4a0606af", "content": "prejudiced", "image_url": ""}, {"option_id": "deb11f28-0b8a-4cba-91f8-73732c01a947", "content": "tolerant", "image_url": ""}, {"option_id": "a23274b5-1022-42e8-a622-394bcb3d8b17", "content": "narrow-minded", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
