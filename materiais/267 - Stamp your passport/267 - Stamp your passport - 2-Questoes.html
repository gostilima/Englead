<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "9c3c6b60-9e02-45e1-9e59-747197f40ab2", "assessment_id": "1bf91a35-20b9-4a2e-bd0f-be8ae2034698", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze an excerpt of Felipe\u2019s speech:</p><p><br /></p><p><em>\u201cThe quality and quantity of information available now is pretty amazing. It got easier because access got much easier. But learning a language is always a lot of work, there's no shortcut.\u201d</em></p><p><br /></p><p>Select the option that is an alternative to \u201cshortcut\u201d:</p><p><br /></p>", "media": null, "options": [{"option_id": "0cffd045-6eaa-4345-a1d3-f55c90f8e891", "content": "cutting routes", "image_url": ""}, {"option_id": "c8427cb9-16bd-4e1e-8318-535a8bb6fb08", "content": "following a path", "image_url": ""}, {"option_id": "53dfa67a-52c5-4a9d-8f4b-a5020231438f", "content": "alternative route", "image_url": ""}, {"option_id": "f8269c03-d0ca-4e2f-a293-0a31ec9b4686", "content": "alternative story", "image_url": ""}], "answer": null}, {"question_id": "789781ab-b7bd-45af-ba42-9825f60578cc", "assessment_id": "1bf91a35-20b9-4a2e-bd0f-be8ae2034698", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the question Scott asked Felipe:</p><p><br /></p><p><em>\u201cWe've seen sort of a revolution in language learning and language acquisition. It's gone from very analog to everything being on the smartphone or on the computer. What do you think is the next step for language learning? If you were to speculate, where do things go from here?\u201d</em></p><p><br /></p><p>What would not be an appropriate answer to this question?</p>", "media": null, "options": [{"option_id": "0a48a6ea-4b43-4a47-9758-b67fa9163ce9", "content": "I\u2019m not sure. But we may have more technology.", "image_url": ""}, {"option_id": "b0376441-77d6-46a9-b74f-361605442309", "content": "People can be lazier than before when accessing information.", "image_url": ""}, {"option_id": "6af3eeb2-80d3-42d6-8d8e-db4e91a91770", "content": "I know nothing about the past of language learning and acquisition.", "image_url": ""}, {"option_id": "6355123d-9d5e-4858-ab47-bbca8c680880", "content": "I wouldn\u2019t speculate much, but I\u2019m pretty sure more people will be able to learn.", "image_url": ""}], "answer": null}, {"question_id": "8b9ed649-1ab3-46a9-83ae-78c2a3e6361b", "assessment_id": "1bf91a35-20b9-4a2e-bd0f-be8ae2034698", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>You have to explain why children don\u2019t pay attention to longer content if they get addicted to screens and the internet. Which expression would be correct to complete the sentence?</p><p><br /></p><p><em>Children that are addicted to screens have a shorter _________________.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "3c51589d-1a51-4688-9819-0460f6e19fe8", "content": "attention span", "image_url": ""}, {"option_id": "49495f50-7b55-415a-bdbb-9c426da25b64", "content": "call the attention", "image_url": ""}, {"option_id": "4dfae1ef-9bcb-4f91-92a1-b43b154a23dd", "content": "way of learning", "image_url": ""}, {"option_id": "e2f868a7-0243-4880-b501-ec15f7ec8b2f", "content": "acquisition", "image_url": ""}], "answer": null}, {"question_id": "b9751c9a-2f1a-4213-a36c-711ce9178a6a", "assessment_id": "1bf91a35-20b9-4a2e-bd0f-be8ae2034698", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze an excerpt of Felipe\u2019s speech:</p><p><br /></p><p><em>\u201cI think people will be using AI for pretty much everything from now on. So, you have to learn how to use it, but AI will never do the thinking for you. Maybe in the future. Or maybe you're prompted well enough, but it just takes a lot of work. So nowadays, you have to do the thinking and AI will do some of the heavy lifting you'd probably have to do on your own and then you're able to improve on that. So I think as a teacher and as a student, we have to learn how to use it. And we have to know how other people are using it, particularly students. Because it's been an issue already, that some students are passing their exams, but they haven't really acquired the knowledge expected.\u201d</em></p><p><br /></p><p>From that, it can be inferred that:</p>", "media": null, "options": [{"option_id": "61c9b2e2-7d2f-402f-860f-f60f5f3b7614", "content": "People don\u2019t know how to use AI to learn languages.", "image_url": ""}, {"option_id": "e1f63e0b-a5c5-4c5b-8716-27111d9f45c1", "content": "People should be taught how to use AI appropriately.", "image_url": ""}, {"option_id": "49bbbade-c6bf-459c-b130-8cebd5fd230b", "content": "It takes a lot of work to use AI, so we shouldn\u2019t use it.", "image_url": ""}, {"option_id": "fd93a8cb-ee0a-46ad-bc27-d526f356a42e", "content": "A teacher should never use AI or tell their students to use it.", "image_url": ""}], "answer": null}, {"question_id": "6e71e220-f454-4ede-8854-9a04f8d22dda", "assessment_id": "1bf91a35-20b9-4a2e-bd0f-be8ae2034698", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze an excerpt of Felipe\u2019s speech:</p><p><br /></p><p><em>\u201cI'm kind of afraid that people might get lazy because apps or tools will help people communicate without the need of having to learn any language, and that could become super handy.\u201d</em></p><p><br /></p><p>Select the option that explains \u201chandy\u201d correctly:</p><p><br /></p>", "media": null, "options": [{"option_id": "c4a1cdc1-ae71-434b-a06a-9603d8ebacd7", "content": "made by hand", "image_url": ""}, {"option_id": "77ecbadc-ff1d-4003-bcba-22eac0ea2eeb", "content": "very nice", "image_url": ""}, {"option_id": "34ca1304-a333-4a40-81e5-2782b9548cc8", "content": "convenient", "image_url": ""}, {"option_id": "bea9ccf5-a729-48ee-9b6d-bf42f088efc4", "content": "useless", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
