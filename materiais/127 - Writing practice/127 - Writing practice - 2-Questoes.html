<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "09582029-4734-4a9c-9858-372d3b21be3c", "assessment_id": "ac123eed-6c40-4228-8a6a-a0c3c4dff11f", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Usually, I don\u2019t reveal this to people, but you seem \"worthy\" of knowing this trick.</p><p><br></p><p>Se algu\u00e9m diz \u201cyou seem worthy of knowing something\u201d significa?</p>", "media": null, "options": [{"option_id": "e20479e8-c28d-4c59-92de-4fe659ba87ef", "content": "You seem unworthy of knowing this secret.", "image_url": ""}, {"option_id": "93d3849b-225e-4e7b-99ab-5a48cfd24370", "content": "It's clear you shouldn't have access to this information.", "image_url": ""}, {"option_id": "30dbd19f-064b-4223-a6af-f5d708adfaac", "content": "You look like the kind of person I can trust with this information", "image_url": ""}, {"option_id": "83c86a3a-54c0-4e03-b7df-62098bade30d", "content": "You don't strike me as someone who should know this.", "image_url": ""}], "answer": null}, {"question_id": "bcd8849b-3fda-48c7-886c-d2a0fbb7c1c6", "assessment_id": "ac123eed-6c40-4228-8a6a-a0c3c4dff11f", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>\"Some people have been using natural products for makeup, like using beets as lipstick or even charcoal as eyeshadow. By doing so, they can save money, show respect for the environment, make use of the gifts of nature, and promote better health.\"</p><p><br></p><p>O uso de produtos naturais em maquiagem:</p>", "media": null, "options": [{"option_id": "ae77f6c5-75d1-4107-99e5-6d2f733da025", "content": "is a way to be eco-friendly and promote better health.", "image_url": ""}, {"option_id": "b38080a9-e325-4b9d-83b3-a7bebb98e9bd", "content": "supports conventional makeup companies.", "image_url": ""}, {"option_id": "71d7800b-2522-4254-bc00-96bb4d257c8d", "content": "Is unknown. Nobody uses it. ", "image_url": ""}, {"option_id": "43b2eac4-79eb-4475-88a4-2b463bb839e2", "content": "is only for rich people since it\u2019s really expensive. ", "image_url": ""}], "answer": null}, {"question_id": "2d75bb46-5f0b-4bcf-94fe-0e39b941b86b", "assessment_id": "ac123eed-6c40-4228-8a6a-a0c3c4dff11f", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Levando em considera\u00e7\u00e3o o uso do by oneself, qual n\u00e3o se enquadra?</p><p><br></p>", "media": null, "options": [{"option_id": "009d4898-1315-42c1-974a-e92e98db8ae3", "content": "I have a party to go and I\u2019ll have to do my makeup by myself. ", "image_url": ""}, {"option_id": "bd0f24bd-010f-41c6-be88-9cd2f2aa8195", "content": "She said living by herself changed her life. ", "image_url": ""}, {"option_id": "0460e71e-4a9e-4fb9-991c-16de5e9db0ac", "content": "My young self would be proud of me today. ", "image_url": ""}, {"option_id": "d3961aab-7408-4a0b-97be-66eeeef33cfe", "content": "Kids can\u2019t do things by themselves. ", "image_url": ""}], "answer": null}, {"question_id": "2934d696-3844-40e8-be00-6d4673f27d87", "assessment_id": "ac123eed-6c40-4228-8a6a-a0c3c4dff11f", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>I. She used pretty eyeshadow colors for her makeup.</p><p>II. Her makeup looked pretty amazing for the special occasion</p><p><br></p><p>Pretty nas frases:</p><p><br></p>", "media": null, "options": [{"option_id": "1970ab71-83f6-43e8-88e8-c75e83b4fe90", "content": " I. it\u2019s used to emphasize; II. it\u2019s used to describe. ", "image_url": ""}, {"option_id": "4093ce78-84ee-4512-8d05-3295ecadacb7", "content": "I. it\u2019s used to describe; II. it\u2019s used to emphasize. ", "image_url": ""}, {"option_id": "a2feb7dd-0da4-4f1f-b62f-4ceba0d97b4b", "content": "both mean the same. ", "image_url": ""}, {"option_id": "46ba063e-a803-47d6-862d-05f86cd8f625", "content": "I. it\u2019s the name of the makeup brand. II. it\u2019s used to emphasize. ", "image_url": ""}], "answer": null}, {"question_id": "ae671515-f0ec-4a0b-9b45-275fbc84c314", "assessment_id": "ac123eed-6c40-4228-8a6a-a0c3c4dff11f", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>\"Many people have makeup tricks that no one knows about. These hidden techniques are like secrets they keep to themselves.\"</p><p><br></p><p>O que as pessoas fazem com seus truques de maquiagem?&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "0e87ab2f-24be-494e-b006-9369467c5c01", "content": "Share them with everyone.", "image_url": ""}, {"option_id": "b25571ff-ccca-4e8b-bf73-ed7fc258a2bb", "content": "Keep them hidden.", "image_url": ""}, {"option_id": "759e49c3-f0a4-4168-b9aa-2059adfa063b", "content": "Forget about them.", "image_url": ""}, {"option_id": "61751db3-2b25-4ced-b00b-a5e399e559e1", "content": "Sell them online.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
