<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "e6b94665-ddaa-4e44-9150-1f7d250e30a9", "assessment_id": "a45405f1-6b32-4d4f-afdb-442cdb8dfe63", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the part of what Haminat said:</p><p>\u201cI don't think I've come across any French cartoons, but in Spanish, they have this little girl, Dora the Explorer. And it makes the language fun and exciting for her, it makes it easier to learn.\u201d</p><p><br></p><p>Select the option where \u201ccome across\u201d can be replaced and still fit the context:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "5da18a5a-36b4-4ce4-ba59-b0b78775cc71", "content": "pass by", "image_url": ""}, {"option_id": "f2c9076a-ea71-4a5b-bd05-1e042cb05118", "content": "come upon", "image_url": ""}, {"option_id": "503fd1de-7d1d-46fe-9e02-0669c2996c51", "content": "missed", "image_url": ""}, {"option_id": "9cb2ecd8-e07e-4589-a841-2566d21629c6", "content": "come to cross", "image_url": ""}], "answer": null}, {"question_id": "a542a58d-9357-4610-94a7-a4cc53bda3f4", "assessment_id": "a45405f1-6b32-4d4f-afdb-442cdb8dfe63", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the part where Haminat talked about cultural differences:</p><p><br></p><p>\u201cI think in terms of respect. Everybody has their own ways of showing respect. And showing compassion. I try to talk to you about something and the way you respond, your facial expression gives you a lead, without saying anything.\u201d</p><p><br></p><p>By that, it can be inferred that:</p><ol><li><br></li></ol><p><br></p>", "media": null, "options": [{"option_id": "41b37c1e-1e70-432c-8858-cfaae8acc89c", "content": "Everybody is respectful when they meet foreign people.", "image_url": ""}, {"option_id": "70c757d9-accf-453c-a607-efd0c7d07bca", "content": "Body language is important in cross-cultural communication.", "image_url": ""}, {"option_id": "492820d4-08f3-4d23-989c-aee888d68532", "content": "People always show compassion with their body language.", "image_url": ""}, {"option_id": "59ccdfa2-3ced-4ae2-8a5d-384233689813", "content": "Somebody\u2019s facial expressions should be the only thing you pay attention to.", "image_url": ""}], "answer": null}, {"question_id": "6a17039d-9716-4f9d-9ff5-02a37f5ceec6", "assessment_id": "a45405f1-6b32-4d4f-afdb-442cdb8dfe63", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze what Haminat said about places to go in Nigeria:</p><p><br></p><p>\u201cOh, I'll say, our clubs are awesome actually, apart from the beaches. Well, the beaches are just, still beaches. But, you know, when you go to the club at night, you\u2019ll feel it. Nigerians love to have fun. Once it\u2019s Friday, no work anymore, we call it boogie-woogie. Just leave out the stress and have fun.\u201d</p><p><br></p><p>By \u201cyou\u2019ll feel it\u201d, it can be inferred that she is talking about:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "02e753c2-4ff1-48d9-90e5-42f164967816", "content": "the awesome beaches", "image_url": ""}, {"option_id": "d008b2c8-9e3f-464b-918a-faf36ca5d17f", "content": "Nigerians not working on Friday", "image_url": ""}, {"option_id": "449c73e6-028c-4034-bf16-df625884985f", "content": "the Nigerian fun atmosphere", "image_url": ""}, {"option_id": "916d05ac-0bfc-46c6-9e0d-c0cac7ce9d10", "content": "the clubs at night", "image_url": ""}], "answer": null}, {"question_id": "564976e1-4b8c-477a-b390-7765cd102bd4", "assessment_id": "a45405f1-6b32-4d4f-afdb-442cdb8dfe63", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze what Haminat said about her favorite thing about living in Nigeria:</p><p><br></p><p>\u201cThe culture and the diversity in languages, we have over 200 different languages spoken in Nigeria.\u201d</p><p><br></p><p>Select the option that could replace \u201cover\u201d in the same context:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "ad462709-d12a-450d-8201-8eb149406651", "content": "more than", "image_url": ""}, {"option_id": "5b2a366a-e100-44a0-b258-16271e5c82f8", "content": "less than", "image_url": ""}, {"option_id": "ef799659-c51e-49e9-a35a-0a7ebb50a636", "content": "on top of", "image_url": ""}, {"option_id": "494a3f62-50d4-431d-ac82-4a57260eed1f", "content": "about", "image_url": ""}], "answer": null}, {"question_id": "8a8a93e6-99da-4ec7-a69c-eded3a78f912", "assessment_id": "a45405f1-6b32-4d4f-afdb-442cdb8dfe63", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze what Haminat said about Nigerian people speaking dialects:</p><p><br></p><p>\u201cI hear from many different people, many different ethnic groups, they talk about how important it is to keep those traditions alive and to pass on those languages, right?\u201d</p><p><br></p><p>Select the option that correctly explains \u201cpass on\u201d:</p><p><br></p>", "media": null, "options": [{"option_id": "8dadd206-e98f-41f5-9d0e-e8a876a604f6", "content": "to pass by the language practice", "image_url": ""}, {"option_id": "56c23f63-3e9e-4c91-9f02-03eec4e2db0d", "content": "to propagate the language along generations", "image_url": ""}, {"option_id": "53835c5a-0bbd-4c9e-bd03-890efca88790", "content": "to hear many different people talking about it", "image_url": ""}, {"option_id": "1bb0b2a6-1cfe-4e8b-981c-5e0cfe89bd99", "content": "to pass off the language and the dialects", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
