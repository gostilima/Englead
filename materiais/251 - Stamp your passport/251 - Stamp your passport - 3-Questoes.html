<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "0a2e3aa4-7b3f-4ffc-87fc-dbd97c7ac3fb", "assessment_id": "76d5712e-c429-4c59-8319-47818594546a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>What main idea can you infer from this passage?</p><p>\u00a0</p><p>Marijana said,<em> \u201cCommunication is an omnipresent thing but, at the same time, it includes so many elements and complexities. So, I would say that communication is a way of living, in a way, and at the same time one of the most, if not, impactful tools for living.\u201d</em></p><p><em>\u00a0</em></p>", "media": null, "options": [{"option_id": "741bf344-99ba-42a5-ae35-217fd9136673", "content": "Communication is not only a fundamental aspect of existence but also a powerful and impactful tool for navigating life.", "image_url": ""}, {"option_id": "941b0090-5ca9-4e49-b6e3-e94ebc93215a", "content": "The passage suggests that communication is not a simple or straightforward concept.", "image_url": ""}, {"option_id": "31236ae7-6141-4c38-9f44-ce213a9619b3", "content": "The speaker implies that communication is not just an activity or skill but a way of living.", "image_url": ""}, {"option_id": "522b780a-38ae-444b-8901-ee9541e69353", "content": "The use of the term \"omnipresent\" indicates that communication is ever-present and pervasive in our daily lives.", "image_url": ""}], "answer": null}, {"question_id": "b3a33adb-6d0d-4028-ace4-6add703d460d", "assessment_id": "76d5712e-c429-4c59-8319-47818594546a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression:</p><p>\u00a0</p><p><em>I was invited to join a golf tournament over the weekend, but golf is _______________.</em></p><p>\u00a0</p>", "media": null, "options": [{"option_id": "6693ab6d-95af-4b75-902b-e37a76962eb0", "content": "something that I enjoy", "image_url": ""}, {"option_id": "994e7727-4bc4-48cb-8329-2c8057cef99c", "content": "not my cup of tea", "image_url": ""}, {"option_id": "11c7ed14-6aca-4996-8f4d-d09d4e4e1fc8", "content": "a favorite of mine", "image_url": ""}, {"option_id": "8baa399e-13b5-4386-97de-236470de8527", "content": "my kind of thing", "image_url": ""}], "answer": null}, {"question_id": "04a9a779-c526-465f-b049-526b2a6273f2", "assessment_id": "76d5712e-c429-4c59-8319-47818594546a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the correct word to complete the sentence.</p><p>\u00a0</p><p><em>\"If I want to suggest something to somebody, I shall offer them ______ advice.\"</em></p><p>\u00a0</p>", "media": null, "options": [{"option_id": "bf28e64a-4a56-467b-8691-cbdc7e635df5", "content": " a", "image_url": ""}, {"option_id": "f4c74d37-7067-4f2e-a5c0-a564c79348d7", "content": "many", "image_url": ""}, {"option_id": "05ff21ad-1515-4f0e-bb16-6d4ab20cff05", "content": " a piece of", "image_url": ""}, {"option_id": "60aa28ca-aacc-4bd6-a041-ffee65e9a4e4", "content": "a few", "image_url": ""}], "answer": null}, {"question_id": "8db923f9-b8e8-4973-aa67-a079b5712107", "assessment_id": "76d5712e-c429-4c59-8319-47818594546a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Select the option that cannot replace the expression in bold.</p><p>\u00a0</p><p><em>\"I've always been fascinated by Spanish culture, so I decided to make Spanish my </em><strong><em>target language</em></strong><em>. I'm taking classes, practicing with native speakers, and even watching Spanish movies to immerse myself in the language.\"</em></p><p>\u00a0</p>", "media": null, "options": [{"option_id": "14b0ca25-ed51-40a0-befe-159932681780", "content": "language of interest", "image_url": ""}, {"option_id": "6fe27715-5567-4ef2-a047-685d0b55d2e9", "content": "additional language", "image_url": ""}, {"option_id": "a595d5d3-d4c5-4f3e-b08e-f8d3876e5c1f", "content": "goal language", "image_url": ""}, {"option_id": "7cf024b1-d6de-4559-a89b-2502cb1e035b", "content": "first language", "image_url": ""}], "answer": null}, {"question_id": "e30664dd-1703-450e-8114-4985fbf197cb", "assessment_id": "76d5712e-c429-4c59-8319-47818594546a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer the question.</p><p>\u00a0</p><p><em>Marijana said, \u201cI\u2019ve always liked reading and that includes reading in English as well. And that would be my piece of advice to my students, so try to immerse yourself, try to expose yourself, and use the target language as much as possible. Reading, watching movies/TV shows, listening to music\u2026\u201d</em></p><p>\u00a0</p><p>What is the main advice Marijana offers to her students regarding language learning?</p><p>\u00a0</p>", "media": null, "options": [{"option_id": "4b87c63c-e090-4440-977e-eef49fce24e9", "content": "She believes that the correct approach to language learning mainly involves reading.", "image_url": ""}, {"option_id": "fd286165-ef69-4f3c-8018-460d98f5e61c", "content": "She believes that formal education is the right way to learn a language.", "image_url": ""}, {"option_id": "f3e52d39-0b7e-4292-abe0-af6e40b04cc3", "content": "She emphasizes the importance of using the target language sometimes.", "image_url": ""}, {"option_id": "f94ab137-b896-46d5-a819-9c1e4588e5d9", "content": "She suggests trying to expose oneself to the language as much as possible.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
