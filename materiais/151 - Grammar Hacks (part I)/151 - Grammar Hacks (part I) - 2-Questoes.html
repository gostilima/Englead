<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "f1f8875b-3f86-4fbb-a538-e7fe548d18c4", "assessment_id": "06d5de41-bc8b-4daa-9e6d-090aedd24b8c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Can you arrange for my wife and me ________ some free time together?</p><p><br></p>", "media": null, "options": [{"option_id": "a033d24c-26e6-4ea5-babc-dd9399530864", "content": "having ", "image_url": ""}, {"option_id": "bc638adc-15c6-42ed-a7d6-2001efb11849", "content": "to have", "image_url": ""}, {"option_id": "df7c747c-dea5-44e5-bda5-edb48bba59a6", "content": "has", "image_url": ""}, {"option_id": "7a06376d-fdd5-4208-b342-0af5398bedce", "content": "Is having ", "image_url": ""}], "answer": null}, {"question_id": "d1633518-87e5-498b-8350-f2e830b595f6", "assessment_id": "06d5de41-bc8b-4daa-9e6d-090aedd24b8c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p><strong>\u201c</strong>Sorry, I can\u2019t help you ________________ the assignment right now.\u201d&nbsp;</p>", "media": null, "options": [{"option_id": "cb8c4369-0dfe-46b1-9423-e31c0b4f797e", "content": "to understand", "image_url": ""}, {"option_id": "d90d8fd9-3086-4a31-bb4f-aad991671dbc", "content": "understand", "image_url": ""}, {"option_id": "fa4966d1-240e-450e-9c15-2217344950a8", "content": "understanding", "image_url": ""}, {"option_id": "880022c5-976e-448a-9ee6-20b7c7b5d18c", "content": "understood", "image_url": ""}], "answer": null}, {"question_id": "051c3757-8306-4afe-86c9-612d6df846c6", "assessment_id": "06d5de41-bc8b-4daa-9e6d-090aedd24b8c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>The woman wants the person to buy a new car. Choose the alternative that presents the correct sentence if said from the person\u2019s point of view:</p>", "media": null, "options": [{"option_id": "08455d08-0334-45b7-b13a-cf2e6d4103de", "content": "She followed me to buy a new car. ", "image_url": ""}, {"option_id": "306a39a3-2b37-445b-aef3-c6491b4ac450", "content": "I persuaded her to buy me a new car.", "image_url": ""}, {"option_id": "77a97449-d823-452f-b232-fd48e2de3d5f", "content": "We were persuaded by the girl.", "image_url": ""}, {"option_id": "797d9f32-51a8-4155-b973-2088167cb9d5", "content": "She persuaded me to buy a new car.", "image_url": ""}], "answer": null}, {"question_id": "1b984e92-2cba-4899-914f-4b64e6d2f12d", "assessment_id": "06d5de41-bc8b-4daa-9e6d-090aedd24b8c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>What\u2019s correct about the following sentences?</p><p><br></p><ol><li>Please, let me show you around.</li><li>Please, allow me to show you around.</li></ol><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "6a6021fb-0e36-47e0-a8b4-b6fa81f6c34a", "content": "I. is more polite and used in formal situations", "image_url": ""}, {"option_id": "174e9278-7870-4c03-bd61-6e3ad360a474", "content": "Both mean the same thing and can be used in the same way", "image_url": ""}, {"option_id": "7a6eb26f-0976-4423-8f0e-bbcbc57972de", "content": "II. is used to ask for a favor", "image_url": ""}, {"option_id": "4b1aa741-5392-412c-b532-c391e98e230c", "content": "Both are asking to go to a concert, but II. is less formal ", "image_url": ""}], "answer": null}, {"question_id": "167c8e12-a28d-4104-b8c9-c5c575f0bad9", "assessment_id": "06d5de41-bc8b-4daa-9e6d-090aedd24b8c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the following sentence and choose the option that follows the same pattern:</p><p><br></p><p><strong>\u201c</strong>There is no way you can make me feel worse.\u201d&nbsp;</p>", "media": null, "options": [{"option_id": "0f81366c-61b3-4965-ae34-ff041a363dda", "content": "They attempted every trick to make the audience laugh heartily.", "image_url": ""}, {"option_id": "e9e0b4de-3696-4d9c-acc7-f32cc76dab2b", "content": "His passion for music can make even the gloomiest days brighter.", "image_url": ""}, {"option_id": "a66a8dd3-6eb9-495d-a35f-657f391ba78f", "content": "The chef can make a variety of delicious dishes from scratch.", "image_url": ""}, {"option_id": "1069dd9e-c576-4229-987f-214761778d32", "content": "Practice and determination make for a successful athlete.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
