<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "3e29cc45-304f-4d28-a241-3e1c1ee50d55", "assessment_id": "0b7a677f-7047-45ef-8076-6b9eec3ea948", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>- _________________________________?</p><p>- They study French every Monday.</p>", "media": null, "options": [{"option_id": "bf3f0ea5-1f4a-4f9e-945b-04e1cb78ce36", "content": "Do they study?", "image_url": ""}, {"option_id": "e6855dfb-17d6-4b75-afb0-e947b0263d37", "content": "When do they study French?", "image_url": ""}, {"option_id": "59eaa36d-0aaa-41f3-87b2-444d5e06f37c", "content": "Why do they study French?", "image_url": ""}, {"option_id": "365b5d20-2cbe-4d71-bcd1-d9434d12db8c", "content": "Where do they study French?", "image_url": ""}], "answer": {"option_id": "365b5d20-2cbe-4d71-bcd1-d9434d12db8c", "feedback": "When do they study French? When = \u201cquando\u201d.", "correct_option_id": "e6855dfb-17d6-4b75-afb0-e947b0263d37"}}, {"question_id": "f1af66da-5368-41f4-b61e-491c03dc27c1", "assessment_id": "0b7a677f-7047-45ef-8076-6b9eec3ea948", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Selecione a frase gramaticalmente correta:</p>", "media": null, "options": [{"option_id": "3490683a-7f27-4c2b-a354-6ea5954263c8", "content": "What do we do on Saturdays?", "image_url": ""}, {"option_id": "7f710da4-a472-4fa0-93b3-f81417968606", "content": "Do we do on Saturdays?", "image_url": ""}, {"option_id": "84749a31-d255-4014-8742-56d891fe2641", "content": "Why do we do on Saturdays?", "image_url": ""}, {"option_id": "fbd7dc7f-5a6b-47a1-89e4-e5c40f7e56b6", "content": "When do we do on Saturdays?", "image_url": ""}], "answer": {"option_id": "3490683a-7f27-4c2b-a354-6ea5954263c8", "feedback": "A forma correta de fazer uma pergunta usando \u201cwhat\u201d e \u201cwe\u201d \u00e9 usando \u201cdo\u201d. ", "correct_option_id": "3490683a-7f27-4c2b-a354-6ea5954263c8"}}, {"question_id": "2bb17389-5330-4f05-b424-8a87f8842b6c", "assessment_id": "0b7a677f-7047-45ef-8076-6b9eec3ea948", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>- ________________________?</p><p>- I play soccer with my friends in the park.&nbsp;</p>", "media": null, "options": [{"option_id": "84127600-e4e2-4ab2-b477-d7a315e7a64f", "content": "When do you play soccer with your friends", "image_url": ""}, {"option_id": "90eaeb8b-a930-4b17-af2a-8ed6b4cff470", "content": "Why do you play soccer with your friends", "image_url": ""}, {"option_id": "3a031090-3bcd-4828-9c46-450f58b9a193", "content": "Where do you play soccer with your friends", "image_url": ""}, {"option_id": "2da4fb41-c4f0-482d-99f4-68c54eb967af", "content": "How do you play soccer with your friends", "image_url": ""}], "answer": {"option_id": "3a031090-3bcd-4828-9c46-450f58b9a193", "feedback": "Usamos \u201cwhere\u201d para fazer perguntas sobre lugares.", "correct_option_id": "3a031090-3bcd-4828-9c46-450f58b9a193"}}, {"question_id": "ae07d0da-c390-48e0-8020-e613c2b476f8", "assessment_id": "0b7a677f-7047-45ef-8076-6b9eec3ea948", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea v\u00ea um colega da faculdade meio para baixo. Voc\u00ea pergunta para outra pessoa da turma:</p>", "media": null, "options": [{"option_id": "63fc4640-9a6d-4df3-a255-2731439a3b96", "content": "Where is he so upset?", "image_url": ""}, {"option_id": "0128bc2f-9a04-4716-a7bc-f9d47634cff9", "content": "When is he so upset?", "image_url": ""}, {"option_id": "f2f73330-d25a-4a07-9d14-c862062f087d", "content": "What is he so upset?", "image_url": ""}, {"option_id": "ab3b9bc4-1b78-482b-8a26-4aff37fceb68", "content": "Why is he so upset?", "image_url": ""}], "answer": {"option_id": "ab3b9bc4-1b78-482b-8a26-4aff37fceb68", "feedback": "\u201cWhy is he so upset?\u201d Usamos \u201cwhy\u201d para perguntar a raz\u00e3o de algo.", "correct_option_id": "ab3b9bc4-1b78-482b-8a26-4aff37fceb68"}}, {"question_id": "528d5d58-6fa5-4703-9ce6-f837fa594e3b", "assessment_id": "0b7a677f-7047-45ef-8076-6b9eec3ea948", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Para saber a maneira como algo \u00e9 feito, voc\u00ea deve usar a palavra\u2026</p>", "media": null, "options": [{"option_id": "b92087dd-7ee5-496a-8b77-5583edfc86c4", "content": "Where", "image_url": ""}, {"option_id": "7b137d36-9c08-4084-8e0b-3ab9bc0343ff", "content": "When", "image_url": ""}, {"option_id": "d271d501-2311-48fa-8c9d-2431696a28a9", "content": "How", "image_url": ""}, {"option_id": "e41ab3d5-4f57-4ce4-848f-357cd448db41", "content": "Why", "image_url": ""}], "answer": {"option_id": "d271d501-2311-48fa-8c9d-2431696a28a9", "feedback": "\u201cHow\u201d = \u201ccomo\u201d.", "correct_option_id": "d271d501-2311-48fa-8c9d-2431696a28a9"}}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
