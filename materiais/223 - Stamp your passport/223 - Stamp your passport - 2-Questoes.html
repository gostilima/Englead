<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "8ef47898-db3a-4f97-8c5d-eefb53165669", "assessment_id": "f2c4fe5d-a28c-48a9-8712-789cf9011e9b", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer: what is Yann's desire regarding the Northeast of Brazil?</p><p><br></p><p>Yann said, \u201cI want to be in a helicopter with a big producer. I want to spend one week in the Amazon and the third thing is to spend more time in the Northeast of Brazil. I stayed just 3 days and I didn\u2019t really get the culture because it looks like another</p><p>country. So I want to get there, spend more time and understand things better.\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "c9298682-cc13-400e-a27b-e6aff6b77bae", "content": "He wants to stay for three days", "image_url": ""}, {"option_id": "2020111b-cd6b-46a2-a642-136e11c036f4", "content": "He wants to spend more time and understand things better", "image_url": ""}, {"option_id": "38b5253b-e4f5-424e-ab9b-991781e5709f", "content": "He wants to avoid visiting it again", "image_url": ""}, {"option_id": "e16a9db1-a0ee-4fa2-a154-c32d033407a4", "content": "He disliked the culture and did not understand it", "image_url": ""}], "answer": null}, {"question_id": "54b924fa-b7ef-4b5c-816c-802967da60f2", "assessment_id": "f2c4fe5d-a28c-48a9-8712-789cf9011e9b", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the text about Yann's perspective on travel planning and select the false statement:</p><p><br></p><p>Yann said, \u201cTraveling is a project. It\u2019s not just to buy the flight, go for a week and come back. You have to plan it, not each detail because you can go freestyle, but you have to plan the milestones of your project, of your plan. What are the things you cannot miss? So write your project, document it. What do you want to capture, if you want to take pictures? What do you want to do, to carry, to discover? So write it because it's the guarantee you will get what you need. Define what you need, what you want and you will be able to see how much money you can put on it, if you can take risks\u2026 So if you haven't this plan you will just go and&nbsp; you will be the victim of the travel, be the actor of your travel, so plan your project.\u201d&nbsp;</p><p><strong>&nbsp;</strong>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "f545529a-6600-40dd-acc1-f03d18055cf4", "content": "Yann suggests that traveling involves more than just buying a flight and going for a week; it's a project that requires planning.", "image_url": ""}, {"option_id": "fb3bd995-0d70-456b-9356-e07ce4d55899", "content": "According to Yann, detailed planning is essential for a successful trip, and every aspect should be carefully organized.", "image_url": ""}, {"option_id": "280f998c-4b64-4e03-83dd-705115989771", "content": "Yann recommends going freestyle without any planning for a more spontaneous travel experience.", "image_url": ""}, {"option_id": "ef781be7-8b62-48c0-9c3d-da7dacaf165a", "content": "Documenting your travel project is crucial, especially noting the milestones and things you cannot miss during the trip.", "image_url": ""}], "answer": null}, {"question_id": "51408f69-69cc-43bc-9e8e-7e55e17a8bc4", "assessment_id": "f2c4fe5d-a28c-48a9-8712-789cf9011e9b", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the following sentence by filling in the</p><p>blank with the appropriate word:</p><p>&nbsp;</p><p>\"A/An __________ is someone who speaks English as their first language.\"</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "052a3b48-8264-4c3e-a63c-5dae83c00d04", "content": "Anglophone", "image_url": ""}, {"option_id": "df105d7a-f957-4f66-ba7d-7edb4d5e5812", "content": "Francophone", "image_url": ""}, {"option_id": "9b461d36-15c5-42b0-8274-bf7fd0143d2a", "content": "Hispanophone", "image_url": ""}, {"option_id": "34b5ee06-7a31-4a53-bf26-c76b3591006c", "content": "Non-English language user", "image_url": ""}], "answer": null}, {"question_id": "cbb135c6-79a7-4fc5-95ef-f91f24799842", "assessment_id": "f2c4fe5d-a28c-48a9-8712-789cf9011e9b", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p><strong>&nbsp;</strong>Fill in the blank with the appropriate word:</p><p>&nbsp;</p><p>The English language has various ____________, such as British English, American English, and Australian English.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "200e5012-d589-42f5-b308-349fc20712e5", "content": "languages", "image_url": ""}, {"option_id": "cc3d1ef4-8b99-4cf6-acaa-797513080c17", "content": "dialects", "image_url": ""}, {"option_id": "3780ed24-44c9-4a76-b5ba-0629ce71cc87", "content": "accents", "image_url": ""}, {"option_id": "1c263929-af6b-437e-ba28-3f62ba1b1ccf", "content": "intonations", "image_url": ""}], "answer": null}, {"question_id": "faf61908-2709-487a-92ce-8d091a855003", "assessment_id": "f2c4fe5d-a28c-48a9-8712-789cf9011e9b", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Look at the picture and finish the sentence:</p><p>&nbsp;</p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXcWo-Ni6bE2406R0I5jhDd0I4y1jTJy5v1DgYxTriNH3RZGBUHlt6wpKZdN_uGB5yWAjfTFR2uGruGdw6U6QaoU3bkfd4GpMcpYO40M9X2vRhWE3KZOCaWty4vvescE6KEo0NdbuCM86IZXxwd3OCu0nYGl?key=l2pE9ZgSD6CVlqCLOOvuWw\">&nbsp;</p><p><br></p><p>It seems that somebody was running late and decided to\u2026</p><p><br></p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "7917cc9e-7db3-45b2-b317-84f0605a49df", "content": "mow the lawn", "image_url": ""}, {"option_id": "d460e16a-967a-4141-b5bc-93d9a7c1d514", "content": "exit the highway in a rush", "image_url": ""}, {"option_id": "19536d95-ea86-4f85-b6f9-52c642a83ed1", "content": "take a shortcut through the grass and save time", "image_url": ""}, {"option_id": "be9286bf-b95b-499c-9943-69586d13b571", "content": "build a path in the middle of the highway", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
