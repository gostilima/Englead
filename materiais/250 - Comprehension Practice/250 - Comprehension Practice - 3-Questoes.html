<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #042A35;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "cf5240b4-2c0f-4cb8-bb4f-7bc0c4bfc42d", "assessment_id": "000bb2de-6cdb-486c-86eb-995f92ede003", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio. How does witnessing or receiving acts of grace and compassion influence individuals?</p><p>&nbsp;</p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/1723659027972275_GET_THE_TALK_U12_Acts-of-grace-and-compassion-.mp3"}, "options": [{"option_id": "201add44-e7b2-4a1e-92c0-72975907bc72", "content": "Acts of grace and compassion highlight the importance of kindness and generosity in human interactions and relationships.", "image_url": ""}, {"option_id": "7ab06545-08c2-41c1-a16e-a1cdde7f5d00", "content": "Experiencing grace and compassion inspires individuals to embody these qualities in their own behavior.", "image_url": ""}, {"option_id": "44c61581-7166-4912-b79f-c0b233b5a460", "content": "By incorporating acts of grace and compassion individuals contribute to fostering a compassionate environment.", "image_url": ""}, {"option_id": "95c8c1a2-46e8-4312-b562-8822b20a3018", "content": "Individuals are encouraged to incorporate acts of kindness and generosity into their own actions", "image_url": ""}], "answer": null}, {"question_id": "45f49763-ada5-4738-aa48-f14d7ad612cf", "assessment_id": "000bb2de-6cdb-486c-86eb-995f92ede003", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer the question.</p><p>&nbsp;</p><p>Shah Rukh Khan said, \u201cThe two-and-a-half alphabets which form the word \"\u092a\u094d\u0930\u0947\u092e,\" which means \"love,\" if you are able to understand that and practice it, that itself is enough to enlighten mankind. So I truly believe the future \"you\" has to be a you that loves. Otherwise, it will cease to flourish. It will perish in its own self-absorption.\u201d</p><p>&nbsp;</p><p>According to Shah Rukh Khan, what happens if we, humankind, don\u2019t love?</p><p><br></p>", "media": null, "options": [{"option_id": "86294342-0111-45af-b1cd-7377e11b29fa", "content": "We stay single and alone", "image_url": ""}, {"option_id": "30800c66-bca4-4402-b294-48e2cbd83892", "content": "We get very sad", "image_url": ""}, {"option_id": "e208bb1b-e6d3-420e-973f-9cfee6d9397f", "content": "We perish in self-absorption", "image_url": ""}, {"option_id": "751054a1-26d9-4b70-9e73-0e07243ea9a7", "content": "We stay connected to the nature", "image_url": ""}], "answer": null}, {"question_id": "d58ae8dc-6c00-45e0-95e3-84c45e6195ac", "assessment_id": "000bb2de-6cdb-486c-86eb-995f92ede003", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and describe Shah Rukh Khan's vision of the future \"you\" based on it.</p><p>&nbsp;</p><p>Shah Rukh Khan said, \u201cSo you may use your power to build walls and keep people outside, or you may use it to break barriers and welcome them in. So I believe the future \"you\" is an infinite you. A you that returns back to the original innocence of humanity, which loves from the purity of heart, which sees from the eyes of truth, which dreams from the clarity of an untampered mind.\u201d</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "96c2d23f-5ead-46e8-a8c1-c4f56b0cfb9d", "content": "He envisions a future version of \"you\" as a finite entity, disconnected from the innate innocence of humanity.", "image_url": ""}, {"option_id": "1c85e611-fcca-487f-842e-18c189e3e7b0", "content": "The vision is one of a future self that rejects fundamental human virtues and perspectives.", "image_url": ""}, {"option_id": "cca498c3-026c-4f3d-8c2a-e11e54f0c201", "content": "He emphasizes the idea of adhering to limitations and staying within boundaries.", "image_url": ""}, {"option_id": "f3b66468-027f-49ad-b65b-63b16bdf8fb9", "content": "He imagines a future version of \"you\" as an endless entity, reconnecting with the innate innocence of humanity.", "image_url": ""}], "answer": null}, {"question_id": "27213e3a-2a64-4a57-bdc2-1e856601c9af", "assessment_id": "000bb2de-6cdb-486c-86eb-995f92ede003", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the word that cannot be used in this sentence:</p><p>&nbsp;</p><p>In the face of global issues like climate change, countries are collectively ____________ with finding sustainable solutions.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "7a5df857-8d78-42a8-9524-4489c8ce8e2f", "content": "grappling", "image_url": ""}, {"option_id": "bc4eadd3-7f6c-4f1b-855e-9d2929f682cc", "content": "contending", "image_url": ""}, {"option_id": "90b10976-571e-4743-85bc-3e1b0f448e61", "content": "dealing", "image_url": ""}, {"option_id": "7ce77b1b-80c7-4bb5-be77-4efb60630445", "content": "ignoring", "image_url": ""}], "answer": null}, {"question_id": "ce7dc083-12cf-4f4c-a625-245226410d75", "assessment_id": "000bb2de-6cdb-486c-86eb-995f92ede003", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>What is another alternative to say the expression in bold?</p><p>&nbsp;</p><p>True love endures, <strong>regardless of</strong> external circumstances or challenges.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "99cf4f7d-68b2-42f2-a563-fa698ba1b4dd", "content": "despite", "image_url": ""}, {"option_id": "2ee65751-9a27-4107-9cd6-37433e8e8290", "content": "considering", "image_url": ""}, {"option_id": "618793d2-d0f3-46b9-be8e-5c01e6b723db", "content": "in light of", "image_url": ""}, {"option_id": "16060e02-9428-4dc2-82c5-48387c97cc0b", "content": "acknowledging", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
