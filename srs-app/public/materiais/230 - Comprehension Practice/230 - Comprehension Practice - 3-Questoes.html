<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "a457bb95-3ae1-43de-8842-c1b1e481973e", "assessment_id": "60c40ee9-b22e-4136-8116-894122922ee2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>According to Audio, which aspects of attention may be enhanced by playing action video games?</p><p><br></p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234675577115092_GET_THE_TALK_U07_Research-on-the-effects.mp3"}, "options": [{"option_id": "830e99c7-5c7c-4e6b-be21-d070918037e2", "content": "Memory and language skills", "image_url": ""}, {"option_id": "19498790-cb34-4ca5-bc13-ca0a9171ddea", "content": " Auditory attention and listening abilities", "image_url": ""}, {"option_id": "f0e50a58-c087-4501-ade3-49e4718eccde", "content": "Visual attention, spatial skills, and multitasking", "image_url": ""}, {"option_id": "4fcf16b7-703f-4f79-a9fe-20c9a2f5a483", "content": "Emotional intelligence and empathy", "image_url": ""}], "answer": null}, {"question_id": "7516a87e-46c0-47ce-b5fc-8d9e6061d633", "assessment_id": "60c40ee9-b22e-4136-8116-894122922ee2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and say which of the sentences is <strong>not </strong>a benefit of playing video games.</p><p>&nbsp;</p><p>Daphne Bavelier said, \u201cClearly when it comes to action video games, screen time doesn't make your eyesight worse.\u201d; \u201cThe other way that they are better is actually being able to resolve different levels of gray.\u201d; \u201cHow good your attention is determines actually how fast you resolve that conflict. What we can show is that when you do this kind of task with people that play a lot of action games, they actually resolve the conflict faster.\u201d</p><p><br></p>", "media": null, "options": [{"option_id": "b647f4b4-99dd-4bd7-a38d-f30af7c96551", "content": "Having a better eyesight", "image_url": ""}, {"option_id": "db069959-27d2-4549-9a2b-0a8f5aeeafbd", "content": "Resolving different levels of gray", "image_url": ""}, {"option_id": "bffa79f7-733c-4231-b062-3a0cbe15df21", "content": "Resolving conflicts faster", "image_url": ""}, {"option_id": "60fc4c97-a302-4f39-9b63-1befe2c6065f", "content": "Having better social abilities", "image_url": ""}], "answer": null}, {"question_id": "cd0259d2-f8eb-4922-9093-8880de068b14", "assessment_id": "60c40ee9-b22e-4136-8116-894122922ee2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer: which of the following options is <strong>not</strong> a part of the brain that is more efficient in gamers?</p><p>&nbsp;</p><p>Daphne Bavelier said, \u201cSo one part is the parietal cortex which is very well known to control the orientation of attention. The other one is the frontal lobe, which controls how we sustain attention, and another one is the anterior cingulate, which controls how we allocate and regulate attention and resolve conflict. Now, when we do brain imaging, we find that all three of these networks are actually much more efficient in people that play action games.\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "d9e87a8a-b665-4253-ae00-8d72ccca650c", "content": "Parietal cortex (controls the orientation of attention)", "image_url": ""}, {"option_id": "7397473a-c130-4ce6-b432-4446c09dd544", "content": "Frontal lobe (controls how we sustain attention)", "image_url": ""}, {"option_id": "a522b1b2-a41c-4662-ab3d-6a87ab8f4e84", "content": "Anterior cingulate (controls how we allocate/regulate attention and resolve conflict)", "image_url": ""}, {"option_id": "bdcbdb81-7177-48a3-820f-381f2e68d016", "content": "Hypothalamus (controls heart rate, blood pressure, and body temperature)", "image_url": ""}], "answer": null}, {"question_id": "539a485b-3148-48a2-8703-9939e6d99d1d", "assessment_id": "60c40ee9-b22e-4136-8116-894122922ee2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct option.</p><p>&nbsp;</p><p>The doctor advised Lisa to avoid __________ on sugary treats, emphasizing the importance of a balanced diet.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "b7234d89-068b-48d2-960f-bc5d0e598363", "content": "binging", "image_url": ""}, {"option_id": "5d9480b6-a951-4361-bd90-45787daa648e", "content": "exercising", "image_url": ""}, {"option_id": "cc778e95-7b62-4816-a3f2-e3bdf6fc9eb1", "content": " abstaining", "image_url": ""}, {"option_id": "eb284158-c300-457e-991f-962d808ec7ea", "content": "moderating", "image_url": ""}], "answer": null}, {"question_id": "cc07a08b-6550-40a0-8db2-607825ce0d70", "assessment_id": "60c40ee9-b22e-4136-8116-894122922ee2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the option that cannot replace the expression in bold.</p><p>&nbsp;</p><p><strong>Poor use</strong> of smartphones can lead to decreased productivity.</p><p>&nbsp;</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "136b85f1-0fdf-49c7-830f-af15a5a41730", "content": "Ineffective uses", "image_url": ""}, {"option_id": "2da9e4dc-4386-47ae-b9a8-cd96fb43d0bf", "content": "Unhealthy uses", "image_url": ""}, {"option_id": "1fb10bbe-95c3-448f-9a63-8438e59e007e", "content": "Inappropriate uses", "image_url": ""}, {"option_id": "79767cf3-b1bf-4209-9717-8332df56b2fc", "content": "inefficient uses", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
