<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "13c04881-4310-40b1-b079-5d4d21f28d54", "assessment_id": "8b64aea8-2251-4995-b759-46f9a2628297", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>In a cozy room, a small cat was sleeping in peace. It had a very beautiful black fur.&nbsp; It was sleeping on a soft, and very fluffy bed. The bed was so tiny and white, with the shape of a heart. Outside, the rain fell gently.</p><p><br></p><p>How would you use the word order to describe the cat and the bed using the text above?&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "28495a28-ab85-4cee-a7ff-652ece6032eb", "content": "It was a very beautiful, small, black cat peacefully sleeping on a soft and very fluffy, tiny, white, heart-shaped bed.", "image_url": ""}, {"option_id": "9beef96f-360d-4659-8223-44e8cf0f8e7e", "content": "It was a heart-shaped, very tiny, white bed that the peacefully small, beautiful black cat was sleeping on.", "image_url": ""}, {"option_id": "e7b38f05-5ed2-4c2b-adf9-5ea8c8bd4b02", "content": "It was a heart-shaped, black, and shiny bed that the tiny cat was sleeping on in peace.", "image_url": ""}, {"option_id": "7a1d350c-98f0-4b29-9036-1a9e669db90c", "content": "The small, heart-shaped, very beautiful black cat was sleeping on a tiny, white fluffy, and soft bed peacefully.", "image_url": ""}], "answer": null}, {"question_id": "a721879e-b883-4db4-8ea4-ad6f75e11f9b", "assessment_id": "8b64aea8-2251-4995-b759-46f9a2628297", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p><u>Sarah decided to diligently stick to her workout routine</u> at the local gym so that she could improve her fitness and overall health.</p><p><br></p><p>How would you rewrite the underlined sentence without changing its meaning? </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "f4feb751-92d1-4edf-9f13-e3aa858355bd", "content": "Sarah decided to brush up diligently on her workout routine.", "image_url": ""}, {"option_id": "e430eee2-f4a3-4c62-94cb-56fbf40d1dc1", "content": "Sarah decided to modify diligently her workout routine.", "image_url": ""}, {"option_id": "231276f3-1fd7-400a-9fd8-cbb9cb11a076", "content": "Sarah decided to adhere diligently to her workout routine.", "image_url": ""}, {"option_id": "4d31dd34-14c3-4a07-983f-09f842001982", "content": "Sarah decided to reflect diligently on her workout routine.", "image_url": ""}], "answer": null}, {"question_id": "821a3e77-b618-456a-8528-ac05ae8e2f6a", "assessment_id": "8b64aea8-2251-4995-b759-46f9a2628297", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the alternative that correctly emphasizes the highlighted information of the sentence below.</p><p><br></p><p>She met <strong>her old friend</strong> at the coffee shop.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "99fc87c5-8ec9-425f-bac6-3f26b2daab0a", "content": "It was at the coffee shop that she met her old friend.", "image_url": ""}, {"option_id": "3b1b34cf-fc4e-42cb-8f41-75b13817dab4", "content": "It was her old friend that she met at the coffee shop.", "image_url": ""}, {"option_id": "1bb43bba-209c-48fc-8fd2-d35b1d57711d", "content": "It was met at the coffee shop that she her old friend.", "image_url": ""}, {"option_id": "5d05d3e3-fc27-43ff-bb26-9395952561d5", "content": "She and her old friend met at the coffee shop.", "image_url": ""}], "answer": null}, {"question_id": "115c631c-7088-4978-a9f8-6b610ba4c2ef", "assessment_id": "8b64aea8-2251-4995-b759-46f9a2628297", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>I think I'm going to ______ now, perhaps I'll _________ some of the guys I met the other day at the park if you know what I mean. </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "8ddca762-82d3-43c6-ab86-a82336845f07", "content": "run / run. ", "image_url": ""}, {"option_id": "90c50c6b-9aaa-4eaa-a9b2-3488c86078cc", "content": "run into / run.", "image_url": ""}, {"option_id": "e9d074d1-661c-47d8-9e00-37f42b9c383d", "content": "run into / run into.", "image_url": ""}, {"option_id": "46025258-086c-4e81-ab2e-1460e2233452", "content": "run / run into.", "image_url": ""}], "answer": null}, {"question_id": "893b2534-d282-40fc-94fc-7baeb7fbcc3b", "assessment_id": "8b64aea8-2251-4995-b759-46f9a2628297", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>They should ______________ their math skills if they want to succeed in the math competition.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "2fe9f3d9-ab76-4bac-aea9-554c913c28db", "content": "brush up.", "image_url": ""}, {"option_id": "17722c6e-51a6-4990-8f4d-be7e9f604a10", "content": "count on.", "image_url": ""}, {"option_id": "e5f6a465-4da0-417f-9407-dc9bc90e8a8e", "content": "tell apart.", "image_url": ""}, {"option_id": "21cdcae2-c1ee-4601-903d-92ad52cb1074", "content": "run into.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
