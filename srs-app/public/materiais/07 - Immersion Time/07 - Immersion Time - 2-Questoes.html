<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "7fb0b7fb-e7c5-4847-b625-46c2dd87d163", "assessment_id": "1d743509-5b1c-40ba-b2b5-ea495f3453f2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>- Alright, I have to go now.</p><p>- See you later, ___________. (informal)</p>", "media": null, "options": [{"option_id": "a4ffd418-7264-4938-bd60-777ffd52ed2e", "content": "alligator", "image_url": ""}, {"option_id": "e868db9f-63dd-45fa-ad50-9feb68af6425", "content": "lizard", "image_url": ""}, {"option_id": "f94d0661-179a-4e90-b848-304badd84be7", "content": "sir", "image_url": ""}, {"option_id": "215c7070-992b-4fb2-b475-a0cc6772e94e", "content": "dinosaur", "image_url": ""}], "answer": {"option_id": "a4ffd418-7264-4938-bd60-777ffd52ed2e", "feedback": "\u201cSee you later, alligator\u201d \u00e9 uma maneira informal de rimar \u201clater\u201d com \u201calligator\u201d para se despedir de forma divertida.", "correct_option_id": "a4ffd418-7264-4938-bd60-777ffd52ed2e"}}, {"question_id": "937c2416-b030-4f55-9bd9-6adb6a641ee0", "assessment_id": "1d743509-5b1c-40ba-b2b5-ea495f3453f2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea est\u00e1 se despedindo da sua/do seu chefe no seu novo emprego. Qual vers\u00e3o de \u201ctchau\u201d voc\u00ea usaria?</p>", "media": null, "options": [{"option_id": "39f291e1-6b14-4ea2-8a9e-0136d6636b6a", "content": "Peace out, boss.", "image_url": ""}, {"option_id": "d3acf96a-1b3f-4de8-8812-ca3ac0b6b16a", "content": "Catch ya later!", "image_url": ""}, {"option_id": "a3bd11cc-4653-452e-a6ce-190fea2d31c2", "content": "Goodbye, see you tomorrow.", "image_url": ""}, {"option_id": "46236def-2a57-4c60-8083-876eff5d9c49", "content": "Bye bye! Later!", "image_url": ""}], "answer": {"option_id": "a3bd11cc-4653-452e-a6ce-190fea2d31c2", "feedback": "Um jeito mais formal de se despedir em um ambiente de trabalho \u00e9 dizendo \u201cGoodbye\u201d ou \u201csee you tomorrow\u201d (Te vejo amanh\u00e3).", "correct_option_id": "a3bd11cc-4653-452e-a6ce-190fea2d31c2"}}, {"question_id": "87bef842-2898-474c-8dc1-2186c957e565", "assessment_id": "1d743509-5b1c-40ba-b2b5-ea495f3453f2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Ou\u00e7a o \u00e1udio e complete assinale a resposta informal:</p>", "media": {"type": "audio", "url": "https://fluency-plus.s3.amazonaws.com/media/audio/17019648188228354_16_What_time_do_you_finish_wo-(2).mp3"}, "options": [{"option_id": "5d99b86f-04bb-4315-b8c0-e64afde14e66", "content": "I work until seven.", "image_url": ""}, {"option_id": "3af3017d-7f7c-4ad5-8707-67de58ca3fbb", "content": "I go to work at 7pm.", "image_url": ""}, {"option_id": "d26217bc-bfdf-4bab-a6bd-c7013cb227bc", "content": "I stop working at 7pm.", "image_url": ""}, {"option_id": "5eda615f-a9cf-4c7f-853d-a8ae3651d3f9", "content": "I punch out at seven.", "image_url": ""}], "answer": {"option_id": "d26217bc-bfdf-4bab-a6bd-c7013cb227bc", "feedback": "O \u00e1udio diz \u201cWhat time do you finish work?\u201d (A que horas voc\u00ea termina o trabalho?) e a resposta \u00e9 \u201cEu saio \u00e0s sete\u201d.", "correct_option_id": "5eda615f-a9cf-4c7f-853d-a8ae3651d3f9"}}, {"question_id": "ce1ce39c-782f-4346-b83e-93fdcf76efea", "assessment_id": "1d743509-5b1c-40ba-b2b5-ea495f3453f2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Ou\u00e7a o \u00e1udio e complete a frase: De acordo com o que voc\u00ea viu na aula, n\u00e3o faria tanto sentido usar essa despedida\u2026</p>", "media": {"type": "audio", "url": "https://fluency-plus.s3.amazonaws.com/media/audio/17019648210770802_06_See_ya-(1).mp3"}, "options": [{"option_id": "27c5f626-b4e4-49c4-befb-ef43710ded7d", "content": "ap\u00f3s uma entrevista de emprego.", "image_url": ""}, {"option_id": "34fd4ad1-54ba-466d-819c-60ff6f9b7f5d", "content": "em um post no instagram.", "image_url": ""}, {"option_id": "fa51355d-26a3-4210-b828-252e87b3c4e6", "content": "com seu melhor amigo.", "image_url": ""}, {"option_id": "8dcc04a6-2fb1-4102-a77d-5f9c68bb1047", "content": "com seu c\u00f4njuge.", "image_url": ""}], "answer": {"option_id": "27c5f626-b4e4-49c4-befb-ef43710ded7d", "feedback": "A express\u00e3o \u201cSee ya!\u201d (Nos vemos!) no \u00e1udio \u00e9 mais casual e usada em ambientes informais.", "correct_option_id": "27c5f626-b4e4-49c4-befb-ef43710ded7d"}}, {"question_id": "dd5427d6-0dc8-454a-9f2f-7ab58ef02f3a", "assessment_id": "1d743509-5b1c-40ba-b2b5-ea495f3453f2", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Ou\u00e7a o \u00e1udio e responda: qual das alternativas corresponde a uma situa\u00e7\u00e3o em que faria sentido usar a frase que voc\u00ea ouviu?</p>", "media": {"type": "audio", "url": "https://fluency-plus.s3.amazonaws.com/media/audio/17019648232734687_12_It_was_great_to_see_you_ta-(1).mp3"}, "options": [{"option_id": "8844232f-56b5-4757-9290-9e7bc0f9f79f", "content": "Cumprimentando um amigo na rua.", "image_url": ""}, {"option_id": "7c9c05ad-73d2-479b-a101-696f375de92e", "content": "Dando tchau para sua namorada ou seu namorado.", "image_url": ""}, {"option_id": "99344cb9-2b21-4be9-bf72-0d08bd1ea8e5", "content": "Se despedindo de um conhecido.", "image_url": ""}, {"option_id": "a33139a0-c7b9-43aa-8b28-aa39b1b23d4f", "content": "Se despedindo do seu chefe.", "image_url": ""}], "answer": {"option_id": "99344cb9-2b21-4be9-bf72-0d08bd1ea8e5", "feedback": "O \u00e1udio diz \u201cIt was great to see you. Take care!\u201d (Foi bom te ver. Se cuida!)", "correct_option_id": "99344cb9-2b21-4be9-bf72-0d08bd1ea8e5"}}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
