<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "70611482-4323-45ec-91bf-2c8d74e60f8d", "assessment_id": "b1235031-35fa-45bf-b4e8-e1ce94597851", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and complete the sentence.</p><p>&nbsp;</p><p>Melanie said, \u201cThe street that I\u2019m living on is known for being very ethnically diverse. You could not find one specific group of one culture. You will always find a ton of people</p><p>that are always around with different ethnicities.\u201d</p><p>&nbsp;</p><p>From the passage, we can infer Melanie...</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "292a06f8-fb96-4721-baa7-0bd31e13b306", "content": "emphasizes that you will seldom find people with different ethnicities around.", "image_url": ""}, {"option_id": "a6865a91-4001-46ca-a480-4a2b6b9cc89b", "content": "seems to appreciate and value the diverse environment on her street.", "image_url": ""}, {"option_id": "ed90bb14-f0ac-404a-bccc-3d2e4575bfc0", "content": "describes the street as lacking ethnic diversity, with a homogenous population from a single ethnic background.", "image_url": ""}, {"option_id": "29ad33f2-9c9b-4c54-b67a-2213a4b6ece4", "content": "observes that her street is incredibly homogeneous, with people from one ethnic background.", "image_url": ""}], "answer": null}, {"question_id": "01083041-1108-4788-9829-16098e6782ee", "assessment_id": "b1235031-35fa-45bf-b4e8-e1ce94597851", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer the question.</p><p>&nbsp;</p><p>Melanie said, \u201cI would say sometimes I pick a place because something inspires me. I picked South Korea because there was a summer course. [...] I went with one of my friends to Bulgaria, it\u2019s a very random country and I didn\u2019t know anything about it. But</p><p>there was a deal on it so I just went there and it was amazing. And this was something that wasn\u2019t even because I really wanted to go, it was just because it was cheap, and it was worth it in the end.\u201d</p><p>&nbsp;</p><p>What does Melanie say about the outcome of her trip to Bulgaria despite not initially wanting to go there?</p><p><br></p>", "media": null, "options": [{"option_id": "8586681f-4709-46ad-b77d-b4054cc6c439", "content": "She discovered that the trip turned out to be fantastic and worthwhile in the end.", "image_url": ""}, {"option_id": "74c688d9-be41-40a1-8a92-0119b9902240", "content": "Melanie makes travel decisions based on inspiration, as in her choice of South Korea due to a summer course.", "image_url": ""}, {"option_id": "9c035e02-6311-4da1-8490-32085c503a82", "content": "She realized that the trip didn't turn out well and wasn't worthwhile.", "image_url": ""}, {"option_id": "7747468f-7563-4941-8023-65d862f3dc29", "content": "She chose Bulgaria as a travel destination primarily because there was a deal on it.", "image_url": ""}], "answer": null}, {"question_id": "2f3cb221-e32f-4bdc-9282-c5fab4aa35dd", "assessment_id": "b1235031-35fa-45bf-b4e8-e1ce94597851", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression.</p><p>&nbsp;</p><p>The community center hosted ____________ events throughout the year, catering to various interests.</p><p>&nbsp;</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "f665f023-8245-40da-861b-c93fdb743456", "content": "much", "image_url": ""}, {"option_id": "37b2f554-f7d2-4464-b56f-cbbd42738522", "content": "a ton of", "image_url": ""}, {"option_id": "f03738a5-993e-41c9-8b5a-003537988a9d", "content": "little", "image_url": ""}, {"option_id": "055d4f9b-9f79-4d0b-a491-00262f6474c6", "content": "any", "image_url": ""}], "answer": null}, {"question_id": "4b7caec9-235c-4f16-9b8c-47782ea3db72", "assessment_id": "b1235031-35fa-45bf-b4e8-e1ce94597851", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Select the option that best describes the picture.</p><p><br></p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXc996aFL1HWxysJlWm6Yvr5YrgLqxL7dHgRdrhRLf6xs62ynkwl9dQ9VG7qEkyje7143jDlErxNi2a5mPk1VkcJv2FMexJQR2wSTLFqGmYpW04rfMc3YrCN_l_b96_2fHAj7hXn516wbDv1H2BenLIqjAg?key=wQ4C1KuMQHFvU4eo8cBlxw\"></p><p>&nbsp;</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "17ee3bda-5280-4c26-88fd-508f701a5168", "content": "single ethnicity", "image_url": ""}, {"option_id": "5906be9c-cbd6-4885-8085-62b7fe4ca5ba", "content": "homogeneous ethnicity", "image_url": ""}, {"option_id": "f471457f-fdd3-405a-94ac-a00cde5fd44e", "content": "different ethnicities", "image_url": ""}, {"option_id": "ecc83718-44bd-40ad-bd21-408251bfbb27", "content": "homogenous cultural background", "image_url": ""}], "answer": null}, {"question_id": "b89e59ef-655b-43e5-b9ba-555371682916", "assessment_id": "b1235031-35fa-45bf-b4e8-e1ce94597851", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct word.</p><p>&nbsp;</p><p>The students were asked to pick a __________ topic for their research project, allowing for creativity and exploration.</p><p>&nbsp;</p><p><br></p>", "media": null, "options": [{"option_id": "9af8da23-5ff9-41aa-8279-dad4e05d9cf2", "content": "random", "image_url": ""}, {"option_id": "463f7fb5-8bcf-4861-8890-8f220cc42929", "content": " systematic", "image_url": ""}, {"option_id": "2ed450a2-9913-48a5-b692-cceed2db874a", "content": "ordered", "image_url": ""}, {"option_id": "6e8c9d60-fa25-4da3-a221-f828d80d194c", "content": "suggested", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
