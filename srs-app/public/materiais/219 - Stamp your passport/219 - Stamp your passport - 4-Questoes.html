<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>

  </head>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "1dfc51eb-faf8-42d8-bf8e-f43b360cbb74", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio and answer the question: What was the woman's reaction when her friends were unsure about continuing the hike?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN01- Last weekend  we went hiking.mp3"}, "options": [{"option_id": "3d61f0ae-28f9-4199-9667-20cc9f5a9d9c", "content": "She agreed with them and decided to stop.", "image_url": ""}, {"option_id": "330750e3-1784-460e-9556-3d560ed66563", "content": "She remained silent and let them decide.", "image_url": ""}, {"option_id": "9ef28eb0-2ee4-4087-947b-2c63c1bb527b", "content": "She encouraged them to keep going.", "image_url": ""}, {"option_id": "bfff50e7-53e8-4042-b0f9-a4b1879baeff", "content": "She was also unsure about continuing.", "image_url": ""}], "answer": null}, {"question_id": "dc3adf2e-93dc-4ecb-80aa-7aae62104221", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio. What is the father emphasizing to his children?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/PRONUNCIATION_HACKS_UN01- Good Morning everyone!.mp3"}, "options": [{"option_id": "89391214-daf8-41fe-84cc-1a748fa91bd7", "content": "The importance of waking up early.", "image_url": ""}, {"option_id": "6dd2e655-17a5-4d90-b249-a34bc8d6a800", "content": "The need to treat each other with respect and offer help.", "image_url": ""}, {"option_id": "a714f9a3-437a-4205-b8a8-dfbf9d87fdd7", "content": "The rules about doing household chores before breakfast.", "image_url": ""}, {"option_id": "63fc7325-9987-4c06-b539-4f55d2d30146", "content": "The necessity of completing their homework.", "image_url": ""}], "answer": null}, {"question_id": "5aa2cc1a-dea8-4f11-b849-9849299cdf49", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Arrange the sentences in the correct sequence of events:</p><p><br /></p><ol><li><span></span>And finally, Jack goes, \u201cGreat job everyone, we did it!\u201d</li><li><span></span>And then my friend said, \u201cWow, that was intense!\u201d</li><li><span></span>We were hiking up a steep trail when our guide, Emma, goes like, \u201cStay close and follow my lead.\u201d</li><li><span></span>And then she goes like, \u201cHere comes the toughest part!\u201d</li></ol><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "84324247-53b7-4c1f-83e6-4f587ea969f9", "content": "1, 2, 3, 4", "image_url": ""}, {"option_id": "aefa56f0-6824-4c87-a739-f49ceeb57e00", "content": "3, 4, 2, 1", "image_url": ""}, {"option_id": "2879b672-10d9-4fb1-9046-2d953cda4d1b", "content": "2, 3, 4, 1", "image_url": ""}, {"option_id": "9af4bbf5-1fc5-473f-a5f9-2e16d98108f9", "content": "4, 3, 1, 2", "image_url": ""}], "answer": null}, {"question_id": "d1a907f7-bd01-4322-a112-c3303a6e6e58", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>\"Last summer, I decided to embark on a solo journey across Europe. It was a bold move, especially since I had never traveled alone before. The first few days were daunting; navigating unfamiliar cities and languages was challenging. However, I soon discovered the joy of spontaneity and the kindness of strangers. One evening, as I sat in a quaint caf\u00e9 in Paris, a local artist struck up a conversation with me. He shared stories of his travels and encouraged me to embrace every moment. This encounter profoundly impacted my journey, transforming my fear into excitement and leading to unforgettable experiences.\"</p><p><br /></p><p>What was the key factor that transformed the narrator's fear into excitement?</p><p><br /></p>", "media": null, "options": [{"option_id": "a1661b7c-ae5a-4657-a507-124b29e2e05d", "content": " The beauty of the cities they visited.", "image_url": ""}, {"option_id": "720daec9-90ce-4fee-b039-4e866597db3f", "content": "The encouragement from a local artist.", "image_url": ""}, {"option_id": "39ae0871-8202-474e-88fc-4d0d7ad42b63", "content": "The delicious food in the caf\u00e9 next to his hotel.", "image_url": ""}, {"option_id": "e966e7b4-04ad-4859-8fba-80f42d875bfc", "content": "The ease of navigating unfamiliar cities.", "image_url": ""}], "answer": null}, {"question_id": "9832295a-87aa-43ee-9b9b-f26c8f57fc71", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the correct sentence that uses the phrase <strong>\"to get around\" </strong>appropriately.</p><p><br /></p>", "media": null, "options": [{"option_id": "3792b7df-5deb-4615-84c4-0b26e5e27862", "content": "She managed to get around the strict rules by finding a clever loophole.", "image_url": ""}, {"option_id": "5f3a7f27-baff-40a1-99e2-d27f66f0e5eb", "content": "I need to get around this project before the end of the week to meet the deadline.", "image_url": ""}, {"option_id": "b20efa76-5d8e-4e3b-8b63-3057ef63b0fe", "content": "They got around the house by watching TV all day.", "image_url": ""}, {"option_id": "8e381e0c-85e2-4d93-ba7f-459baf1b7ced", "content": " I get around the office to get there before my new employees.", "image_url": ""}], "answer": null}, {"question_id": "5dcef3d3-f931-4f28-9a73-13d862caf964", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 6, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the most appropriate response to complete the dialogue.</p><p><br /></p><p><em>A: \"I heard you had a meeting with the new client. How did it go?\"</em></p><p><em>B: _______</em></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "3883be14-c97b-49d0-9a5a-470128ee329c", "content": "\"It was a disaster.\"\u00a0", "image_url": ""}, {"option_id": "6daeb843-f039-4308-983a-e08d34496cb5", "content": "\"I lost my keys.\"\u00a0", "image_url": ""}, {"option_id": "82bd9573-f6c5-4a60-9339-3f1599c8d186", "content": "\"We talked about the kids.\"\u00a0", "image_url": ""}, {"option_id": "08cb9be5-cee6-4401-a68f-9c9d73452790", "content": "\"I don't like coffee.\"", "image_url": ""}], "answer": null}, {"question_id": "51ac8738-4f29-4f1d-8950-a2575a53d5b5", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 7, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the following dialogue and choose the correct statement that describes the speaker's emotions.</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/PRONUNCIATION_HACKS_UN02-Wow, Tim, that was really impressive!.mp3"}, "options": [{"option_id": "311c360a-86a3-4653-8d12-63733941a147", "content": "The speaker is genuinely impressed with Tim's presentation.", "image_url": ""}, {"option_id": "9fa8e5c9-1882-460c-98ab-8044de8b0e09", "content": "The speaker is being sarcastic and is actually disappointed.", "image_url": ""}, {"option_id": "ab50093f-d410-4a93-a7a6-e653be918e4f", "content": "The speaker is neutral and just stating facts.", "image_url": ""}, {"option_id": "6fbb856e-6f3f-4475-adaa-96ecfc07d358", "content": "The speaker is confused about Tim's actions.", "image_url": ""}], "answer": null}, {"question_id": "7722fe59-9121-4fc6-aae2-fb849e7ff184", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 8, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the dialogue with the appropriate alternative:</p><p><br /></p><p><em>A: I have a presentation tomorrow, and I feel so insecure about it.</em></p><p><em>B:______________________________________________________________ .</em></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "b0a73443-7957-4df2-9065-e9dd27ff6379", "content": "Everyone feels that way sometimes. Just be yourself and you'll do great!\u00a0", "image_url": ""}, {"option_id": "89270ac8-7dcd-44fc-b5cf-0c5cc09ef24c", "content": "It doesn't matter what you will do. Just do whatever you want.\u00a0", "image_url": ""}, {"option_id": "17031b05-cd17-42f3-8178-b1cdad01fa22", "content": "Ignore your feelings. They are not important.\u00a0", "image_url": ""}, {"option_id": "502a31e7-b5fe-4e19-aac2-442fbd82b8fb", "content": "Just memorize everything and don't worry about me, you\u2019ll just have to read some text.", "image_url": ""}], "answer": null}, {"question_id": "b7c77e24-b7e6-42bc-a1a0-e825e9122972", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 9, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>While traveling in different countries, it is essential to understand and respect cultural differences. For example, in India, people often speak with a higher pitch when using Hindi, which can come across as very emotional. In contrast, when speaking English, they may adopt a more sophisticated tone. Similarly, in some cultures, body language such as a head wobble can convey a wide range of meanings, from agreement to uncertainty. Understanding these nuances can greatly enhance communication and prevent misunderstandings. Moreover, environmental factors like weather can also influence behavior; people in sunny regions tend to be more cheerful, while those in colder climates might be more reserved.</p><p><br /></p><p>What is the main idea of the passage?</p><p><br /></p>", "media": null, "options": [{"option_id": "b0605c84-91ab-4059-876e-1f0ffeebd382", "content": "Traveling in different countries requires knowledge of multiple languages.\u00a0", "image_url": ""}, {"option_id": "3043563a-0794-4834-8ed7-06f49c10b1fe", "content": "Cultural differences include language, body language, and environmental influences.\u00a0", "image_url": ""}, {"option_id": "a874bb63-3562-41df-9a25-dbbf63aecd1f", "content": "People in sunny regions are always cheerful and friendly.\u00a0", "image_url": ""}, {"option_id": "833eae5a-ddbf-4d90-bea3-7f1efbffe358", "content": "Understanding cultural nuances is not necessary for effective communication.", "image_url": ""}], "answer": null}, {"question_id": "091479ed-bcee-463a-84a5-856dfc9de371", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 10, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Arrange the sentences in the correct order to form a logical dialogue.</p><p><br /></p><ol><li><span></span>I actually presented an award on stage, which was nerve-wracking.</li><li><span></span>What was the highlight of your night at the Oscars?</li><li><span></span>Wow, that sounds amazing! Did you meet anyone famous?</li><li><span></span>Yes, I met one of the most famous actors in the world and had a great conversation with them.</li></ol><p><br /></p>", "media": null, "options": [{"option_id": "bfc1f67c-a59c-47a2-a832-820670cc4efd", "content": "2, 1, 4, 3", "image_url": ""}, {"option_id": "797a783a-3f71-483e-af8c-5d4feb32f087", "content": "1, 2, 3, 4", "image_url": ""}, {"option_id": "93a08835-27e8-42ec-8509-43fbf07198fc", "content": "2, 1, 3, 4", "image_url": ""}, {"option_id": "d4e559b3-c179-45e7-bc25-c1af0adb48ed", "content": "1, 3, 4, 2", "image_url": ""}], "answer": null}, {"question_id": "3e4ba7c8-b009-4079-9ca3-731db4f32ac9", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 11, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the paragraph with the appropriate words.</p><p><br /></p><p><em>During your journey through life, unexpected events can occur. </em><strong><em>____</em></strong><em> memories can help with processing and healing. Imagine you were in a supermarket parking lot and you </em><strong><em>______</em></strong><em> a jar of spaghetti sauce. A series of runaway shopping carts suddenly rolled towards you, and despite trying to stop them, you were </em><strong><em>_____</em></strong><em> by their momentum into the street, where a car narrowly missed you.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "fdcef29d-e81a-4e41-86f5-5d63514678eb", "content": " Processing / dropped / swept", "image_url": ""}, {"option_id": "9e109661-3c93-4996-ad48-800689a5fee1", "content": "Erasing / caught / pushed", "image_url": ""}, {"option_id": "d058c47b-d433-47eb-9d35-596a4ffdf5a8", "content": "Forgetting / dropped / pulled", "image_url": ""}, {"option_id": "2c44f08e-1d85-466a-ae8c-6726d1f28007", "content": "Storing / threw / moved", "image_url": ""}], "answer": null}, {"question_id": "2e10b25f-b93a-4cfe-bc11-3604be40e564", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 12, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>The impact of a single story on our perception can be profound. When we hear only one perspective, it shapes our understanding in a limited and often biased way. For instance, stories about Africa that focus solely on poverty and conflict do not reflect the continent's rich diversity and culture. By consuming a variety of narratives, we can develop a more nuanced and complete view. It's important to recognize the power of stories to both inform and misinform, and to seek out multiple viewpoints to avoid a distorted understanding of any place or people.</p><h3><br /></h3><p>According to the text, how are stories about Africa often portrayed?\u00a0</p><p><br /></p>", "media": null, "options": [{"option_id": "263fd6a3-d68b-4803-91ab-c1fff1c25b8a", "content": "They highlight only the cultural diversity of the continent.\u00a0", "image_url": ""}, {"option_id": "5d07ffda-75d2-4b8e-ab0f-927e9b0c2449", "content": "They present a balanced view between poverty, conflict, and cultural richness.", "image_url": ""}, {"option_id": "57881667-2fe7-439a-b2a2-6e8434829082", "content": "They tend to focus only on poverty and conflict.", "image_url": ""}, {"option_id": "36c1be07-8ac6-40dd-9cf5-5f080b3c1bcd", "content": "They avoid mentioning any problems and focus only on positive aspects.", "image_url": ""}], "answer": null}, {"question_id": "80437e51-8990-4428-a632-cfee1f6f08dc", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 13, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the paragraph below:</p><p><br /></p><p><em>\"Mom encouraged us to get acquainted with an unfamiliar language. We enjoyed slipping English phrases picked out from storybooks into our everyday conversations. Fluency has a lot t }], "answer": null}, {"question_id": "3ae66c1c-6671-45e5-a8ea-0e48c7c7aad3", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 18, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the following audio and choose the correct statement that describes the speaker's feelings and situation.</p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/GET_THE_TALK_UN04-I used to feel so energetic and full of life.mp3"}, "options": [{"option_id": "1f49843d-f910-4399-bb04-4da33305f5bd", "content": "The speaker feels energetic and full of life.\u00a0", "image_url": ""}, {"option_id": "be5c5b0c-2ac0-4ee3-b445-8283502d5d31", "content": "The speaker feels motivated and focused at work.\u00a0", "image_url": ""}, {"option_id": "9e7cb787-c3ae-4d93-8d10-f9df9aa20f28", "content": "The speaker feels aimless and joyless, experiencing languishing.\u00a0", "image_url": ""}, {"option_id": "df348d6b-38f0-4f5c-8b01-b4f5966420dc", "content": "The speaker feels completely absorbed in their activities at home.", "image_url": ""}], "answer": null}, {"question_id": "dc60d274-60f5-4a59-bd1f-e89d467df646", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 19, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>David moved from Canada to Italy to pursue his dream of studying art in Florence. Initially, he was excited about the vibrant culture and rich history, but soon he found himself struggling with the language and missing the familiarity of home. To cope with these feelings, David decided to immerse himself in the local culture by attending art classes, visiting museums, and joining a local soccer team. Through these activities, he not only improved his language skills but also made new friends and developed a deeper appreciation for Italian culture. David advises anyone experiencing similar challenges to actively participate in local activities and connect with the community.</p><p><br /></p><p>What specific actions did David take to help him adjust to life in Italy?</p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "31741f79-8b27-47ce-a9da-a325806a212a", "content": "He stayed in his apartment and focused on his studies at the University.\u00a0", "image_url": ""}, {"option_id": "3c52716c-7614-4c46-8582-c841c1ffbc88", "content": "He traveled back to Canada frequently to visit family.\u00a0", "image_url": ""}, {"option_id": "58404347-34de-42fd-b4be-504f63376800", "content": "He attended art classes, visited museums, and joined a local soccer team.\u00a0", "image_url": ""}, {"option_id": "db04b4ba-9c16-42e3-aeb0-a98e5b6a81dd", "content": "He avoided social interactions and only spoke English.", "image_url": ""}], "answer": null}, {"question_id": "3dbaf338-ee43-4b33-acdd-2fa9e3eaaa92", "assessment_id": "c36b417a-5857-457d-b2ab-d9d36e892504", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 20, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the paragraph with the appropriate words.</p><p><br /></p><p><em>When Jessica moved from Australia to France, she found the transition quite challenging. The language barrier made everyday tasks difficult, and she often felt __________. To help herself adapt, she started taking French language classes and __________ local cooking workshops. These activities not only improved her language skills but also helped her meet new people and __________ into the culture.</em></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "d5dd2e69-85fc-4856-ad40-b5307a1714cc", "content": "isolated / joining / immerse", "image_url": ""}, {"option_id": "8d433fde-921b-42cc-9cba-8cbebac01110", "content": "excited / avoiding / withdraw", "image_url": ""}, {"option_id": "9844f2a4-bedc-47b2-bb48-76a1c60d416d", "content": "bored / attending / ignore", "image_url": ""}, {"option_id": "a5bd7428-051f-4a21-95ae-86c6172e2afa", "content": " thrilled / skipping / integrate", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
