<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "e7d73f2c-ef6e-46af-9480-cd106eb0ff76", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>What does the speaker think about the combination of pineapple and jalape\u00f1o on pizza?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN13-Hey, have you heard about the new Italian restaurant.mp3"}, "options": [{"option_id": "a647c42e-76ea-41f0-aa70-78e92f75a998", "content": "He thinks it's a terrible combination.", "image_url": ""}, {"option_id": "526d2953-1d93-418e-91fb-124f3b97fcee", "content": "He believes it creates a perfect balance of flavors.", "image_url": ""}, {"option_id": "a0ab7441-12af-406a-8465-808eef86766f", "content": "He suggests avoiding this combination of flavors.", "image_url": ""}, {"option_id": "50439b19-8191-4120-a3ce-82a548438bd1", "content": "He doesn't express his opinion about it.", "image_url": ""}], "answer": null}, {"question_id": "73fd58f7-3433-4e3e-9217-857c4aa2a1d5", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the most appropriate response to express disagreement in a formal setting:</p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "cf00fcc9-b67b-4371-98b1-25aa9a55f869", "content": "I'm afraid I can't get behind that idea.", "image_url": ""}, {"option_id": "38b2cdb5-992c-44e6-a58d-aaa603608ca1", "content": "That's the stupidest thing I've ever heard.", "image_url": ""}, {"option_id": "b049ef29-f175-4377-be84-cc9e2c44251d", "content": "I respectfully disagree with your proposal.", "image_url": ""}, {"option_id": "6dad3504-e253-42a9-acb0-311f7f8f2e71", "content": "No way, that's just ridiculous!", "image_url": ""}], "answer": null}, {"question_id": "43a97217-0395-4756-bb17-40c8e3416b15", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>What emotions and attitudes are conveyed in the speaker's response?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/PRONUNCIATION_HACKS_UN13-I understand your concerns,.mp3"}, "options": [{"option_id": "f0f55bd0-1d5e-4456-95ac-a29497ce8095", "content": "Gratitude, happiness, and agreement", "image_url": ""}, {"option_id": "d21fc5e0-2f95-496c-ba54-0eb8b2c2803b", "content": "Confusion, anxiety, and uncertainty", "image_url": ""}, {"option_id": "90f8d172-f9b3-4948-a42f-58be53beae89", "content": "Disagreement, sarcasm, and disdain", "image_url": ""}, {"option_id": "cc948e02-56b5-49d9-9ffa-06a8b0fe0ab2", "content": "Happiness and excitement", "image_url": ""}], "answer": null}, {"question_id": "573216c0-c199-46f3-9992-7d899beaa43b", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>In the realm of ideas, identity plays a crucial role in shaping our beliefs, values, and sense of self. Our experiences, upbringing, and the communities we belong to all contribute to the formation of our identity. However, it is essential to recognize that identity is not a fixed entity but rather a fluid and evolving construct. As we navigate through life, we encounter new perspectives and challenges that prompt us to reassess and redefine who we are.\u00a0</p><p>This process of self-discovery and growth is a fundamental part of the human experience, as it allows us to adapt to changing circumstances and cultivate a deeper understanding of ourselves and others. By embracing the dynamic nature of identity, we open ourselves up to the possibility of personal transformation and the pursuit of our life's mission.</p><p><br /></p><p><strong>According to the text, what is the relationship between identity and personal growth?</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "893f7c58-972f-4e5f-a80a-2d49e83e9e17", "content": "Identity is a fixed aspect of our being that remains unchanged throughout our lives.", "image_url": ""}, {"option_id": "b2f1223e-bc75-46b4-ba16-f386d06f7519", "content": "Challenging our identity can hinder personal growth and self-discovery.", "image_url": ""}, {"option_id": "ade6094d-ed01-4d49-a074-b58bc9bc6e0b", "content": "The dynamic nature of identity allows for personal transformation and the pursuit of our life's mission.", "image_url": ""}, {"option_id": "69736cbf-e05d-48dc-90ea-8cb4e6d21817", "content": "Our experiences and upbringing have no impact on the formation of our identity.", "image_url": ""}], "answer": null}, {"question_id": "912c4ae9-fb7f-41fb-914b-4803abb1c920", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Which expression is the most appropriate to use when you want to say that someone is being forced to answer a difficult question or make a quick decision?</p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "8ed1cf1a-c2c0-47b1-babc-b4182b66eee8", "content": "To be put in the limelight", "image_url": ""}, {"option_id": "542ae873-b991-4ed6-bb7e-93485308d11e", "content": "To be put in a tight corner", "image_url": ""}, {"option_id": "06443957-b30c-4ab2-8bb5-0972b751de99", "content": "To be put under the microscope", "image_url": ""}, {"option_id": "dbce6c5d-e07f-4d7e-a0fe-d0ea1a238cac", "content": "To be put on the spot", "image_url": ""}], "answer": null}, {"question_id": "3278af31-76f8-4c3e-9681-e8f74ec09481", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 6, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the best option to complete the sentence below:</p><p><br /></p><p><em>In terms of popularity, soccer has a clear advantage __________ American football on a global scale.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "1be7880d-43f0-46de-977b-a061b9fb3397", "content": "over", "image_url": ""}, {"option_id": "34c59201-b003-421d-a339-8ea7a00f999c", "content": "than", "image_url": ""}, {"option_id": "edde2a5c-b1a4-4881-81b5-517319615215", "content": "from", "image_url": ""}, {"option_id": "6cb033f8-af58-462c-9793-4b86c16acc5c", "content": "with", "image_url": ""}], "answer": null}, {"question_id": "a76b86bc-0c7c-47a3-af9c-ed460df088a9", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 7, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio<strong>. </strong>According to John, what makes American football exciting for him?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN14- Hey John, I heard you talking about sports.mp3"}, "options": [{"option_id": "42d957ae-0459-49e9-98bf-b88d5b138047", "content": "The strategy, physicality, and unique American culture.", "image_url": ""}, {"option_id": "ade961e4-0ca3-4328-964d-c456514aba86", "content": "The global appeal and non-stop action.", "image_url": ""}, {"option_id": "416574c7-d69e-4620-89a2-74ace776e857", "content": "The incredible displays of skill and athleticism.", "image_url": ""}, {"option_id": "f346d2b4-cd4c-4ba9-9248-14af9f3b5f36", "content": "The fact that it's a quick game with no breaks at all.", "image_url": ""}], "answer": null}, {"question_id": "f7f7b71f-e545-475d-ab70-44c1060d58d7", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 8, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Which sentence best uses the phrase<strong> \"get away with\"</strong> correctly?</p>", "media": null, "options": [{"option_id": "5a12d3ca-6ff9-4f29-88db-b46b6fc65490", "content": "She couldn't get away with the heavy bag.", "image_url": ""}, {"option_id": "0cb033e7-11f4-421c-9042-9fbc95863820", "content": "They tried to get away with cheating on the test.", "image_url": ""}, {"option_id": "dc4f82c6-df0c-425e-ba0c-03b646aaacc7", "content": "He got away with the new job offer.", "image_url": ""}, {"option_id": "abfd7785-211b-42be-9372-c0a13358bead", "content": "The children were getting away with the toys.", "image_url": ""}], "answer": null}, {"question_id": "3a656f83-a02c-4aca-9a3a-d0aef3a1f5fc", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 9, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the sentence that best demonstrates the idiomatic use of <strong>\"wind up\":</strong></p><p><br /></p>", "media": null, "options": [{"option_id": "3cce3b5e-e666-4398-b306-31dcd30c031f", "content": "The clock needs to be wound up every day to keep accurate time.", "image_url": ""}, {"option_id": "97b8fba6-9388-4b14-b6ea-36ad252a9476", "content": " If we're not careful with our spending, we may wind up in debt.", "image_url": ""}, {"option_id": "c5da62a9-fbf1-4f15-b315-28d966dc3b04", "content": "The manager asked her to wind up the presentation as time was running out.", "image_url": ""}, {"option_id": "beb8b1ef-19f0-48b1-b682-2f4a2dcbdbaa", "content": "The path began to wind up the steep hill, making the hike more challenging.", "image_url": ""}], "answer": null}, {"question_id": "ca27cc94-bd3c-4d56-b433-0025d52487a5", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 10, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Nigeria, a vibrant and diverse nation, is home to a rich tapestry of cultures and traditions. Among the many ethnic groups that make up the country, the Yoruba people stand out for their unique customs and language. In Yoruba culture, greetings hold a special significance and vary depending on the context and the person being addressed. This nuanced approach to communication reflects the deep respect and value placed on social interactions within the community. Beyond language, Nigeria has also made significant strides in entertainment, particularly with Nollywood.\u00a0</p><p>Substantial investments have elevated Nigerian cinema, making Nollywood a major international player. Despite these achievements, Nigeria often faces misconceptions perpetuated by international media. Stereotypes and sensationalized portrayals can distort the nation's image. It is only by immersing oneself in the country and engaging with its people that one can gain a genuine understanding of Nigeria's complexities, challenges, and potential. Through direct experience, visitors can appreciate the warmth, resilience, and spirit of the Nigerian people, and the country's rich heritage.</p><p><br /></p><p><strong>According to the text, what is the key to gaining a genuine understanding of Nigeria's true nature?</strong></p><p><br /></p>", "media": null, "options": [{"option_id": "3c606bec-92b3-41c5-8a0b-968b990c9d86", "content": "Relying on international media portrayals", "image_url": ""}, {"option_id": "42cd5652-b4e8-4860-b196-fa93a6e39e8c", "content": "Studying the Yoruba language and customs", "image_url": ""}, {"option_id": "3effc7c9-1763-4dd7-89e6-43eb5b947a2b", "content": "Immersing oneself in the country and engaging with people", "image_url": ""}, {"option_id": "6eee235c-3985-4939-ba16-b747a080f226", "content": "Focusing solely on the success of the Nollywood industry", "image_url": ""}], "answer": null}, {"question_id": "e4064401-10a6-485a-bcb8-1e6e42db1060", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 11, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>According to the speaker, why was the script initially written for a man?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN15-I recently watched this incredible movie.mp3"}, "options": [{"option_id": "5ae32d8a-cccd-4115-b460-89eb1c291848", "content": "It was the director's original vision.", "image_url": ""}, {"option_id": "01ff7851-b7b3-41a2-bc42-ba1dc076eebf", "content": " It would be easier to finance the movie.", "image_url": ""}, {"option_id": "0811bd38-e77f-4e42-be3b-61af19199b76", "content": "The lead actress wasn't available at first.", "image_url": ""}, {"option_id": "43fc13e1-10fb-4be4-a926-3bcaf4726552", "content": "The story required a male protagonist.", "image_url": ""}], "answer": null}, {"question_id": "be3c3743-aa56-40f4-b58c-846f4cc20675", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 12, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>When you want to encourage someone to share their honest thoughts or opinions, which phrase is most appropriate?</p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "d26cb862-b4b4-49ec-8b62-2f71b344422b", "content": "Tell me what you think I want to hear.", "image_url": ""}, {"option_id": "97fdffe3-facf-4e45-a617-beddbb72a7b7", "content": "There are only wrong answers here.", "image_url": ""}, {"option_id": "0865e1a7-d597-4452-9812-b53d958f5a65", "content": "Don't be shy. There are no wrong answers here.", "image_url": ""}, {"option_id": "bab57c46-d26b-47aa-b9fe-ef445f74857e", "content": "Please don't speak up or share your feelings, they are not that important.", "image_url": ""}], "answer": null}, {"question_id": "1aefdbf7-8aaa-447f-a939-8b5b90a1ab9b", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 13, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>In the heart of the city, a new art exhibit has opened, celebrating the diverse and rich histories of local communities. The exhibit is a collection of multimedia installations, featuring recorded oral histories, photographs, and interactive displays. Curators have worked meticulously to present an authentic narrative that resonates with the experiences of the people who lived through these events. One section highlights the stories of immigrants who settled in the area, capturing their struggles and triumphs. Another section delves into the lives of factory workers whose contributions were pivotal during the industrial boom. Critics have praised the exhibit for its immersive approach, noting how it brings to life the voices and memories of those who are often forgotten in mainstream historical accounts. The exhibit challenges visitors to consider the importance of preserving these stories and reflects on how collective memory shapes our understanding of the past and present.</p><p><br /></p><p><strong>What is one of the main purposes of the art exhibit described in the text?</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "d4d4692e-0c03-489f-834d-f22641f3ffbe", "content undergone a significant transformation over the years, reflecting the country's cultural diversity and evolving societal norms. The classical era of Turkish movies predominantly focused on themes of friendship, family, and love, showcasing the strong interpersonal bonds that are deeply rooted in Turkish culture. These films often portrayed heartwarming stories that resonated with audiences, highlighting the importance of relationships and the value placed on community.</p><p>However, as Turkey has modernized and embraced new influences, its cinema has also evolved. The modern era of Turkish movies has taken a more unconventional approach, with a greater emphasis on comedy and a willingness to explore more lighthearted and entertaining narratives. This shift reflects a changing society that is increasingly open to new ideas and experiences, while still maintaining a connection to its cultural heritage.</p><p>Despite these changes, Turkish cinema continues to captivate audiences both at home and abroad. The country's unique blend of traditional values and modern sensibilities has created a rich and diverse cinematic landscape that offers something for everyone. Whether it's a classic tale of love and friendship or a contemporary comedy that pushes the boundaries of the genre, Turkish movies continue to entertain, inspire, and provoke thought among viewers.</p><p><br /></p><p><strong>Based on the passage, how has the focus of Turkish cinema changed from the classical era to the modern era?</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "33184c20-1b25-45eb-970b-236b3ed353a8", "content": "From comedy to drama", "image_url": ""}, {"option_id": "003a3188-8e53-4fb1-981d-8c9101c0cc95", "content": "From science fiction to comedy", "image_url": ""}, {"option_id": "3d8a03c4-b26f-494d-8cbe-254abf33f9ab", "content": "From friendship and love to comedy", "image_url": ""}, {"option_id": "105ba402-6e93-454a-a246-269ad7289aa2", "content": "From fami 3dd", "content": " It can manipulate the behavior of infected humans.", "image_url": ""}, {"option_id": "72d400a7-e0b5-4e4e-bfd4-fe5c4cefb8fc", "content": "It thrives in colder temperatures and cannot survive heat.", "image_url": ""}], "answer": null}, {"question_id": "3ed1440b-8988-4ced-a0e0-73b2906e4001", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 18, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the best phrase to complete the sentence:</p><p><br /></p><p><em>The concept of a 9-to-5 job is so ingrained in our society that most people __________ as the only way to earn a living.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "d391da68-0afb-4294-aa19-fa5ec5f47c91", "content": " take it with granted", "image_url": ""}, {"option_id": "f9a63438-41e4-485a-a3bc-34cd807053b1", "content": "take it for granted", "image_url": ""}, {"option_id": "97fdd6d3-dc70-4fcb-af06-9735feb4e6e3", "content": " take it by granted", "image_url": ""}, {"option_id": "e58ef3b5-fdb5-40a3-a80d-182b89a9f2e5", "content": "take it as granted", "image_url": ""}], "answer": null}, {"question_id": "f89c7ef0-d6ea-4640-842b-5741fafc9cf3", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 19, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio.<strong> </strong>What does the speaker suggest is needed in education?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/GET_THE_TALK_UN16-Education has become an industrial process.mp3"}, "options": [{"option_id": "3a0ac97e-683f-4b74-8a9c-b7e9c9c2304b", "content": "Incremental improvements to the current industrial model", "image_url": ""}, {"option_id": "a623ccf2-22d3-4495-aec1-ec2c990dd972", "content": "Applying more STEM principles in classrooms", "image_url": ""}, {"option_id": "cb71fc54-4f35-4c0c-ab5a-97a82a1a71f2", "content": " A complete shift to an agricultural model of development", "image_url": ""}, {"option_id": "f765b185-a0d0-406a-beee-0967352576fc", "content": "Increased funding for educational programs", "image_url": ""}], "answer": null}, {"question_id": "d4ca8c48-8e59-4eb2-83e0-230d058cc0d7", "assessment_id": "4c5fbdc8-bc4f-4aca-bf03-52ba3d16d880", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 20, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the text below with the appropriate words:</p><p><br /></p><p><em>Artificial Intelligence is becoming increasingly (1)_____ in language learning. While it can make the process more (2)_____ and accessible, it's important to remember that AI is just a (3). It can assist with some of the heavy (4), but ultimately, the learner must still put in the effort to truly understand and communicate effectively in the target language.</em></p>", "media": null, "options": [{"option_id": "dcd80b00-fd49-4fb6-8735-b21dce3687b4", "content": "prevalent, efficient, tool, lifting", "image_url": ""}, {"option_id": "d37176b8-12d6-4581-b60f-49429c51a2e9", "content": "prevented, effusive, toil, lightening", "image_url": ""}, {"option_id": "17823232-fcec-402a-af1f-50067701d0ba", "content": "pretended, effective, toll, lightning", "image_url": ""}, {"option_id": "43eba5ac-5eb9-4322-b623-c66f9ec19bfc", "content": "pretentious, affective, total, lasting", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
