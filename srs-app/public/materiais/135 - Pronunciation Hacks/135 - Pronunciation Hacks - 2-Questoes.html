<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "de8d04e9-6aa6-4ce3-9405-cbbea3102948", "assessment_id": "cdb98b34-c480-44f9-8d8a-d656fd8ebe49", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio and select the sound that you hear the most:\u00a0</p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236889209967806_01_Mitch_the_teacher_teaches_t.mp3"}, "options": [{"option_id": "cc55b154-64c0-4b9e-adff-a49236940625", "content": "'sh'", "image_url": ""}, {"option_id": "79995b75-f629-463c-864e-f810ee71212b", "content": "'h'", "image_url": ""}, {"option_id": "b2446501-5962-48ae-a58d-b1bb2acd22b6", "content": "'tch'", "image_url": ""}, {"option_id": "6b9106b2-e587-418f-baaa-71d8e322fe68", "content": "'d'", "image_url": ""}], "answer": null}, {"question_id": "44e6e5e4-c0ce-43fe-ad7f-77260b7e70e6", "assessment_id": "cdb98b34-c480-44f9-8d8a-d656fd8ebe49", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Read the following sentence and select the correct statement.</p><p>&nbsp;</p><p>\"The honest heir exhibited a vintage vehicle while exhaling a ghostly 'ah' sound in the exhibit gallery.\"</p><p><br></p>", "media": null, "options": [{"option_id": "922675e0-bec8-49d8-adc5-12ae0f06386e", "content": "The pronunciation of \u2018h\u2019 varies depending on the word.", "image_url": ""}, {"option_id": "fa0fc42c-a773-4bf5-87f3-9ec01bb75ba8", "content": "The \u2018h\u2019 has different roles in writing but is silent in speech.", "image_url": ""}, {"option_id": "aef7d47a-f3c6-46e6-9660-c43dadaae048", "content": "The syllables containing the 'h' sound are unstressed.", "image_url": ""}, {"option_id": "cb06f05a-b2a8-4883-8415-de12b0dff3bb", "content": "The 'h' is pronounced like the 'sh' sound.", "image_url": ""}], "answer": null}, {"question_id": "681c868b-9dec-48cd-bb92-b0ef22610936", "assessment_id": "cdb98b34-c480-44f9-8d8a-d656fd8ebe49", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Read the following sentence and select the correct statement.</p><p>\u00a0</p><p><em>\"The honest heir exhibited a vintage vehicle while exhaling a ghostly 'ah' sound in the exhibit gallery.\"</em></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236889273693783_02_Helen_happily_held_a_handfu.mp3"}, "options": [{"option_id": "5e2d683d-deda-4e2d-baa9-9b22586690c9", "content": "Happened", "image_url": ""}, {"option_id": "6e52ca88-bb36-456d-8436-31c507d64083", "content": "Matches", "image_url": ""}, {"option_id": "2901f660-0398-4082-8520-096ca9bdea06", "content": "Their", "image_url": ""}, {"option_id": "91654766-da04-4358-9187-30ab32b60520", "content": "Schedule", "image_url": ""}], "answer": null}, {"question_id": "2d4e8a4f-cc26-430a-9480-2af10efc45ea", "assessment_id": "cdb98b34-c480-44f9-8d8a-d656fd8ebe49", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Which option does not have the 'sh' sound?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "30fdcd6c-d360-4865-9b3c-3c956e64b15e", "content": "matches", "image_url": ""}, {"option_id": "571a49d8-a918-401a-9045-08a051c7d3f5", "content": "should", "image_url": ""}, {"option_id": "1b0a1d78-d512-4b23-ac0c-bc4d0a099558", "content": "shoe ", "image_url": ""}, {"option_id": "652d327b-1f2c-45eb-b106-12d56e8df922", "content": "splash", "image_url": ""}], "answer": null}, {"question_id": "c4384e93-4223-4f96-bb1e-b0b18e1fb925", "assessment_id": "cdb98b34-c480-44f9-8d8a-d656fd8ebe49", "type_id": "ad55e2fc-510c-447f-bc30-d41737b0c2dd", "type_slug": "multiple-choice-image", "position": 5, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to audio and choose the correct picture.</p><p><br /></p><img src=\"https://cdn-jirafales.fluencyacademy.io/content/images/e5255007-881e-4950-aaa4-88baae68db3a\" height=\"500\" width=\"500\" />", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236889321077712_03_After_reviewing_my_schedule.mp3"}, "options": [{"option_id": "5fb5561d-1b3f-42af-b522-c42a1d44e097", "content": "Picture 3", "image_url": "https://cdn-jirafales.fluencyacademy.io/content/images/c643bc0f-10f9-4828-80e4-beb952865b50"}, {"option_id": "bee237cc-a5fd-4050-8b21-d40b3cd32922", "content": "Picture 4", "image_url": "https://cdn-jirafales.fluencyacademy.io/content/images/4a5cc813-d3e6-4691-ace5-be82aa3cfe5e"}, {"option_id": "89df03f6-4d86-4097-bd5f-a2873e711f72", "content": "Picture 1", "image_url": "https://cdn-jirafales.fluencyacademy.io/content/images/d681fdb6-dd5f-4cc7-8413-b273355c48e6"}, {"option_id": "40b0ace8-22ac-463c-8f6a-e63d9151274b", "content": "Picture 2", "image_url": "https://cdn-jirafales.fluencyacademy.io/content/images/72f5fcd9-dd14-441f-bbda-bfc97928b2b9"}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
