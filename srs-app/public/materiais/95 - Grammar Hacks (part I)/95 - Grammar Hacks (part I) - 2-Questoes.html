<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "d0189b7a-7f3e-45b4-abbd-3c289b2c5281", "assessment_id": "69347b74-a156-476c-a58e-d952560c98fd", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea estava prestes a fazer uma prova e esperava que ela fosse bem dif\u00edcil. Por\u00e9m, voc\u00ea se surpreende ao concluir o exame e perceber que respondeu \u00e0s quest\u00f5es com mais facilidade do que voc\u00ea imaginava. Como voc\u00ea falaria sobre isso em ingl\u00eas?</p>", "media": null, "options": [{"option_id": "f728c9e0-3af6-4d39-bec7-19538c979a0a", "content": "The test was easier than I expected!", "image_url": ""}, {"option_id": "81804b25-9a4f-40a5-9c36-dc25779bdeb0", "content": "The test was more easy than I expected!", "image_url": ""}, {"option_id": "a824e2a3-2698-482d-a05e-457b70b2d6ef", "content": "The test was easiest than I expected!", "image_url": ""}, {"option_id": "cd50fa6e-4187-49a2-b88b-e97fcd7c50de", "content": "The test was as easy as I expected!", "image_url": ""}], "answer": null}, {"question_id": "a30add5c-5043-4de0-9890-1106fcba710c", "assessment_id": "69347b74-a156-476c-a58e-d952560c98fd", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Leia a frase abaixo e selecione a op\u00e7\u00e3o que corretamente a explica:</p><p><br></p><p>Michael likes going to the gym, but he believes going for a run is a better way to stay fit.</p>", "media": null, "options": [{"option_id": "b1b69229-e932-4484-84ab-476a11f44510", "content": "Going to the gym is a better way to stay fit than going for a run.", "image_url": ""}, {"option_id": "e07cfc59-aae3-4130-9396-90a89d898ba1", "content": "Going for a run is not as good as going to the gym.", "image_url": ""}, {"option_id": "a7b6c29e-9b40-4c7c-a5ba-23ddbfcd62ad", "content": "Going to the gym is less enjoyable than going for a run.", "image_url": ""}, {"option_id": "15993cc5-bb35-45f2-815d-4be07613dd1b", "content": "Going for a run is better for staying fit than going to the gym.", "image_url": ""}], "answer": null}, {"question_id": "5c4fa28c-075a-4038-9add-05666fe0ffd3", "assessment_id": "69347b74-a156-476c-a58e-d952560c98fd", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analise a frase a seguir e selecione a op\u00e7\u00e3o que corretamente a explica:</p><p><br></p><p>My phone is worse than his. But yours is far worse than ours.</p>", "media": null, "options": [{"option_id": "09d0f244-1275-4707-8d4c-539b0e14f22d", "content": "His phone is worse", "image_url": ""}, {"option_id": "7fe96582-8d84-4129-8890-e9a665077f6e", "content": "My phone is worse.", "image_url": ""}, {"option_id": "9475b6c7-c894-4091-ae4e-e357aac3c2bd", "content": "Your phone is worse.", "image_url": ""}, {"option_id": "68c96925-a748-41eb-b545-eb7f955e127a", "content": "Our phone is worse.", "image_url": ""}], "answer": null}, {"question_id": "6a980ad1-d1ad-46cc-8510-0646e637939d", "assessment_id": "69347b74-a156-476c-a58e-d952560c98fd", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea estava prestes a experimentar uma massa e uma sopa em um restaurante e esperava que a massa fosse mais saborosa que a sopa. No entanto, ao experimentar os dois pratos, voc\u00ea percebeu que eram igualmente deliciosos. Ao compartilhar sua experi\u00eancia com uma amiga, voc\u00ea diz:</p>", "media": null, "options": [{"option_id": "db5f1a6c-4577-4081-a5ce-64f5ab901626", "content": "The soup was not as delicious as the pasta.", "image_url": ""}, {"option_id": "04cb6101-6342-4a88-baf0-5bd44f2dffea", "content": "The pasta was as delicious as the soup.", "image_url": ""}, {"option_id": "0c3160de-d27b-4b61-85f1-8e92359b77a7", "content": "The pasta was more delicious than the soup.", "image_url": ""}, {"option_id": "ebc62a57-67d1-4ca9-bdaf-b970f4c56cde", "content": "The soup was more delicious than the pasta.", "image_url": ""}], "answer": null}, {"question_id": "f0c298a2-d8d7-45d7-9e84-4b8765c42462", "assessment_id": "69347b74-a156-476c-a58e-d952560c98fd", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea experimentou dois pares de sapatos em uma loja, um roxo e um azul. Voc\u00ea gostou dos dois, por\u00e9m achou o azul mais apertado, ent\u00e3o decide levar o roxo. Um funcion\u00e1rio da loja pergunta por que voc\u00ea n\u00e3o levou o azul, e voc\u00ea explica em ingl\u00eas:</p>", "media": null, "options": [{"option_id": "b63a926d-c243-4b26-acc3-3efd092b4b4c", "content": "Because the purple shoes were less comfortable than the blue ones.", "image_url": ""}, {"option_id": "6a2371eb-dc9b-47cb-9800-f6dbd796b673", "content": "Because the purple shoes were as comfortable as the purple ones.", "image_url": ""}, {"option_id": "609e2053-4c06-412b-b7d9-1e022137407f", "content": "Because the blue shoes were more comfortable than the purple ones.", "image_url": ""}, {"option_id": "441d2c21-4091-411e-bef2-1fe536c8fe5a", "content": "Because the blue shoes were less comfortable than the purple ones.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
