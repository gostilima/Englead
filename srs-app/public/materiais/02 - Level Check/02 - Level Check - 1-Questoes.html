<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>

  </head>

rious and you approach the woman and say to her in the loudest and angriest voice that you can manage:</strong></p><p><br /></p>", "media": null, "options": [{"option_id": "70097a85-6494-47c9-bb1a-7d5935701922", "content": "Where on earth did you learn such kind of behaviour?", "image_url": ""}, {"option_id": "8f377bfa-ca8f-45c9-a26b-cbaf97894408", "content": "Excuse me, but would you mind giving me your turn?", "image_url": ""}, {"option_id": "0138cb59-dc9b-4fec-968e-221a82e04041", "content": "That was a very nice thing you did back there, you know.", "image_url": ""}, {"option_id": "fc6f08b1-b9fe-4e50-bed6-420c6b534009", "content": "Is this the right queue for the bills?", "image_url": ""}], "answer": {"option_id": "70097a85-6494-47c9-bb1a-7d5935701922", "feedback": "", "correct_option_id": "70097a85-6494-47c9-bb1a-7d5935701922"}}, {"question_id": "60aa8f56-0138-4f10-8640-0b9a33d0628c", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 20, "skill_id": "e3bff228-647e-4567-aab7-35246baaeddf", "description": "<p>Based on the pictures, it is correct to assume that: \u2705</p><p><br /></p><img src=\"https://cdn-jirafales.fluencyacademy.io/content/images/435382ed-1449-4d8e-9006-5c689932a3d6\" height=\"500\" width=\"500\" />\n", "media": null, "options": [{"option_id": "a13f1b63-6479-4c46-893b-d52f6f8d1791", "content": "After months of job searching online, they still hadn't gotten the remote positions they hoped for.\u00a0", "image_url": ""}, {"option_id": "f7e764a2-7794-48aa-9846-c409b11d2f67", "content": "Only after attending many interviews did they realize they still lacked crucial job-search and interview skills.", "image_url": ""}, {"option_id": "5935c948-c322-45ba-8114-12c3ab8b6daf", "content": "After a long job search and many interviews, they were rewarded for their excellent track record.\u00a0", "image_url": ""}, {"option_id": "ad8f8726-c6e0-4128-b24f-611c9328e9ed", "content": "They had all worked together before when they found themselves in the same waiting room for a job interview, following the mass firing in the old company.\u00a0", "image_url": ""}], "answer": {"option_id": "None", "feedback": null, "correct_option_id": "5935c948-c322-45ba-8114-12c3ab8b6daf"}}, {"question_id": "49eb4190-1129-41b8-882b-d06d25668c3b", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 21, "skill_id": "e3bff228-647e-4567-aab7-35246baaeddf", "description": "<p><em>In our modern world, there are many factors that place the well-being of the planet in jeopardy. While some people have the opinion that environmental problems are just a natural occurrence, others believe that human beings have a huge impact on the environment. Regardless of your viewpoint, take into consideration what factors place our environment as well as the planet Earth in danger.</em> (adapted from: https://lingua.com/english/reading/)</p><p><br /></p><p><strong>The paragraph presents:</strong></p><p><br /></p>", "media": null, "options": [{"option_id": "de70c671-3b5a-405a-9a47-aefdb313fe53", "content": "All of the factors that damage the environment.", "image_url": ""}, {"option_id": "cf1f7caf-d6a9-444d-a83b-ba4fcc5af978", "content": "Two opinions about environmental problems.", "image_url": ""}, {"option_id": "c4f07c05-11e4-412e-9c27-981dc5f44532", "content": "Questions about the effects of environmental problems.", "image_url": ""}, {"option_id": "7462241c-b1a3-4bc6-b432-f8fca68037ca", "content": "Scientific support regarding global warming.", "image_url": ""}], "answer": {"option_id": "None", "feedback": null, "correct_option_id": "cf1f7caf-d6a9-444d-a83b-ba4fcc5af978"}}, {"question_id": "e0202889-258b-4d70-aab5-dae710fed167", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 22, "skill_id": "e3bff228-647e-4567-aab7-35246baaeddf", "description": "<p>Choose the correct option according to the paragraph: \u2705</p><p><br /></p><p><strong>In such a complex world, it is essentially impossible to have a long-term perspective on how a new medium will reshape our understanding of the world. Following that same line of thought, Marshall McLuhan points out how transformative Gutenberg\u2019s invention of the printing press truly was: it provided people with the mass production of printed text, a medium through which we can extend our capability for communication; with books, we can now share our thoughts with someone halfway across the world.</strong></p>", "media": null, "options": [{"option_id": "1b5306fc-8911-4f9b-af33-8581839493f6", "content": "Gutenberg\u2019s invention of the printing press changed the world through the widespread availability of books.", "image_url": ""}, {"option_id": "7115f483-3042-4cd9-a16c-d6bbf4c6cc6d", "content": "Marshall McLuhan\u2019s invention of the printing press extended mankind\u2019s ability to communicate through written language, creating the possibility of communication across the world.", "image_url": ""}, {"option_id": "a5ce03cd-8f43-4afc-9145-cd37b1e1b207", "content": "Marshall McLuhan highlights the fact that Gutenberg\u2019s printing press made mass-produced written language widely available, extending human communication across the world.", "image_url": ""}, {"option_id": "17fc5e86-524d-4caa-bb0e-4d87e6428e01", "content": "Marshall McLuhan points out that, before Gutenberg\u2019s invention of the printing press, it was essentially impossible to communicate through written language.", "image_url": ""}], "answer": {"option_id": "None", "feedback": null, "correct_option_id": "a5ce03cd-8f43-4afc-9145-cd37b1e1b207"}}, {"question_id": "ea5a1c99-d08d-49c7-93d0-937f3ef3cf50", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0 lled into question because he often contradicts himself.", "image_url": ""}, {"option_id": "5f0f4ef0-dfd1-4cff-a6e5-d92feb35037b", "content": "The witness\u2019s ambiguous statement involved a number of contradictions, and this led to untrustworthiness in the jury.", "image_url": ""}, {"option_id": "9901c346-3d3f-48d5-a848-3d12d2506119", "content": "The deceptive statement of the witness has made people doubt the reliability of the case.", "image_url": ""}, {"option_id": "d2711faa-2857-4b0e-a52f-43bf14fe420d", "content": "The witness was so unconvincing that she left several contradictions about the reliability of her evidence in minds.", "image_url": ""}], "answer": {"option_id": "None", "feedback": null, "correct_option_id": "b60331b4-96ee-4026-b853-9b750d828734"}}, {"question_id": "ad6e56b7-959b-4fdb-aa6c-728a21e24011", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 28, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the paragraph: \u2705</p><p><br /></p><p><strong>The ____ in travel in recent years has been towards what is known as adventure travel. But adventure doesn\u2019t have to involve physical exertion; be it haggling over a souvenir in Peru, or getting lost in the labyrinthine passages of a Moroccan souk, it all ____ .</strong></p>", "media": null, "options": [{"option_id": "8a443457-2592-4eab-9e21-d26d3686eafa", "content": "direction / belongs", "image_url": ""}, {"option_id": "fa4933ff-c6e6-4045-928c-ff4efbc65a54", "content": "custom / holds", "image_url": ""}, {"option_id": "72548ee2-2bb6-4731-8a71-3bb2cc9c049d", "content": "trend / counts", "image_url": ""}, {"option_id": "15e1e5b5-41dc-4b51-a056-505173b0be7c", "content": "inclination / fits", "image_url": ""}], "answer": {"option_id": "None", "feedback": null, "correct_option_id": "72548ee2-2bb6-4731-8a71-3bb2cc9c049d"}}, {"question_id": "708634d3-c5d3-4958-aecc-e6ca8333b0b7", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 29, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the sentence: \u2705</p><p><br /></p><p><strong>Geological ____ of salt were formed millions of years ago, when what is now land, ___ under the sea.</strong></p>\n", "media": null, "options": [{"option_id": "d4868361-7e6e-49e6-85a7-deac3e181e7e", "content": "deposits / lay", "image_url": ""}, {"option_id": "6b397360-f140-4d08-b693-3f97df29d2a4", "content": "piles / laid", "image_url": ""}, {"option_id": "a867d3be-7a57-4f0e-a715-6d14cfee31e3", "content": "stores / lie", "image_url": ""}, {"option_id": "1795d1dd-aa75-4b9e-b532-e751116ab389", "content": "stocks / lied", "image_url": ""}], "answer": {"option_id": "6b397360-f140-4d08-b693-3f97df29d2a4", "feedback": "", "correct_option_id": "d4868361-7e6e-49e6-85a7-deac3e181e7e"}}, {"question_id": "ddbfa401-29b6-43b9-b6c4-f14f49d36790", "assessment_id": "a2368c7d-78ec-44a8-bc90-4d674fe5812a", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 30, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Complete the sentence: \u2705</p><p><br /></p><p><strong>No ____ she refused to talk to him after what he had done.</strong></p>", "media": null, "options": [{"option_id": "09823ccc-3dae-4d84-9495-a8d5970751b1", "content": "surprise", "image_url": ""}, {"option_id": "86d71f00-42bc-4f95-8805-a7a57c00e998", "content": "problem", "image_url": ""}, {"option_id": "80fe4231-28cb-422c-b8a1-f153cab39502", "content": "question", "image_url": ""}, {"option_id": "fa9e0610-030c-4c13-8ee9-ccf72758f751", "content": "wonder", "image_url": ""}], "answer": {"option_id": "86d71f00-42bc-4f95-8805-a7a57c00e998", "feedback": "", "correct_option_id": "fa9e0610-030c-4c13-8ee9-ccf72758f751"}}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
