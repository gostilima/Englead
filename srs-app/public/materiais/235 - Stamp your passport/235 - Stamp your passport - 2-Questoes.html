<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "1f9938db-a604-4336-94c6-3ff9c526997a", "assessment_id": "d9880158-821a-4f72-98b7-b4f4fb986bba", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer.</p><p>\u00a0</p><p>Elizma said,<em> \u201cIn Paraguay, I was able to help other people to communicate with Spanish speakers, I was a translator between them.\u201d</em></p><p>\u00a0</p><p>What was Elizma's specific responsibility as a translator?</p><p><br /></p>", "media": null, "options": [{"option_id": "be3738ec-7203-4c2e-88cd-b49bfcd4be15", "content": "Helping people learn new languages", "image_url": ""}, {"option_id": "c0d5dcda-a929-4224-9f8f-f55ac86d6a7a", "content": "Assisting in communication with Spanish speakers", "image_url": ""}, {"option_id": "b6b89e00-cb2b-4675-9f92-84cb7d1140f8", "content": "Guiding people around Paraguay", "image_url": ""}, {"option_id": "10f7aa35-4648-4dd6-93c1-758721e5fb67", "content": "Helping Spanish speakers", "image_url": ""}], "answer": null}, {"question_id": "6bd0def6-5820-44b0-b8b8-37b53820dac4", "assessment_id": "d9880158-821a-4f72-98b7-b4f4fb986bba", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct word.</p><p>\u00a0</p><p><em>She has a charming __________ that reveals her French heritage.</em></p><p>\u00a0</p>", "media": null, "options": [{"option_id": "3fc4a949-5cba-4269-9334-24c5249872aa", "content": "accent", "image_url": ""}, {"option_id": "a9a19baf-e422-424e-9e0f-7ff2c08e3c29", "content": "voice", "image_url": ""}, {"option_id": "b9b3b3eb-56c1-442e-9726-31d0d27763ad", "content": "manner", "image_url": ""}, {"option_id": "cbeaa709-3115-417c-855f-8000fa1c3957", "content": "gesture", "image_url": ""}], "answer": null}, {"question_id": "20ff9be9-9719-46e3-8f82-7e52f52bae64", "assessment_id": "d9880158-821a-4f72-98b7-b4f4fb986bba", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the sentence that best describes the picture.</p><p><br></p><p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXfbG_-ulgBfzFzDKAkTV3krhdWMW6RX5y07TcqZbIurRou9IuN54ULTA19b38p4sXxC8cNQI5CZAPEg949IDR0BTs-tRRhjeS2PS4lJoX4GHw0oZ6dkd4TfJQ_Ndr-IB-zSaXg_svCGQS_y-YJ2RYo6f--r?key=Y0V-YTOAg0HFKKf0C6ymfw\"></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "b666f235-d078-4f7f-9384-ceeebc333088", "content": "Terer\u00e9 or Mate is not so common in Paraguay", "image_url": ""}, {"option_id": "53079a54-5f78-4b8d-8cb4-beeae1a50021", "content": "Terer\u00e9 consists of Yerba Mate with no juice", "image_url": ""}, {"option_id": "e5193f95-c675-4465-83c8-ac7b295cc91e", "content": " Terer\u00e9 is the official drink of Paraguay", "image_url": ""}, {"option_id": "5cbe4202-88eb-43d2-83bc-b0d00e032d62", "content": "Terer\u00e9 is very common in Latin America", "image_url": ""}], "answer": null}, {"question_id": "c49f39fd-d02a-44e8-af63-7288cb77b19d", "assessment_id": "d9880158-821a-4f72-98b7-b4f4fb986bba", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the blank with the correct expression.</p><p>\u00a0</p><p><em>Last summer, I had the opportunity to ____________ a fascinating culture during my travels in Asia.</em></p><p><strong>\u00a0</strong></p>", "media": null, "options": [{"option_id": "58034aea-a6d5-493f-ac32-114472898154", "content": "get to know", "image_url": ""}, {"option_id": "13544681-2214-467e-b3dc-0d9d9c7ace88", "content": "visit", "image_url": ""}, {"option_id": "a6ea97d2-13a1-45d9-a2b3-c7d1f5bc38f7", "content": "encounter", "image_url": ""}, {"option_id": "86f88b24-3134-485a-8126-cdaae06a6ca8", "content": "come across with", "image_url": ""}], "answer": null}, {"question_id": "0d125ac0-13bd-437e-9efa-ae80d94416cd", "assessment_id": "d9880158-821a-4f72-98b7-b4f4fb986bba", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and answer.</p><p>\u00a0</p><p><em>Elizma said, \u201cTraveling influenced my English teaching because the more languages and cultures you know, the more open-minded you get. And with that, I can guide my students and help them to not be afraid of getting to know new cultures.\u201d</em></p><p><br /></p><p>What does Elizma believe is the influence of traveling on her teaching?</p>", "media": null, "options": [{"option_id": "f327a037-d6da-43fd-8fc1-1b7635fac3bc", "content": "It makes her more closed-minded", "image_url": ""}, {"option_id": "a23504b2-07c6-4244-813f-efc30e9bbe0c", "content": "It has no impact on her teaching", "image_url": ""}, {"option_id": "7a327c6b-e8d0-4ce3-8fc0-173991c60b63", "content": "It makes her more open-minded", "image_url": ""}, {"option_id": "e525bec7-5d0f-4124-8bac-b2bdae92d47f", "content": "It makes her more dynamic", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
