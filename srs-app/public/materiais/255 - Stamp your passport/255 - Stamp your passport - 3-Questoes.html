<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "796f531a-9c9f-46c6-a823-24793480e90d", "assessment_id": "756f9cc7-2ed8-4f1b-b34d-766f85879486", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Fernanda, when questioned about Peru\u2019s multiculturality and what it means to be Peruvian, said, \u201c[...] but I personally think that we all love our culinary, like, standard. Also, I feel it\u2019s football, we\u2019re not the best and we all know it, but people are so passionate about it.\u201d</p><p><br></p><p>Fernanda said that what represents Peru is:</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "4c7bebd6-0e57-4ac3-8fbf-e9451acda52d", "content": "Loving their culinary", "image_url": ""}, {"option_id": "981416fc-f873-4a11-8c43-0857e583198b", "content": "Being the best at football", "image_url": ""}, {"option_id": "c4005b21-0aff-40aa-8ddc-a40e260e2a38", "content": "People being passionate", "image_url": ""}, {"option_id": "d00bd31e-22c0-45dc-a2fe-88d8bc1b8b36", "content": "Culinary and football", "image_url": ""}], "answer": null}, {"question_id": "cc009153-9c9b-409d-8422-f87c4c717382", "assessment_id": "756f9cc7-2ed8-4f1b-b34d-766f85879486", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fernanda said, \u201cYes, I feel like my English is very \u2018Americanized\u2019, and I feel like I\u2019m a little more extroverted.\u201d</p><p><br></p><p>By saying \u201cAmericanized\u201d she meant that her English:</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "bffb0ca2-f620-4dd1-b825-2d90199ef278", "content": "Comes from America", "image_url": ""}, {"option_id": "897a2a23-b752-4135-aefe-bad24fceb395", "content": "Was taught by an American", "image_url": ""}, {"option_id": "fd4f9fb1-0980-4d07-ac96-908d59491a7b", "content": "Is influenced by American English", "image_url": ""}, {"option_id": "37545d99-3f31-4a56-84a1-d5845163240f", "content": "Has more mistakes and slang words", "image_url": ""}], "answer": null}, {"question_id": "a0c44fb3-c5b5-469e-81ef-0681ec827a7d", "assessment_id": "756f9cc7-2ed8-4f1b-b34d-766f85879486", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fernanda said, \u201cI was in an Austrian university like 1 month ago, and that pushed my English grammar more.\u201d</p><p><br></p><p>A similar option to \u201cpushed\u201d, maintaining the meaning of the sentence, would be:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "fad25ecf-9fb9-45d3-a48e-f7cdd7a04760", "content": "boosted", "image_url": ""}, {"option_id": "884f0990-7f72-4123-8c7b-53278df80450", "content": "shoved", "image_url": ""}, {"option_id": "cade696a-162c-4394-8ba0-8ce68ab4e283", "content": "pulled", "image_url": ""}, {"option_id": "456081c0-24eb-4591-ac1d-8220abfe69ed", "content": "forced", "image_url": ""}], "answer": null}, {"question_id": "84c3cbf4-3688-44de-aa12-2da9bce0a477", "assessment_id": "756f9cc7-2ed8-4f1b-b34d-766f85879486", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Select the option that best completes the sentence with a:</p><p><br></p><p>I\u2019m __________ ceviche so much these days. I can\u2019t go another day without it!</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "6190b88f-e8aa-4c55-963f-1b2f6e667b3e", "content": "drinking", "image_url": ""}, {"option_id": "26d7f8a9-7ac0-44d0-a5b6-a47fcbf94430", "content": " tired of", "image_url": ""}, {"option_id": "a4e8e0ff-4a5b-4dca-a233-a5cc784356c2", "content": "eating", "image_url": ""}, {"option_id": "3b50d36a-7efd-4858-bdc3-9cec50a24fcc", "content": "craving", "image_url": ""}], "answer": null}, {"question_id": "4030c0b4-1fc8-432f-b2aa-309ebf2f0f7c", "assessment_id": "756f9cc7-2ed8-4f1b-b34d-766f85879486", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Fernanda said:</p><p><br></p><p>\u201cYeah, I finished my semester in Austria and I was kind of figuring out what I was going to do. I mean, Austria was a big plan for me and I had planned it several months ahead and I was like, what am I going to do? What's my next step?\u201d</p><p><br></p><p>By that, we can infer that:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "5df5ff9d-3b41-466e-a6eb-31d014af094c", "content": "She had planned everything to do after going to Austria.", "image_url": ""}, {"option_id": "94d58538-f3e2-495b-a24e-db698da1c014", "content": "Austria is her home country and she wanted to leave there.", "image_url": ""}, {"option_id": "0563d0f3-3461-47e5-8293-7cfd81ab075a", "content": "After going to Austria she caught herself wondering what to do next.", "image_url": ""}, {"option_id": "3208db3a-ed49-40c0-8226-fb3f16f999fe", "content": "Her studies in Austria were the last thing she wanted to do in another country.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
