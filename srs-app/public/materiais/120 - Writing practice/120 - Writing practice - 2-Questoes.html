<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "dbe9e836-bd64-47c8-b791-0abdd9fe60cd", "assessment_id": "f38b9cb2-0e71-4528-8c5f-bce00e0ff95c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Leia o di\u00e1logo:</p><p>Anne: I truly believe that going to the beach is better.</p><p>Jorge: I got it, but don\u2019t you think going camping is cooler than the beach?</p><p>Anne: <strong>Oh boy, what\u2019s best now is to agree to disagree</strong>.&nbsp;&nbsp;</p><p><br></p><p>\tO que Anne quis dizer na frase \u201c<strong>Oh boy, what\u2019s best now is to agree to disagree\u201d</strong>? &nbsp; </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "938e330e-1f7f-4f89-a241-f238841b9ae5", "content": "Anne believes that they should both go camping.", "image_url": ""}, {"option_id": "6c7fec71-7457-4afd-b857-4fea71161a5a", "content": "Anne suggests they should continue debating their preferences.", "image_url": ""}, {"option_id": "92fb69f7-a31e-4cb7-9325-f232a34af5c2", "content": "Anne thinks they should respect each other's differing opinions.", "image_url": ""}, {"option_id": "11059f0e-86fa-46e3-8220-d050bba96e2c", "content": "Anne wants to go to the beach despite Jorge's preference for camping.", "image_url": ""}], "answer": null}, {"question_id": "da50ff9c-469c-4a20-b246-a4df3fd776d9", "assessment_id": "f38b9cb2-0e71-4528-8c5f-bce00e0ff95c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>\"Her comment was so unkind; she didn't I. mean to sound so II. mean.\"</p><p>A palavra \u201cmean\u201d nas frases: </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "34dac625-c10d-4d1d-92ba-2fe9f6b403f8", "content": "I. express intent or purpose; II. mean (unkind). ", "image_url": ""}, {"option_id": "12413c2c-5636-4ba4-8459-e3d3ec950ca6", "content": "Both I. and II. express the same idea. ", "image_url": ""}, {"option_id": "27d3da87-6c26-4059-8851-73b83b47d2cf", "content": "I. express (average) II. mean (intent or purpose). ", "image_url": ""}, {"option_id": "2ccfb8c5-9f1c-4894-8aa3-6273be1edb7d", "content": "I. express (intent or purpose); II. mean (definition). ", "image_url": ""}], "answer": null}, {"question_id": "1415c5ea-0080-46ff-9cd1-1dcefca68b13", "assessment_id": "f38b9cb2-0e71-4528-8c5f-bce00e0ff95c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Qual a frase que mais se assemelha a frase a seguir? </p><p>\u201cThe tenant spent the whole week trying to talk to the landlord.\u201d</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "d4c21a95-8a4f-4561-8996-40e853394cc1", "content": "The tenant invested the entire week trying to communicate with the landlord.", "image_url": ""}, {"option_id": "2d7408ac-154f-461d-8c32-5ada6ebf9b2f", "content": "The tenant purchased the whole week trying to have a conversation with the landlord.", "image_url": ""}, {"option_id": "7a1aa73f-c640-4c47-998e-e8ffa81112a9", "content": "The tenant rented the whole week trying to engage with the landlord.", "image_url": ""}, {"option_id": "3dfe20d7-f5fb-4553-adb9-8e3ab17032d3", "content": "The tenant possessed the whole week trying to talk to the landlord.", "image_url": ""}], "answer": null}, {"question_id": "54d9a8b1-b196-4941-afa2-e852503328b0", "assessment_id": "f38b9cb2-0e71-4528-8c5f-bce00e0ff95c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>I searched everywhere for my missing keys, but I found zilch.</p><p>Qual alternativa substitui corretamente \u201czilch\u201d na frase? </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "492e0c98-b7b4-40ed-8c14-03995c2255fd", "content": "nada.", "image_url": ""}, {"option_id": "fc1abece-877f-493e-ba1e-81564c06dfb8", "content": "everything.", "image_url": ""}, {"option_id": "8945f90e-edec-4d74-a6bd-46e8e98346c8", "content": "something.", "image_url": ""}, {"option_id": "e0bf3988-5312-4be6-83ae-265aa83665a0", "content": "nowhere.", "image_url": ""}], "answer": null}, {"question_id": "fd35cabf-893e-43d9-8029-d69e4b035caa", "assessment_id": "f38b9cb2-0e71-4528-8c5f-bce00e0ff95c", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>\"Life's a journey, and dreams are the camels that take you on the most fulfilling adventures ever. So saddle up and ride those camels to your heart's desire!</p><p><br></p><p>Qual a mensagem principal transmitida pela cita\u00e7\u00e3o?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "e2e77f43-8fdc-41fe-ad4e-f82b1285ce57", "content": "Dreams are like camels, unpredictable and hard to control.", "image_url": ""}, {"option_id": "6fbc5c6b-c458-4314-8abb-d90cb2362421", "content": "Life is a stationary journey; there's no need to chase dreams.", "image_url": ""}, {"option_id": "2784621d-85a6-4ced-a836-7ed174af66da", "content": "Dreams are a means to embark on rewarding adventures in life.", "image_url": ""}, {"option_id": "3402a1d6-05a4-4e36-80d9-d9b4d4ef22c2", "content": "Life is a desert with no camels or dreams to guide you.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
