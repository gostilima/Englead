<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "1aab2100-39dd-4e51-b78c-2da77e366255", "assessment_id": "56ae2090-c14b-4db2-8816-8db7b9c66909", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio and finish the sentence.</p><p>&nbsp;</p><p>The speaker\u2026</p><p><br></p><p><br></p><p>A.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\thas had the opportunity to see the stunning Northern Lights.</p><p>B.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\ttells what Scandinavia is like.</p><p>C.&nbsp;&nbsp;&nbsp;&nbsp;\tfeels lucky because she has had the opportunity to visit Scandinavia.</p><p>D.&nbsp;&nbsp;&nbsp;&nbsp;\tconsiders she has had no luck in seeing the Northern Lights so far.</p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234672659997816_FLUENCY_HUB_U07_This-time-around.mp3"}, "options": [{"option_id": "02ecb351-dcb9-4f10-83d5-99736a4535ef", "content": "has had the opportunity to see the stunning Northern Lights.", "image_url": ""}, {"option_id": "63387d15-4fe5-4109-b4a2-d28105b0f127", "content": "tells what Scandinavia is like.", "image_url": ""}, {"option_id": "cc01e002-d1a0-42be-ae2f-a2a57cc1ab3a", "content": "feels lucky because she has had the opportunity to visit Scandinavia.", "image_url": ""}, {"option_id": "46a7e696-88b5-42f0-970e-f04f9b405276", "content": "considers she has had no luck in seeing the Northern Lights so far.", "image_url": ""}], "answer": null}, {"question_id": "b6137736-3280-4c32-af9c-d5b65cff50a9", "assessment_id": "56ae2090-c14b-4db2-8816-8db7b9c66909", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio and complete the sentence with the correct option.</p><p>&nbsp;</p><p>________ is a celestial body, and it has ________. Some other planets, like Jupiter, have ________.</p><p><br></p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234672688309133_FLUENCY_HUB_U07_The-Earth-is-a-celestial-(1).mp3"}, "options": [{"option_id": "a6ca6ed0-d429-4842-8371-4007783a4043", "content": "The Earth/one Moon/multiple moons", "image_url": ""}, {"option_id": "cc7b4104-bf3d-48b8-8717-ba8c4bfd8c4f", "content": "The Earth/one moon/multiple moons", "image_url": ""}, {"option_id": "15cc4d37-803a-4072-93b3-8c175c34341d", "content": "The earth/multiple moons/one moon", "image_url": ""}, {"option_id": "06e8d438-a595-4740-a540-f888cd5fc042", "content": "The Earth/multiple moons/one Moon", "image_url": ""}], "answer": null}, {"question_id": "60bf5415-c6ea-4984-a842-86fb463ac4fb", "assessment_id": "56ae2090-c14b-4db2-8816-8db7b9c66909", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>&nbsp;In the video, Stephen says \u201c<strong>Seeing</strong> how we're treating the Earth, should we celebrate Earth Day or just apologize to the Earth this time around?\u201d</p><p>&nbsp;</p><p>Which word could replace the word in bold and still be correct?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "8a217926-897b-42bb-9718-afe3b73bdbef", "content": "See", "image_url": ""}, {"option_id": "7036c122-e6dc-4446-9f6e-64459b9a8d3f", "content": "Considering", "image_url": ""}, {"option_id": "29585b7d-3cfd-4d20-bde8-cc975879a85a", "content": "Having", "image_url": ""}, {"option_id": "3892db2c-0363-45ce-880a-cce3be253f25", "content": "Finding out", "image_url": ""}], "answer": null}, {"question_id": "69970d7d-f8e0-4271-afcf-3233a3672836", "assessment_id": "56ae2090-c14b-4db2-8816-8db7b9c66909", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>&nbsp;Which of the following does NOT express factual information?</p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "3ae8cc17-85ca-42b1-8ee9-36b221542dd3", "content": "Based on research, leaded gas isn't good for the planet.", "image_url": ""}, {"option_id": "3059ce1c-adb3-459c-a893-0a50975d4570", "content": "Scientists agree that we should stop polluting the planet.", "image_url": ""}, {"option_id": "6227f1d8-9cc6-4727-a42b-f7f2b5ef33bc", "content": "I have a feeling that this wouldn\u2019t be good for the Earth.", "image_url": ""}, {"option_id": "8d1561d0-47bd-4c8f-a58a-c1195641e38a", "content": "Earth Day was founded because man landed on the Moon.", "image_url": ""}], "answer": null}, {"question_id": "6d4842a5-49f8-4319-85d0-88405497ad76", "assessment_id": "56ae2090-c14b-4db2-8816-8db7b9c66909", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the alternative that contains an example of passive voice:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "656ce297-69de-42fb-8585-b4a47cc9ecaa", "content": "Leaded gas was banned through 1973.", "image_url": ""}, {"option_id": "c17828a5-9d4d-4436-a985-b82d18b61390", "content": "I told you I was a supporter of Greenpeace.", "image_url": ""}, {"option_id": "7bdcce09-d712-460d-a2d9-9730daf61896", "content": "She said I was a horrible person because I didn\u2019t recycle.", "image_url": ""}, {"option_id": "66107271-bf94-4d69-911f-2b495e3ea3e5", "content": "They were planning to celebrate Earth Day.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
