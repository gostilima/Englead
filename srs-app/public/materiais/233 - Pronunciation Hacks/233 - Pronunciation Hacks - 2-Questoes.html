<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "5dbc3119-8b61-41db-b3d4-9d656c8fcdfd", "assessment_id": "b2f85cd6-37c1-4c73-b6fa-77bf70cfca57", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio. At the end, the speaker drops in tone to</p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234682410147834_PRONUNCIATION_HACKS_U08_I-heard-you're-planning.mp3"}, "options": [{"option_id": "4f06e072-0e5e-4ab3-a4a4-ce92906e5505", "content": "warn about the consequences", "image_url": ""}, {"option_id": "7bc59b7f-a7f9-496d-bd7f-62a0d4e4cbc6", "content": "give suggestions", "image_url": ""}, {"option_id": "b80e7930-7d10-4c1f-bf8d-739f992d02d9", "content": "give clear instructions", "image_url": ""}, {"option_id": "252ff740-333b-4c07-95b4-3ac539047827", "content": "express anger", "image_url": ""}], "answer": null}, {"question_id": "41592a5c-ffc7-4ed0-b334-1c5b093686e7", "assessment_id": "b2f85cd6-37c1-4c73-b6fa-77bf70cfca57", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio. The rising intonation of \"not to\" adds emphasis...</p><p>&nbsp;</p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234682438866315_PRONUNCIATION_HACKS_U08_Please-remember-not-to.mp3"}, "options": [{"option_id": "dc2aaa65-45ab-45e3-ae84-4449892c6340", "content": "to express a command", "image_url": ""}, {"option_id": "40242d3b-9d99-444e-bb3b-acce2d570cbc", "content": "to the urgency of a possible outcome", "image_url": ""}, {"option_id": "75264cb6-669c-4cef-8e32-2a6080440123", "content": "to teach a moral", "image_url": ""}, {"option_id": "6810e95f-710e-4f4f-b96c-363c005c3870", "content": "to the importance of that advice", "image_url": ""}], "answer": null}, {"question_id": "7331c89c-e76f-4a98-aa41-851f5150682b", "assessment_id": "b2f85cd6-37c1-4c73-b6fa-77bf70cfca57", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Fill in the gap with the correct word.</p><p>&nbsp;</p><p>He was hit from the _______ and didn't see the punch coming.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "16c9b34d-fd57-4fca-a02f-7f33c4fc9741", "content": "game", "image_url": ""}, {"option_id": "d4654545-b0bf-47a4-8243-e2a701bfddec", "content": "corner", "image_url": ""}, {"option_id": "1457b08b-79dc-44cd-99fc-2eb78677daad", "content": "blindside", "image_url": ""}, {"option_id": "229ee6e0-4e98-4327-93d0-89220d7273ab", "content": "opponent", "image_url": ""}], "answer": null}, {"question_id": "d63d3d9e-8b5e-44e6-b79c-7a0336589e18", "assessment_id": "b2f85cd6-37c1-4c73-b6fa-77bf70cfca57", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to Audio. After giving instructions, the speaker seeks...</p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17234682371235428_PRONUNCIATION_HACKS_U08_Alright,-to-move-your-character,.mp3"}, "options": [{"option_id": "1c7f591b-7b15-4192-b7f3-13b3d00e1f38", "content": "information", "image_url": ""}, {"option_id": "2dee20fb-645c-4161-8a3f-0edce71fde5b", "content": "advice", "image_url": ""}, {"option_id": "2d029959-be7c-4d24-8161-443948c98de4", "content": "approval and recognition", "image_url": ""}, {"option_id": "299c3d6e-6abb-4115-91e4-4d9afc220269", "content": "confirmation or understanding", "image_url": ""}], "answer": null}, {"question_id": "b150330f-b336-4d05-8e41-f9ab7be0aec1", "assessment_id": "b2f85cd6-37c1-4c73-b6fa-77bf70cfca57", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the passage and select the alternative that can replace the expression in bold.</p><p>&nbsp;</p><p>Alright, when you enter the dark and mysterious forest, I want you to follow the path to the old, creaky bridge. Don't worry if you feel <strong>somewhat</strong> scared \u2013 it adds to the adventure. Once you cross the bridge, look for the hidden treasure chest on the right.</p><p>&nbsp;</p>", "media": null, "options": [{"option_id": "2a4c2d01-258b-4759-be2e-57e7184a45c7", "content": "a little bit", "image_url": ""}, {"option_id": "976d587c-0981-40b3-b327-d16a2fbf85f6", "content": "enough", "image_url": ""}, {"option_id": "c8c17c84-42dc-40c1-b5e9-15839d25be97", "content": "really", "image_url": ""}, {"option_id": "4999b3e1-4ee0-4cf7-ab0c-b8b6e079dea7", "content": "too", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
