<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "c277fc6c-7ac1-4e1a-9d43-42c5329939fc", "assessment_id": "d813d713-03a8-4fb1-b3ed-d7163c69b2b1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>What does \u201cnailed the test\u201d mean in this context? </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "584c46e8-7576-44ea-8120-b820f02c9cb2", "content": "hammered a nail into the text.", "image_url": ""}, {"option_id": "b174fe00-177c-4801-8658-a517a86e8c56", "content": "the person did exceptionally well on the test.", "image_url": ""}, {"option_id": "b232e43e-3d99-4ecd-a980-da9c6e2b6cdc", "content": "painted the nails in the text.", "image_url": ""}, {"option_id": "7588fc00-537c-42e6-a9ba-c7566cbbcfa9", "content": "you completely misunderstood the test!", "image_url": ""}], "answer": null}, {"question_id": "1d0a5d26-c930-4819-b42c-bbdbd5220db9", "assessment_id": "d813d713-03a8-4fb1-b3ed-d7163c69b2b1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Mary can sing beautifully, and her dance moves are impressive enough to captivate any audience. However, when asked to give a speech, she becomes nervous, even though she has the talent to excel in that area too. </p><p><br></p><p>Which of the following statements about Mary's talents is true?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "1635ff9b-640f-4f04-9a23-a2df35c0e059", "content": "Mary's singing and dancing are equally impressive.", "image_url": ""}, {"option_id": "cd75c98c-630b-469b-9341-fe0c8fa52932", "content": "Mary's speech-giving ability surpasses her singing and dancing.", "image_url": ""}, {"option_id": "a6a32f2b-bbd5-4404-96cf-98e9a30fcf6f", "content": "Mary excels in dancing but struggles with singing.", "image_url": ""}, {"option_id": "97215911-ef0e-409d-ac51-2754673eac6f", "content": "Mary becomes nervous when asked to give a speech, despite her talent.", "image_url": ""}], "answer": null}, {"question_id": "1a418bcf-735c-401d-b8f2-5bd70ee0b0ee", "assessment_id": "d813d713-03a8-4fb1-b3ed-d7163c69b2b1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Despite his family's immense wealth, Mark chose ______ living as an average person, valuing simplicity and hard work over extravagance.</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "1fccce74-51d2-42e0-8de5-83ed8d4f79f7", "content": "bare.", "image_url": ""}, {"option_id": "5902ec5a-79e1-4ad4-a52d-108e051061b0", "content": "to bear.", "image_url": ""}, {"option_id": "79b698e0-2411-4707-befd-020ec49bd8e1", "content": "bear.", "image_url": ""}, {"option_id": "6163e6fd-54bf-435a-b75c-2f502eb507b6", "content": "to bare.", "image_url": ""}], "answer": null}, {"question_id": "0f9d9f10-6b2f-4dc1-8d6a-c0d53fc31ff0", "assessment_id": "d813d713-03a8-4fb1-b3ed-d7163c69b2b1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Alex: I've always wanted to become a chef. I love cooking.</p><p>Sarah: That's wonderful! What kind of dishes do you want to specialize in?</p><p>Alex: I'm particularly interested in Italian cuisine. I want to turn into a master of pasta and sauces.</p><p>Sarah: Italian food is delicious! With your passion, I'm sure you'll become a fantastic chef.</p><p><br></p><p>What\u2019s the difference between \u201cturn into\u201d and \u201cbecome\u201d in this context? </p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "c42fc6c1-cea6-4c22-9f0e-33bc0514df1f", "content": "\"become\" and \"turn into\" mean the same thing in this context; there's no difference.", "image_url": ""}, {"option_id": "6763e2e4-e961-4cea-90be-b431a8ec6bee", "content": "\"turn into\" implies a transformation or specialization over time.", "image_url": ""}, {"option_id": "55ebb6dd-019d-4d1f-b8b9-c581be06cf4d", "content": "\u201cturn into\u201d is used when someone takes on another role, not fundamentally changed. Ex: \u201cI turned into a father.\u201d", "image_url": ""}, {"option_id": "af74c441-ce25-4a0c-8b1a-a6d4f0c4261e", "content": "\u201cBecome\u201d is used when there is a fundamental transformation of someone or something. Ex: \u201cThe prince became a frog.\u201d", "image_url": ""}], "answer": null}, {"question_id": "211f455a-96d4-4918-b4fc-edf2e29443fe", "assessment_id": "d813d713-03a8-4fb1-b3ed-d7163c69b2b1", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the odd one out. </p><p><br></p>", "media": null, "options": [{"option_id": "6cba5d72-5555-4bc2-8e98-6c5f5cdc0b1e", "content": "fearless.", "image_url": ""}, {"option_id": "c09c5d20-f63a-421c-82aa-0d42e666c3d9", "content": "use less. ", "image_url": ""}, {"option_id": "2143424c-35c6-448b-9adc-da908a0ca558", "content": "heartless.", "image_url": ""}, {"option_id": "ace74c09-8bc4-479d-8844-ec52b46cb5ac", "content": "hopeless. ", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
