<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "d76f3473-00f4-4b2c-80ef-546da5950044", "assessment_id": "ae4d35fa-302d-4ec0-96b9-a5b4ab5dded5", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the excerpt from Jake Barton\u2019s speech:</p><p><br></p><p>\u201cYou go into these booths, you interview your grandmother or relative, you leave with a copy of the interview and an interview goes into the Library of Congress. It's essentially a way to make a national oral history archive one conversation at a time.\u201d</p><p><br></p><p>What was the primary objective of StoryCorps?</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "1899a23e-4a11-4c37-bdeb-b8b23e886deb", "content": "Recording political speeches from famous presidents", "image_url": ""}, {"option_id": "b4de2979-4afe-44d2-950e-13e498a51d96", "content": "Documenting fictional stories created by the public", "image_url": ""}, {"option_id": "be716b5a-e819-4eae-8595-e1ee1239db17", "content": "Capturing national remarkable Congress events", "image_url": ""}, {"option_id": "46ffab2c-6584-423d-82bc-0c49393f6626", "content": "Creating an archive of national oral histories ", "image_url": ""}], "answer": null}, {"question_id": "8e36b85e-def0-436e-870a-c9a10aed92e9", "assessment_id": "ae4d35fa-302d-4ec0-96b9-a5b4ab5dded5", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Analyze the excerpt from Jake Barton\u2019s speech:</p><p><br></p><p>\u201cIt really made us recognize what this institution needed to be in order to actually tell that story. We can't have just a historian or a curator narrating objectively in the third person about an event like that when you have the witnesses to history who are going to make their way through the actual museum itself.\u201d</p><p><br></p><p>From the text, it can be implied that:</p><p><br></p>", "media": null, "options": [{"option_id": "c14f2c1c-541f-4efe-9e3a-237306718151", "content": "It\u2019s better to have a narrator telling stories.", "image_url": ""}, {"option_id": "199dd27b-59f8-48eb-bdc0-21154f8b5b61", "content": "The witness should tell their own story.", "image_url": ""}, {"option_id": "942ba306-8019-4170-8c5a-5e38cc520a41", "content": "The institution should hire historians and curators.", "image_url": ""}, {"option_id": "adfd7b4d-64b8-4a4d-b573-3e4b61b127db", "content": "Using the third person is the best way of describing an event.", "image_url": ""}], "answer": null}, {"question_id": "4d6f2589-b478-4e20-8ef5-f0bf33720fd2", "assessment_id": "ae4d35fa-302d-4ec0-96b9-a5b4ab5dded5", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio.&nbsp;</p><p><br></p><p>By that, it can be said that StoryCorps:</p><p><br></p><p><br></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/media/audio/17236789370074522_U15_GET-THE-TALK_Charley-Williams.mp3"}, "options": [{"option_id": "d74968d0-c577-4ceb-9a56-cd8cd491cbbf", "content": "Also helps to make crown jewels.", "image_url": ""}, {"option_id": "b7ee26c6-9882-4b0b-9dcc-bf940138e343", "content": "Only presents stories from ex-slaves.", "image_url": ""}, {"option_id": "23af14b6-8b1e-49b8-9ee2-f9d2def94fc1", "content": "Lets non-famous people tell their stories. ", "image_url": ""}, {"option_id": "59178a5d-a752-47bc-9114-45f397e73178", "content": "Only makes big interviews with the American people.", "image_url": ""}], "answer": null}, {"question_id": "2c903739-5dd9-4939-b117-4860842ee487", "assessment_id": "ae4d35fa-302d-4ec0-96b9-a5b4ab5dded5", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the excerpt from Jake Barton\u2019s speech:&nbsp;</p><p><br></p><p>\u201cThen we started seeing the incredible images and stories that came forth from all around the world [...]\u201d</p><p><br></p><p>Select the option that gives a correct alternative to \u201ccome forth\u201d with the same meaning and context as in the excerpt:</p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "0a18f4a9-0b22-44a6-b053-4818fe3ae050", "content": "ring in", "image_url": ""}, {"option_id": "c39ac76b-0b1f-46ef-971b-6379873c11b5", "content": "present", "image_url": ""}, {"option_id": "db8229d6-a5ec-4fe5-bfd4-54e4c77f7340", "content": "walk in", "image_url": ""}, {"option_id": "b0a41bf7-cb56-4999-b105-6f5cab5ce81a", "content": "appear", "image_url": ""}], "answer": null}, {"question_id": "ec438101-2880-4b6c-bb06-f8b74134546d", "assessment_id": "ae4d35fa-302d-4ec0-96b9-a5b4ab5dded5", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Analyze the excerpt from Jake Barton\u2019s speech:&nbsp;</p><p><br></p><p>\u201c[...] the stories that were captured of his [Charlie's] life make up one of the crown jewels of histories, of human-lived experiences filled with ex-slaves.\"</p><p><br></p><p>Select the option that presents a good synonym for \u201cmake up\u201d in this sentence:</p><p><br></p><p><br></p><p><br></p><p><br></p>", "media": null, "options": [{"option_id": "a50db089-f5b9-4aa9-bf19-7cc609511939", "content": "fulfill", "image_url": ""}, {"option_id": "710020a7-7732-446b-a85c-b5b45ba09550", "content": "compose", "image_url": ""}, {"option_id": "9cacd1e4-8769-425c-9c40-f62109ec65d6", "content": "settle", "image_url": ""}, {"option_id": "2f58fa26-ba8e-4af3-9e34-a982801a1ad6", "content": "pretend", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
