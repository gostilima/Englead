<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "c1e2c64a-9dec-4bb2-a170-4f34ef8b8f77", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio.<strong> </strong>What does the speaker encourage the listeners to do?</p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN09-I know that many of you.mp3"}, "options": [{"option_id": "26bd1918-cc6a-45d6-a6e8-ea5bc4a03f6d", "content": "Conform to societal expectations and norms", "image_url": ""}, {"option_id": "27d46602-c0d3-48bb-88ef-d2da37b495ee", "content": "Doubt their own abilities and accomplishments", "image_url": ""}, {"option_id": "5c7770c5-361b-4d84-bce7-eba4c6f47145", "content": "Embrace their strengths and trust in their abilities", "image_url": ""}, {"option_id": "0178142f-e81d-450e-b47c-49e51137b340", "content": "Compare themselves to others in the room", "image_url": ""}], "answer": null}, {"question_id": "9317ffb1-0aa7-4972-9ec5-16e539e80adb", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the response that best demonstrates a polite and formal way to express confusion or lack of understanding, considering the situation:</p><p><br /></p><p><em>You are attending a business meeting, and the presenter has just explained a complex concept that you don't fully grasp.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "4e9c645b-152d-44bc-a3f2-a2913c7a9ce2", "content": "\"Wait, what? I'm totally lost. Can you start over from the beginning?\"", "image_url": ""}, {"option_id": "24ac4460-d3c1-4dc8-bf34-f653d1208813", "content": "\"I'm not sure I follow. Could you please clarify that last point for me?\"", "image_url": ""}, {"option_id": "fc91971c-6cf3-4a32-880b-e01f4d959c80", "content": "\"Huh? I don't get it. You're not making any sense.\"", "image_url": ""}, {"option_id": "5f7908bd-fa80-4805-a556-b1857b7096e6", "content": "\"I'm confused. Why can't you explain this in simpler terms?\"", "image_url": ""}], "answer": null}, {"question_id": "ef827203-4a98-4920-89a8-e4a6f94c3b0e", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>Listen to the audio. What can be inferred about the relationship between the two speakers?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/PRONUNCIATION_HACKS_UN09_I hope you'll forgive me for being so direct.mp3"}, "options": [{"option_id": "57642972-2e8d-44dd-841e-03497488ff6c", "content": "They are close friends who confide in each other regularly.", "image_url": ""}, {"option_id": "74838f37-e267-4714-b72e-8bbcae901027", "content": "They are colleagues who maintain a professional and formal relationship.", "image_url": ""}, {"option_id": "39a80366-0dc3-4310-9afc-ee74f3d2e15c", "content": "They have a strained relationship and are uncomfortable speaking with each other.", "image_url": ""}, {"option_id": "423c31ee-3313-4f1d-83ed-a174bbba6bca", "content": "They are discussing a serious personal issue that is affecting their work.", "image_url": ""}], "answer": null}, {"question_id": "8f9c43b3-9f6a-4ee5-80b8-33d09c746013", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following text and answer the question below:</p><p><br /></p><p>Procrastination is a complex phenomenon that affects individuals across all walks of life. At its core, procrastination represents a disconnect between our intentions and our actions, a gap between what we know we should be doing and what we actually end up doing. This disconnect often stems from a variety of psychological factors, such as fear of failure, perfectionism, and a lack of motivation or self-control.</p><p>When we procrastinate, we prioritize short-term comfort and instant gratification over long-term benefits and goals, ultimately leading to feelings of guilt, stress, and dissatisfaction with ourselves. However, it's important to recognize that procrastination is not an insurmountable obstacle. By developing a greater understanding of the underlying causes of our procrastination and by implementing practical strategies to break the cycle, we can learn to overcome our tendencies to delay and take proactive steps towards achieving our goals and living a more fulfilling life.</p><p><br /></p><p><strong>According to the passage, what is one potential consequence of procrastination?</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "be46d52f-8d43-43dd-95e5-4544b7b9c6f4", "content": "Increased motivation and self-control", "image_url": ""}, {"option_id": "9d09f3c2-255b-4c96-bb90-f7d90d4d12b5", "content": "Greater satisfaction with oneself", "image_url": ""}, {"option_id": "5a4c698b-e64c-4af4-b1e3-0918608c5be6", "content": "Reduced stress and guilt, improving our mental health ", "image_url": ""}, {"option_id": "7f80303d-106e-4493-8c89-a59ce37cbc67", "content": "Feelings of guilt and dissatisfaction with oneself", "image_url": ""}], "answer": null}, {"question_id": "90dd32e9-f425-4e10-822f-87bbe1e51480", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the sentence that best exemplifies the concept of a <strong>\"gap year\":</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "936411d9-7e7b-4b47-afc8-d62fa4ff3c6a", "content": "Between graduating from high school and starting college, Emily spent a year volunteering at a wildlife sanctuary in Costa Rica.", "image_url": ""}, {"option_id": "521e3cb5-3296-40c7-b369-a66d9e50659b", "content": "After completing her undergraduate degree, Sarah immediately enrolled in a master's program to further her education.", "image_url": ""}, {"option_id": "daaf649f-f858-4708-a59e-876c7a5cf8fa", "content": "Following his retirement, John decided to take a year to travel the world and pursue his passion for photography.", "image_url": ""}, {"option_id": "b0020cb1-6900-4113-9a5d-728272afe4a2", "content": "Having worked in the same industry for over a decade, Michael took a sabbatical to reassess his career goals and explore new opportunities.", "image_url": ""}], "answer": null}, {"question_id": "e8f8150f-1375-4ad5-827d-6297f41c99c7", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 6, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the sentence that best illustrates a general truth or scientific fact:</p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "a4026812-90bf-418a-9d7c-0ea99877ac73", "content": "If I had more free time, I would travel the world and explore new cultures.", "image_url": ""}, {"option_id": "b68f362e-f507-4689-b52e-dd71d41b068c", "content": "If I were you, I would start saving money for a down payment on a house.", "image_url": ""}, {"option_id": "b0c0b709-1370-493b-be55-59cbed3d6d67", "content": " If you mix blue and yellow paint, you get green.", "image_url": ""}, {"option_id": "338b38af-0d22-49da-9bc2-130a34b1263f", "content": "If I won the lottery, I would quit my job and move to a tropical island.", "image_url": ""}], "answer": null}, {"question_id": "8bd7d596-4008-492c-a001-d35a7e2cd2ce", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 7, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the response that best conveys a sense of regret, considering the situation: </p><p><br /></p><p><em>You've just realized that you forgot to submit an important assignment by the deadline.</em></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "8a3032d5-7ece-435f-b2e3-0f3f923c309b", "content": "Oh no, I can't believe I let this happen! I should have been more organized and started working on it earlier.", "image_url": ""}, {"option_id": "844c3f2a-b5cd-4cfb-9eaf-1d655b09baa6", "content": "Well, it's not a big deal. I'm sure the professor won't mind if I turn it in a few days late.", "image_url": ""}, {"option_id": "1448cbe3-d87d-46a3-831d-c498f31937c2", "content": "I'm so excited to finally have this assignment off my plate! I can't wait to see what grade I get.", "image_url": ""}, {"option_id": "891b3ff8-303d-4918-b93b-1c6a87b1e5d5", "content": "I'm confident that I did my best work on this assignment, and I'm proud of what I've accomplished.", "image_url": ""}], "answer": null}, {"question_id": "9e61c04c-c1d8-495a-bbaf-eec1040334eb", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 8, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the sentence that best illustrates the meaning of the phrase <strong>\"to feel adrift\":</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "510c58e3-b3e9-4821-bcc4-b45d92834e8f", "content": "After months of hard work, Sarah finally felt a sense of accomplishment and satisfaction with her job.", "image_url": ""}, {"option_id": "01209c61-8bb4-4b99-9e4f-f0854c82fa87", "content": "Having a clear set of goals and a plan to achieve them gave John a strong sense of direction and purpose.", "image_url": ""}, {"option_id": "a42b372d-32f8-436d-b370-2d69b40f0925", "content": "Despite being surrounded by friends and family, Emily couldn't shake the feeling of loneliness and isolation.", "image_url": ""}, {"option_id": "8968acfc-cf91-4c4b-927f-291eca3c8d4d", "content": "Following his retirement, Michael felt aimless and unsure of what to do with his newfound free time.", "image_url": ""}], "answer": null}, {"question_id": "79539ad4-fa4e-4a0a-82ae-aa4bf2b1f7ea", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 9, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following text and answer the question below:</p><p><br /></p><p>Effective communication across generations is crucial in today's diverse workplace. With up to five generations working together, each with their own unique experiences and communication styles, it can be challenging to find common ground. To bridge the generation gap, it's essential to approach conversations with empathy and openness.</p><p>One key strategy is to recognize and adapt to different communication preferences. While older generations may prefer face-to-face conversations, younger generations often gravitate towards digital methods. By being flexible, you can create a more inclusive environment that encourages open dialogue.</p><p>Another crucial aspect is to avoid stereotypes based on age. Instead, focus on the individual's unique skills and perspectives, and look for opportunities to leverage these strengths. By fostering a culture of respect and trust, you can create a workplace where all generations feel valued and empowered to contribute.</p><p><br /></p><p><strong>According to the passage, what is one key strategy for programs prefer applicants who can demonstrate fluency in multiple languages, regardless of their personal story.", "image_url": ""}], "answer": null}, {"question_id": "31c924d7-daeb-4153-ba97-ccc441246acb", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 11, "skill_id": "6f39ed6f-d621-4721-9763-e2983d5221d6", "description": "<p>What does the speaker's description of the movie scene suggest about their overall impression of it?</p><p><br /></p><p><br /></p>", "media": {"type": "audio", "url": "https://cdn-jirafales.fluencyacademy.io/content/audios/FLUENCY_HUB_UN11-I recently watched an action movie.mp3"}, "options": [{"option_id": "329f043d-4daf-4397-a2c4-5ba159be359a", "content": "They were captivated by the scene's intensity and attention to detail.", "image_url": ""}, {"option_id": "2fed91cf-eefa-4b2b-b332-c6a8717f2152", "content": "They found the scene unimpressive and forgettable.", "image_url": ""}, {"option_id": "c104705b-a1d9-416e-a55f-3f2ced3181b3", "content": "They thought the scene was unrealistic and poorly executed.", "image_url": ""}, {"option_id": "3c398a2c-281c-4d4b-8d04-10ca80820e05", "content": "They felt the scene was too lengthy and should have been shorter.", "image_url": ""}], "answer": null}, {"question_id": "513a7e23-0845-4919-952a-a1f589f1cc95", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 12, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following sentence and choose the option that best completes it using an adverbial phrase:</p><p><br /></p><p><em>The climber's movements were __________ as they navigated the challenging route, making sure each handhold and foothold was secure before proceeding.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "ec8219bc-9c97-4d9a-b7fe-bcb78 ia has added another layer to this already intricate web, allowing us to curate and present idealized versions of ourselves to a vast audience.\u00a0</p><p>But at what point does this curation become a form of self-deception? When we strive to fit in and conform to societal expectations, are we sacrificing our true essence in the process? It's a delicate balancing act, one that requires a deep understanding of our core values and a willingness to embrace our authentic selves, even in the face of external pressures. Ultimately, the key to navigating this complex landscape may lie in recognizing the fundamental oneness that underlies our individual identities \u2013 the understanding that, beneath the surface differences, we are all connected by a shared humanity.</p><p><br /></p><p><strong>According to the passage, what is the key to navigating the complex landscape of identity in today's world?</strong></p><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "a95bce66-3407-4e44-ab4f-f688352d3146", "content": "Striving to fit in and conform to societal expectations.", "image_url": ""}, {"option_id": "c49ebe8e-5c1a-41bb-be9e-d0f89e66401d", "content": "Curating and presenting idealized versions of ourselves on social media.", "image_url": ""}, {"option_id": "1f5eb9a1-a8c1-4dd8-9803-fbd1111f16c6", "content": "Embracing our authentic selves and recognizing our shared humanity.", "image_url": ""}, {"option_id": "21489e54-2ca9-476f-baa7-8670baa019b3", "content": "Constantly negotiating between different roles in various social contexts.", "image_url": ""}], "answer": null}, {"question_id": "43c5bc01-5206-4269-b5a8-bccbb1088cb8", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 15, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the best option to complete the dialogue:</p><p><br /></p><p><em>A: I'm a bit nervous about my upcoming trip to Japan. I don't want to accidentally say or do something inappropriate.</em></p><p><em>B: Don't worry too much! Just remember to ______ before you go, and you'll be fine.</em></p><p><br /></p>", "media": null, "options": [{"option_id": "63776738-7bc6-41ab-a917-d21e56d926a0", "content": "do your research", "image_url": ""}, {"option_id": "5a9bc313-311c-4b03-9f8d-54746fb0be85", "content": "have societal shocks", "image_url": ""}, {"option_id": "23a62ca6-d314-4885-bce0-8ffbb0ab23f1", "content": "party and drink", "image_url": ""}, {"option_id": "b133143c-e45b-4d0b-8a99-cfe4ec43b2a8", "content": "find food stalls", "image_url": ""}], "answer": null}, {"question_id": "feb67955-0c95-4d09-b242-0e6dc973e08a", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 16, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Look at the image and choose the best answer to complete the story:</p><p><br /></p><p>Sarah found herself at a crossroads, both literally and figuratively. She ______ at this exact spot a year ago, facing a life-changing decision. Now, as she stood here again, she reflected on the path she had chosen and how it had transformed her life.</p><p><br /></p><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXeKD5_1Q7fbwPSsICGCEGMbtZaYB_4MjO61fs_rbf2zPUkh_LZdFlUa4XcMwdI8vVS6vq0AfRhw5B2F_hsWQLuPi7z-kfRtA3-_BkPqCpLyVjd3FOzBntB1rLl7tcO-Tk4YiO23zUjkAJPKFhLpqKT9-wI?key=_vsEW5rHktvTMT5fjyjTYA\" height=\"500\" width=\"500\" /><p><br /></p><p><br /></p>", "media": null, "options": [{"option_id": "cde316fe-8968-47f9-a309-72b69539ec44", "content": "has been", "image_url": ""}, {"option_id": "a19785df-49e3-4fd7-9c8a-32a015422df9", "content": "was", "image_url": ""}, {"option_id": "9ddc1d82-5813-409a-b5ba-8d7c41e4db0c", "content": "had been", "image_url": ""}, {"option_id": "af04c736-b0ae-45dc-96b9-310a66484e7d", "content": "would be  and fulfilling way to boost self-esteem.", "image_url": ""}, {"option_id": "f8a29748-4f35-4722-9e67-a5877986b734", "content": "We should prioritize genuine human connections over the pursuit of online attention and approval.", "image_url": ""}, {"option_id": "38815121-02f2-4898-8b54-d99b0c5dd419", "content": "The key to happiness lies in constantly sharing our lives on social media platforms.", "image_url": ""}], "answer": null}, {"question_id": "11011bf7-2674-4eb2-885a-51bb3034197e", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 19, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Choose the best option to complete the sentence:\u00a0</p><p><br /></p><p><em>The rise of social media has led to a world where people _____ the opinions and judgments of others online.\u00a0</em></p>", "media": null, "options": [{"option_id": "e06727d9-e1d0-4136-b766-6ec5a70ae3c1", "content": "are obsessed with ", "image_url": ""}, {"option_id": "5c0b4bb1-9f28-4ada-be09-b73de9cdc3d6", "content": "are indifferent to", "image_url": ""}, {"option_id": "b1be2e90-1cb1-4a53-bb15-9a4103a8b3d7", "content": "are unaware of", "image_url": ""}, {"option_id": "dcbd87af-de58-40dc-8fc2-3040c63896ec", "content": "are resistant to", "image_url": ""}], "answer": null}, {"question_id": "695308a2-dae5-4a16-9931-0eb7f382116d", "assessment_id": "34840018-9940-4411-89ac-c26395eb602e", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 20, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>Read the following text and answer the question below:</p><p><br /></p><p>In today's globalized world, the ability to communicate effectively across cultural boundaries has become an essential skill. Cross-cultural communication involves navigating the complex interplay of language, customs, beliefs, and values that shape our interactions with others. It requires not only a mastery of the spoken language but also an understanding of the subtle nuances and non-verbal cues that vary from culture to culture.\u00a0</p><p>Effective cross-cultural communicators possess a keen sense of self-awareness, recognizing how their own cultural background influences their perceptions and behaviors. They approach interactions with an open mind, a willingness to learn, and a respect for diversity. By developing cross-cultural competence, we can build bridges of understanding, foster meaningful relationships, and collaborate effectively in an increasingly interconnected world. Ultimately, the ability to communicate across cultures is not just a valuable professional skill; it is a fundamental aspect of being a global citizen.</p><p><br /></p><p><strong>According to the text, what is a key characteristic of effective cross-cultural communicators?</strong></p><p><br /></p>", "media": null, "options": [{"option_id": "ed61dded-3506-4149-b607-09337b5eff36", "content": "They prioritize their own cultural values and beliefs over others.", "image_url": ""}, {"option_id": "1ca3c59a-3699-4363-8752-1d098d1d50e3", "content": "They focus solely on mastering the spoken language of other cultures.", "image_url": ""}, {"option_id": "e0acd707-fc08-482a-91da-fa4cc25f9398", "content": "They possess a keen sense of self-awareness and recognize how their own cultural background influences their perceptions and behaviors.", "image_url": ""}, {"option_id": "e7ef67b7-9087-42c8-9bd5-bcf7bcfc405c", "content": "They avoid interactions with people from different cultural backgrounds to minimize misunderstandings.", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
