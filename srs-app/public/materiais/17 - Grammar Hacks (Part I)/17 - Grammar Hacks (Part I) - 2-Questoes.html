<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Quiz Simples</title>
    <style>

      body {
        font-family: 'Inter', sans-serif;
        background-color: #042A35;
        color: #fff;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% 0%, rgba(255, 140, 104, 0.1) 0%, transparent 50%);
        overflow-x: hidden;
      }

      /* Aesthetics from ORION */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .question-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        transition: transform 0.5s ease;
      }

      .question-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #FF8C68;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
      }

      .question-description p {
        margin: 5px 0;
        font-size: 1.15rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.8);
      }

      .question-image,
      .question-audio {
        margin: 20px 0;
        text-align: center;
      }

      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .options-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
      }

      .option-item {
        margin: 15px 0;
        padding: 20px 25px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        color: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
      }

      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(8px);
      }

      .option-item input[type='radio'] {
        margin-right: 20px;
        accent-color: #FF8C68;
        transform: scale(1.4);
        cursor: pointer;
      }

      .correct-answer {
        background-color: rgba(255, 140, 104, 0.15) !important;
        border-color: #FF8C68 !important;
        color: #FF8C68 !important;
        transform: scale(1.02);
      }

      .incorrect-selected {
        background-color: rgba(239, 68, 68, 0.15) !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      .correct-not-selected {
        background-color: rgba(245, 158, 11, 0.15) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
      }

      .submit-button {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 30px auto 0;
        padding: 16px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 9999px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.25em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      .submit-button:hover {
        background-color: #e5e5e5;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255,255,255,0.2);
      }

      #results {
        margin: 40px auto;
        max-width: 600px;
        padding: 30px;
        background-color: rgba(255, 140, 104, 0.1);
        border: 1px solid rgba(255, 140, 104, 0.3);
        border-radius: 30px;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.8em;
        font-weight: 500;
        text-align: center;
        color: #FF8C68;
        display: none;
        animation: slideUpFade 0.5s ease-out forwards;
      }

      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #042A35; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

      @media (max-width: 768px) {
        body { padding: 15px; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .question-container { padding: 16px; margin-bottom: 16px; border-radius: 20px; }
        .option-item { padding: 12px 16px; font-size: 0.95rem; }
        .submit-button { margin-top: 20px; font-size: 1.1em; padding: 15px; }
        #results { font-size: 1.4rem; padding: 20px; }
      }

    </style>
  
    <!-- ORION Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <h1>🚀 Desafio do Quiz</h1>

    <form id="quiz-form"></form>

    <button class="submit-button" onclick="validateQuiz()">Validar Respostas</button>

    <div id="results"></div>

    <script>
      // Estrutura de dados das questões fornecida no prompt
      const quizData = [{"question_id": "34437426-b97f-4b79-b29d-c91fb3e554a6", "assessment_id": "a9db7861-bd49-4843-bab2-47e48b49e11d", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 1, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>I _____ a teacher.</p>", "media": null, "options": [{"option_id": "b194bfcb-e6c4-4068-8678-197f6ac5da2c", "content": "be", "image_url": ""}, {"option_id": "1f5148f5-0c25-4a10-85d0-2206e8398893", "content": "am", "image_url": ""}, {"option_id": "3432f488-4307-4b88-9e99-7f82707a2c43", "content": "is", "image_url": ""}, {"option_id": "fb6a212f-238d-4e62-aefb-b1276f9751fe", "content": "are", "image_url": ""}], "answer": null}, {"question_id": "6721987e-3d1f-4f84-9fd0-68ba2a0f48bb", "assessment_id": "a9db7861-bd49-4843-bab2-47e48b49e11d", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 2, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>She _____ not fast when she cleans.</p>", "media": null, "options": [{"option_id": "3d477de6-a833-4038-823f-54ea58db10ef", "content": "are", "image_url": ""}, {"option_id": "60e502db-4ce2-4c50-b843-fdc0eab41cb2", "content": "am", "image_url": ""}, {"option_id": "2eaec5b1-6d9c-4f7b-a861-38f63e30db8a", "content": "be", "image_url": ""}, {"option_id": "cb74c93f-53ca-4b10-b004-49c074438b2c", "content": "is", "image_url": ""}], "answer": null}, {"question_id": "1756ec32-d4c0-4c2e-a7b4-469e02ccb926", "assessment_id": "a9db7861-bd49-4843-bab2-47e48b49e11d", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 3, "skill_id": "c8bc74a6-5db5-4c7f-9083-c6d834947486", "description": "<p>They _____ at the park right now.</p>", "media": null, "options": [{"option_id": "77fecbcb-50ad-41e9-82f0-ab40f6da77a2", "content": "are", "image_url": ""}, {"option_id": "a287a15d-fd5d-4e43-9c2b-cc3c6eb7416f", "content": "is", "image_url": ""}, {"option_id": "082b14ce-7492-488a-ad00-1b130aebb3e1", "content": "am", "image_url": ""}, {"option_id": "13509386-9e13-4790-a0a7-7d6db22b1f50", "content": "be", "image_url": ""}], "answer": null}, {"question_id": "47205bea-6696-443f-99db-865cc1fcd155", "assessment_id": "a9db7861-bd49-4843-bab2-47e48b49e11d", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 4, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea est\u00e1 escrevendo um email importante para seu chefe. Nesse caso, qual das alternativas voc\u00ea escolheria para completar a lacuna?</p><p><br></p><p>It's important that he _____ on time for the meeting.</p>", "media": null, "options": [{"option_id": "257a862d-0890-448f-8e92-6295bfded31c", "content": "\u2018s", "image_url": ""}, {"option_id": "cbb07a20-1b5c-43c8-942b-f401f6d22f75", "content": "is", "image_url": ""}, {"option_id": "f09b9ea3-caeb-4f1b-9aaf-259b17f40e12", "content": "be", "image_url": ""}, {"option_id": "04f68c73-64fb-4ac5-9b8e-4ff6b243b2b6", "content": "-", "image_url": ""}], "answer": null}, {"question_id": "b1a6d8e5-a752-4aae-90d8-8108fa544a80", "assessment_id": "a9db7861-bd49-4843-bab2-47e48b49e11d", "type_id": "fad65fbe-f437-4dfa-8be8-3bffb04bc9b0", "type_slug": "multiple-choice-text", "position": 5, "skill_id": "b919bc14-498e-47df-83b7-86b238d47bf7", "description": "<p>Voc\u00ea est\u00e1 com pressa para chegar ao cinema e falando com seus amigos. Qual das alternativas corresponde a algo que voc\u00ea poderia dizer?</p>", "media": null, "options": [{"option_id": "b97b51de-6d88-4820-ad98-eed1600fbeae", "content": "We is late for the movie!", "image_url": ""}, {"option_id": "88df937e-7173-4aae-873c-c507cd3ade3c", "content": "We be late for the movie!", "image_url": ""}, {"option_id": "e47a2837-c8a5-44bd-9aa0-50d03de3fc15", "content": "We are late for the movie!", "image_url": ""}, {"option_id": "59338807-fde7-45ae-8051-0a8d0698e3e0", "content": "We am late for the movie!", "image_url": ""}], "answer": null}];

      // 1. Função para renderizar as questões
      function renderQuiz() {
        const quizForm = document.getElementById('quiz-form');
        let htmlContent = '';

        quizData.forEach((question, index) => {
          const qId = question.question_id;
          let mediaHtml = '';

          // Verifica e adiciona Mídia (Imagem ou Áudio)
          if (question.media) {
            if (question.media.type === 'image' && question.media.url) {
              mediaHtml = `
                          <div class="question-image">
                              <img src="${question.media.url}" alt="Imagem da Questão ${index + 1}" style="max-height:${
                question.media.height || '300'
              }px;">
                          </div>`;
            } else if (question.media.type === 'audio' && question.media.url) {
              mediaHtml = `
                          <div class="question-audio">
                              <audio controls>
                                  <source src="${question.media.url}" type="audio/mp3">
                                  Seu navegador não suporta o elemento de áudio.
                              </audio>
                          </div>`;
            }
          }

          // Estrutura da Questão
          htmlContent += `
                  <div class="question-container" id="q-container-${qId}">
                      <div class="question-header">Questão ${index + 1}</div>
                      <div class="question-description">${question.description}</div>
                      ${mediaHtml}
                      <ul class="options-list">
                          ${question.options
                            .map(
                              (option) => `
                              <li class="option-item" id="option-${option.option_id}">
                                  <input type="radio"
                                         name="answer-${qId}"
                                         id="radio-${option.option_id}"
                                         value="${option.option_id}">
                                  <label for="radio-${option.option_id}">${option.content}</label>
                              </li>
                          `,
                            )
                            .join('')}
                      </ul>
                  </div>
              `;
        });

        quizForm.innerHTML = htmlContent;
      }

      // 2. Função para validar as respostas
      function validateQuiz() {
        let correctCount = 0;
        const totalQuestions = quizData.length;
        const resultsDiv = document.getElementById('results');

        // Limpa classes de feedback anteriores
        document.querySelectorAll('.option-item').forEach((item) => {
          item.classList.remove('correct-answer', 'incorrect-selected', 'correct-not-selected');
        });

        quizData.forEach((question) => {
          const qId = question.question_id;
          const correctOptionId = question.answer ? question.answer.correct_option_id : null;
          const selectedInput = document.querySelector(`input[name="answer-${qId}"]:checked`);
          const selectedOptionId = selectedInput ? selectedInput.value : null;

          // Se a questão tiver uma resposta correta definida
          if (correctOptionId) {
            // Marca a resposta correta
            const correctElement = document.getElementById(`option-${correctOptionId}`);
            if (correctElement) {
              correctElement.classList.add('correct-answer');
            }

            // Verifica se o usuário acertou
            if (selectedOptionId === correctOptionId) {
              correctCount++;
              // A correta já foi marcada, não precisa de mais feedback na correta.
            } else if (selectedOptionId) {
              // O usuário selecionou uma resposta, mas estava errada
              const incorrectElement = document.getElementById(`option-${selectedOptionId}`);
              if (incorrectElement) {
                incorrectElement.classList.add('incorrect-selected');
              }
            } else {
              // O usuário não selecionou nenhuma resposta, e a correta foi marcada (amarelo)
              if (correctElement) {
                correctElement.classList.remove('correct-answer'); // Remove o verde para usar o amarelo
                correctElement.classList.add('correct-not-selected');
              }
            }
          }

          // Desabilita os botões de rádio após a validação para evitar mudanças
          document.querySelectorAll(`input[name="answer-${qId}"]`).forEach((input) => {
            input.disabled = true;
          });
        });

        // Exibe os resultados
        resultsDiv.innerHTML = `Você acertou ${correctCount} de ${totalQuestions} questões! 🎯`;
        resultsDiv.style.display = 'block';
      }

      // Inicia a renderização do quiz quando a página carrega
      window.onload = renderQuiz;
    </script>
  </body>
</html>
